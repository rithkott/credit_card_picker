# Example spend profile for scripts/optimize.py.
# Copy this file, put in your own annual numbers, then run:
#   python3 scripts/optimize.py --profile my-profile.yaml
# Full input rules: docs/plans/02-optimizer.md §2.

spend:                    # annual USD per category key from data/meta/categories.yaml
  groceries: 8000
  dining: 5000
  gas: 2000
  travel_flights: 1500
  travel_hotels: 1000
  streaming: 600
  other: 12000

merchant_spend:           # optional carve-outs, keys from data/meta/merchants.yaml;
  costco: 3000            # counted INSIDE spend[groceries], not in addition to it

user:
  credit_tier: very_good  # required: building | fair | good | very_good | excellent
  valuation_mode: floor   # floor | optimistic (default floor)
  max_cards: 3            # 1-5 (default 3)
  optimize_for: ongoing   # ongoing | year1 (default ongoing)
  activates_rotating: true
  accepts_brand_lockin: false  # true = also consider cards whose rewards only redeem
                               # with one company (airline miles, hotel points, store
                               # credit) — often higher point value, but you're locked
                               # to that brand. Default false: cash-path cards only
  confirmed_usage: []     # services/portals/brands you ALREADY use (or will) — item keys
                          # from data/meta/usage-questions.yaml. A merchant credit counts
                          # $0 unless its service is listed here; portal-only earn rates
                          # need their portal key; airline/hotel points get optimistic
                          # value only with the brand key. Example:
                          #   confirmed_usage: [chase_travel, doordash, delta, global_entry_tsa]
  reward_preferences: [total_value]  # any combination of: flights, hotels, cashback,
                                     # total_value. Concrete kinds keep only cards whose
                                     # currency redeems for one of them (see redeems_for
                                     # in data/meta/point-valuations.yaml); total_value
                                     # considers every card (default)
