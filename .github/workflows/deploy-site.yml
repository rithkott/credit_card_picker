# Build site/ and deploy it to GitHub Pages (docs/plans/04-tech-stack.md).
# One-time repo setting required: Settings -> Pages -> Source -> "GitHub Actions".
# The deployed site talks to the user's LOCAL optimizer API (v1 model) —
# VITE_API_URL stays http://localhost:8000.
name: Deploy site

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/deploy-site.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npx vitest run
        working-directory: site
      # --base must match the project-pages path or every asset 404s.
      - run: npm run build -- --base=/credit_card_picker/
        working-directory: site
        env:
          VITE_API_URL: http://localhost:8000
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
