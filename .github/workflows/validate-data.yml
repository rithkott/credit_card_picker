name: Validate card data

on:
  push:
    branches: [main]
    paths: ["data/**", "scripts/validate_cards.py", ".github/workflows/validate-data.yml"]
  pull_request:
    paths: ["data/**", "scripts/validate_cards.py", ".github/workflows/validate-data.yml"]
  schedule:
    # Weekly run so staleness warnings surface even when no one is editing data
    - cron: "0 14 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jsonschema
      - run: python3 scripts/validate_cards.py
