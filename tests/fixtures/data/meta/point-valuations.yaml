# Shared cents-per-point valuation table.
# Every points card references one program key here (currency.program) instead of
# embedding its own valuation, so "how much is a point worth" is a single global,
# user-visible assumption with two modes:
#   floor_cpp      — conservative: what you can always get (cash-out / statement credit)
#   optimistic_cpp — realistic upside via transfer partners / portal boosts
# All values in US cents per point. `cash` is the identity program for cash-back cards.
#
# NOTE: optimistic values are inherently judgment calls; sources and reasoning belong
# in the comments next to each program. Verify alongside card data (confidence applies).

programs:
  cash:
    label: Cash back
    redeems_for: [cashback]
    floor_cpp: 1.0
    optimistic_cpp: 1.0
  chase_ur:
    label: Chase Ultimate Rewards
    redeems_for: [cashback, flights, hotels]
    transfer_gateway_required: true  # Freedom points reach partners only via a Sapphire
    floor_cpp: 1.0          # cash out / statement credit
    optimistic_cpp: 2.0     # transfer partners (Hyatt etc.), r/churning consensus range 1.8–2.2
  amex_mr:
    label: American Express Membership Rewards
    redeems_for: [cashback, flights, hotels]
    floor_cpp: 0.6          # statement credit rate is poor; 1.0 only via Schwab/portal paths
    optimistic_cpp: 1.9     # airline transfer partners
  citi_typ:
    label: Citi ThankYou Points
    redeems_for: [cashback, flights, hotels]
    transfer_gateway_required: true  # full partners require a premium TY card (none in fixtures)
    floor_cpp: 1.0          # cash back at 1cpp
    optimistic_cpp: 1.7     # transfer partners (requires a premium TY card)
  capital_one_miles:
    label: Capital One Miles
    redeems_for: [cashback, flights, hotels]
    floor_cpp: 0.5          # cash-out rate is 0.5; 1.0 as travel eraser
    optimistic_cpp: 1.7     # transfer partners
  discover_cashback:
    label: Discover Cashback Bonus
    redeems_for: [cashback]
    floor_cpp: 1.0
    optimistic_cpp: 1.0
  brandair_miles:
    label: BrandAir Miles (synthetic lock-in currency for loyalty tests)
    redeems_for: [flights]
    loyalty_keys: [brandair]  # optimistic_cpp requires confirmed BrandAir loyalty
    floor_cpp: 0.8
    optimistic_cpp: 1.5
