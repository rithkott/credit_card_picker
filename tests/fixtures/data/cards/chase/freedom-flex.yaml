  foreign_transaction_pct: 3
approval:
  credit_tier: good
  estimated_min_score: 670
  notes: Subject to Chase 5/24 rule (denied if 5+ new cards across issuers in past 24 months)
benefit_flags:
  - cell_phone_protection
