# Archetype: rotating-category card. The 5% quarterly categories change and require
# manual activation each quarter — modeled via the `rotating` pseudo-category with an
# explicit rotation block so the optimizer can discount for non-activation.
id: freedom-flex
name: Chase Freedom Flex
issuer: chase
network: mastercard
currency:
  type: points
  program: chase_ur
base_rate: 1
category_rewards:
  - category: rotating
    rate: 5
    cap:
      period: quarterly
      max_spend_usd: 1500
      fallback_rate: 1
    rotation:
      frequency: quarterly
      requires_activation: true
      note: >-
        Categories change each quarter (historically gas, groceries, Amazon, PayPal,
        streaming, etc.) and must be activated by the quarterly deadline; unactivated
        spend earns 1x.
  - category: travel_other
    rate: 5
    portal_only: true
    notes: 5x only on travel purchased through Chase Travel
  - category: dining
    rate: 3
  - category: drugstores
    rate: 3
