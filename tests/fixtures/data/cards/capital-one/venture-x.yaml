# Premium flat-rate travel card: high fee mostly offset by a large annual travel
# credit — tests whether the optimizer values credits honestly vs. at face value.
id: venture-x
name: Capital One Venture X
issuer: capital-one
network: visa
portal: capital_one_travel
currency:
  type: points
  program: capital_one_miles
base_rate: 2
category_rewards:
  - category: travel_hotels
    rate: 10
    portal_only: true
    notes: 10x on hotels and rental cars booked through Capital One Travel
  - category: travel_flights
    rate: 5
    portal_only: true
    notes: 5x on flights booked through Capital One Travel
merchant_rewards: []
credits:
  - name: Capital One Travel credit
    amount_usd: 300
    period: annual
    usage_keys: [capital_one_travel]
    category: travel_other
    realistic_capture_rate_note: >-
      Only usable through the Capital One Travel portal, where prices can run above
      direct booking; near-full capture for anyone who travels yearly, zero otherwise.
  - name: Anniversary bonus miles
    amount_usd: 100
    period: annual
    automatic: true
    realistic_capture_rate_note: >-
      10,000 miles each anniversary, valued here at the 1.0cpp travel-eraser rate;
      automatic, so capture is effectively 100% as long as the card is kept.
signup_bonus:
  value:
    points: 75000
  spend_requirement_usd: 4000
  window_months: 3
fees:
  annual_fee_usd: 395
  foreign_transaction_pct: 0
approval:
  credit_tier: excellent
  estimated_min_score: 740
  notes: Capital One markets this for excellent credit; approval odds drop sharply below ~740
benefit_flags:
  - lounge_access
  - primary_rental_insurance
sources:
  - url: https://www.capitalone.com/credit-cards/venture-x/
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, fees, approval, benefit_flags]
    accessed: "2026-07-03"
    added_by: claude-draft
    note: URL not actually fetched — numbers drafted from model knowledge; re-source during human verification
verification:
  last_verified_date: "2026-07-03"
  verified_by: claude-draft (NEEDS human verification against issuer terms)
  confidence: low
