# Delta co-brand business entry card: 2x Delta + business categories,
# $200 Delta flight credit after $10k spend.
id: delta-skymiles-gold-business
name: Delta SkyMiles Gold Business American Express Card
issuer: amex
network: amex
currency:
  type: points
  program: delta_skymiles
base_rate: 1

category_rewards:
  - category: travel_flights
    rate: 2                  # "2X miles per every eligible dollar spent on purchases made directly with Delta" — amex product page, verified 2026-07-17
    notes: Delta purchases specifically — other airfare earns base.
  - category: dining
    rate: 2                  # "2X miles at restaurants" — amex product page, verified 2026-07-17
  - category: shipping
    rate: 2                  # "2X on eligible U.S. purchases at U.S. shipping providers & at U.S. providers for advertising in select media. Miles caps apply." — amex product page, verified 2026-07-17
    notes: Miles cap applies — cap amount lives in the card terms, NEEDS human verification.
  - category: advertising
    rate: 2
    notes: US providers, advertising in select media; miles cap applies (amount NEEDS human verification).

merchant_rewards: []

credits:
  - name: Delta flight credit
    amount_usd: 200          # "after you spend $10,000 in purchases in a year, you can receive a $200 Delta Flight Credit" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [delta]
    unlock_spend_usd: 10000
    realistic_capture_rate_note: >-
      Requires $10k annual card spend AND Delta travel to redeem — captured by
      Delta-loyal companies that route real volume here.
  - name: Rideshare credit (after first renewal)
    amount_usd: 10           # "after your first Card renewal, enroll and earn up to $10 in statement credits each month" on US rideshare — amex product page, verified 2026-07-17
    period: monthly
    category: transit
    requires_enrollment: true
    realistic_capture_rate_note: >-
      $10/month on U.S. rideshare with select providers, but only from the
      SECOND card year onward (starts after first renewal) — year-one value
      is $0.

signup_bonus:
  value:
    points: 60000            # "60,000 bonus miles after you spend $4,000 ... first 6 months" — amex product page, verified 2026-07-17
  spend_requirement_usd: 4000
  window_months: 6
  notes: Verified vs americanexpress.com product page 2026-07-17; once-per-lifetime rule applies.

pricing:
  model: annual_fee
  annual_fee_usd: 150        # "$0 intro annual fee for the first year, then $150" — amex product page, verified 2026-07-17
  first_year_waived: true
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: good
  entity_types: [sole_prop, llc, corp]
  notes: REVOLVING co-brand — counts toward the Amex 5-credit-card limit. Tier inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0
  max_cards: 99
  controls: [spending_limits, realtime_alerts]

payment_type: revolving

benefit_flags: [free_checked_bag]

