# $0-fee flat-capped MR earner: 2x on ALL purchases up to $50k/yr, then 1x.
# The base_rate_cap seed on a points currency.
id: blue-business-plus
name: American Express Blue Business Plus
issuer: amex
network: amex
currency:
  type: points
  program: amex_mr
base_rate: 2                 # "2X points on the first $50,000 of eligible purchases per calendar year" — amex product page, verified 2026-07-17
base_rate_cap:
  period: annual
  max_spend_usd: 50000       # "1X points on purchases thereafter" — amex product page, verified 2026-07-17
  fallback_rate: 1

category_rewards: []
merchant_rewards: []
credits: []

signup_bonus:
  value:
    points: 15000            # "15,000 Membership Rewards points after you spend $3,000 ... first 3 months" — amex product page, verified 2026-07-17
  spend_requirement_usd: 3000
  window_months: 3
  notes: Verified vs americanexpress.com product page 2026-07-17; Amex once-per-lifetime rule applies.

pricing:
  model: annual_fee
  annual_fee_usd: 0
  foreign_transaction_pct: 2.7  # standard Amex no-fee-card FTF — inference, NEEDS human verification

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: good
  entity_types: [sole_prop, llc, corp]
  notes: >-
    SSN application with personal guarantee. This is a REVOLVING Amex credit
    card — it counts toward the Amex 5-credit-card limit (issuer-rules: amex).
    Tier estimate inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0
  max_cards: 99
  controls: [spending_limits, realtime_alerts, card_freeze]

payment_type: revolving

benefit_flags: []

