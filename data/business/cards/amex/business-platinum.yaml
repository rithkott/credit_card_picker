# $895 premium business travel card: 5x portal flights/hotels, 2x on business
# categories AND any $5k+ purchase (one $2M pool), statement-credit ecosystem,
# $400 employee Platinums. Seeds large_purchase_rate + usage-gated credits.
id: business-platinum
name: The Business Platinum Card from American Express
issuer: amex
network: amex
portal: amex_travel
currency:
  type: points
  program: amex_mr
base_rate: 1

category_rewards:
  - category: travel_flights
    rate: 5                  # "5X points on flights and prepaid hotels on AmexTravel.com" (NerdWallet review, verified 2026-07-17)
    portal_only: true
    notes: Only on flights booked through amextravel.com.
  - category: travel_hotels
    rate: 5
    portal_only: true
    notes: Only on prepaid hotels booked through amextravel.com.
  - category: contractors_materials
    rate: 2                  # "2X at US construction material & hardware suppliers ... up to $2M of these purchases per calendar year" (NerdWallet review, verified 2026-07-17)
    cap: &pool2m
      period: annual
      max_spend_usd: 2000000
      fallback_rate: 1
      shared_cap_id: bizplat_2m
  - category: software_saas
    rate: 2                  # US electronic goods retailers and software & cloud system providers
    cap: *pool2m
  - category: shipping
    rate: 2
    cap: *pool2m

merchant_rewards: []

large_purchase_rate:
  rate: 2
  min_transaction_usd: 5000  # "and on each eligible purchase of $5,000 or more" — same $2M pool as the category lines
  cap:
    period: annual
    max_spend_usd: 2000000
    fallback_rate: 1
    shared_cap_id: bizplat_2m
  note: >-
    Any-category purchases of $5,000+ earn 2X, sharing the $2M calendar-year
    pool with the construction/electronics-software/shipping category lines.
    Purchases eligible for multiple bonuses receive only the highest.

credits:
  - name: Airline fee credit
    amount_usd: 200
    period: annual
    usage_keys: [delta, united, american_airlines, southwest, alaska_airlines]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Covers incidental fees (bags, seats, lounge day passes) on ONE selected
      airline only — not airfare. Companies with regular air travel on a single
      carrier capture most of it; others capture little.
  - name: Wireless services credit
    amount_usd: 120           # $10/month on US wireless (NerdWallet review, verified 2026-07-17)
    period: annual
    usage_keys: [wireless_provider]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      $10/month against US wireless charges paid on the card — near-automatic
      for a business that pays its phone bill with the card, $0 otherwise.
  - name: Dell statement credit
    amount_usd: 150           # "up to $150 on U.S. purchases directly with Dell Technologies" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [dell]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Only against Dell purchases; conservative $150 face recorded — the page
      confirms an additional $1,000 statement credit after $5,000+ of Dell
      purchases per calendar year, which is enterprise-sized and deliberately
      omitted. Worthless to companies that don't buy Dell.
  - name: ChatGPT Business credit
    amount_usd: 300           # "up to $300 in statement credits per calendar year on U.S. purchases of ChatGPT Business" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [chatgpt]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Only against U.S. ChatGPT Business (team workspace) purchases, which
      auto-renew; near-full capture for a business already paying for ChatGPT
      Business, $0 otherwise.
  - name: Adobe credit
    amount_usd: 250           # "$250 statement credit per calendar year after you spend $600 or more ... directly with Adobe" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [adobe]
    unlock_spend_usd: 600
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Single $250 credit gated on $600+ of direct Adobe purchases in the
      calendar year — captured by businesses on Creative Cloud team plans,
      $0 otherwise.
  - name: Indeed credit
    amount_usd: 90            # "up to $90 in statement credits quarterly for purchases with Indeed" — amex product page, verified 2026-07-17
    period: quarterly
    usage_keys: [indeed]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      $90/quarter against Indeed hiring spend — full capture only for
      businesses recruiting continuously through Indeed year-round.
  - name: CLEAR+ credit
    amount_usd: 219           # "up to $219 per calendar year for an auto-renewing CLEAR+ Membership" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [clear]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Covers one auto-renewing CLEAR+ membership (excl. taxes/fees); full
      value only to CLEAR users.
  - name: Hilton for Business credit
    amount_usd: 50            # "statement credits of up to $50 quarterly on eligible purchases made directly with Hilton" — amex product page, verified 2026-07-17
    period: quarterly
    usage_keys: [hilton]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      $50/quarter on direct Hilton purchases, requires Hilton for Business
      enrollment; quarterly cadence means sporadic travelers capture only the
      quarters they stay.
  - name: Global Entry or TSA PreCheck fee credit
    amount_usd: 120           # "$120 statement credit for a Global Entry application fee ... every 4 years" — amex product page, verified 2026-07-17
    period: every_4_years
    usage_keys: [global_entry_tsa]
    realistic_capture_rate_note: >-
      One credit every 4 years, up to $120 (Global Entry) or $85 (TSA
      PreCheck); modeled at the $120 ceiling, captured once per renewal cycle
      by enrollees.
  - name: Hotel credit (Fine Hotels & Resorts / The Hotel Collection)
    amount_usd: 600           # $300 twice annually (NerdWallet review, verified 2026-07-17)
    period: annual
    category: travel_hotels
    portal_only: true
    realistic_capture_rate_note: >-
      Two $300 semiannual credits, only on FHR/THC prepaid bookings through Amex
      Travel — premium-property rates often exceed direct-booking alternatives,
      so realistic capture is well below face.

signup_bonus:
  value:
    points: 300000           # "AS HIGH AS 300,000 Membership Rewards Points after you spend $20,000 ... first 3 months" — amex product page, verified 2026-07-17
  spend_requirement_usd: 20000
  window_months: 3
  notes: >-
    "Apply and find out" variable offer — 300,000 is the advertised ceiling
    ("welcome offers vary and you may not be eligible"); exact amount disclosed
    at application and may be lower. Recorded at the ceiling per corpus
    convention (consumer Amex cards do the same). Amex once-per-lifetime bonus
    rule applies. Verified vs americanexpress.com 2026-07-17.

pricing:
  model: annual_fee
  annual_fee_usd: 895        # NerdWallet review, verified 2026-07-17
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: excellent
  entity_types: [sole_prop, llc, corp]
  notes: >-
    SSN application with personal guarantee; premium underwriting. Charge
    lineage — exempt from the Amex 5-credit-card limit. Tier estimate NEEDS
    human verification.

employee_cards:
  fee_usd: 400               # per employee Business Platinum — plan 21 research figure, NEEDS human verification
  free_expense_card_variant: true
  max_cards: 99
  controls: [spending_limits, mcc_restrictions, realtime_alerts, card_freeze]
  note: >-
    $400 employee Platinums carry lounge access etc.; no-annual-fee Employee
    Business Expense Cards exist alongside. V1 scores fee_usd per seat — a
    company issuing many seats should model the free expense-card variant by
    entering 0 seats here (tradeoff noted, plan 22).

payment_type: charge

benefit_flags: [lounge_access]

sources:
  - url: https://www.americanexpress.com/us/credit-cards/business/business-credit-cards/american-express-business-platinum-credit-card-amex/
    supports: [identity, currency, base_rate, category_rewards, large_purchase_rate, credits, signup_bonus, pricing, payment_type, benefit_flags]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Official product page read in-browser 2026-07-17: $895 fee, variable SUB
      as-high-as 300k/$20k/3mo, 5X portal flights+prepaid hotels, 2X key
      business categories or $5k+ purchases with $2M calendar-year cap, and the
      full credit stack (hotel $300x2, airline $200, Dell $150+$1k tranche,
      ChatGPT $300, Adobe $250, Indeed $90/qtr, CLEAR+ $219, Hilton $50/qtr,
      wireless $10/mo, Global Entry/TSA). $250k-spend unlocks (One AP $2,400,
      Amex Travel flight $1,200) omitted as enterprise-sized. Page does not
      enumerate the 2X category list — construction/electronics-software/
      shipping lines retained from prior research.
  - url: https://www.nerdwallet.com/reviews/credit-cards/american-express-business-platinum
    supports: [identity, currency, base_rate, category_rewards, large_purchase_rate, pricing, business_approval, payment_type, benefit_flags]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Prior verification pass; 2X category enumeration and approval-tier
      estimate come from this review. Employee fee, approval tier still NEEDS
      human verification.
  - url: https://www.americanexpress.com/en-us/business/blueprint/help-center/business-card/employee-cards/
    supports: [employee_cards]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: 99-card limit; employee spend pools to the primary account (3-0 verified).

notes: >-
  Plan 22A seed card: exercises large_purchase_rate sharing a $2M pool with
  category lines (shared_cap_id across both), portal_only rates + a portal_only
  credit, usage-gated credits (airline anyOf, dell, wireless), and the $400
  employee-card fee.

verification:
  last_verified_date: "2026-07-17"
  verified_by: "claude-fable-5 — fee/rates/SUB/credit-stack verified in-browser vs americanexpress.com product page 2026-07-17; employee-card fee, approval tier, 2X category enumeration still NEEDS human verification"
