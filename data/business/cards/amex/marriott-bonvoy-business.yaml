# Marriott co-brand business card: 6x Marriott, 4x business categories,
# anniversary free night (in_kind).
id: marriott-bonvoy-business
name: Marriott Bonvoy Business American Express Card
issuer: amex
network: amex
currency:
  type: points
  program: marriott_bonvoy
base_rate: 2                 # "2X Marriott Bonvoy points on other purchases" — amex product page, verified 2026-07-17

category_rewards:
  - category: travel_hotels
    rate: 6                  # "6X ... at hotels participating in Marriott Bonvoy" — amex product page, verified 2026-07-17
    notes: Marriott Bonvoy properties specifically — other hotel spend earns base.
  - category: dining
    rate: 4                  # "4X at restaurants worldwide, at U.S. gas stations, on wireless telephone services purchased directly from U.S. service providers and on U.S. purchases for shipping" — amex product page, verified 2026-07-17
  - category: fuel_fleet
    rate: 4
  - category: telecom
    rate: 4
  - category: shipping
    rate: 4

merchant_rewards: []

credits:
  - name: Anniversary free night (up to 35k points)
    kind: in_kind
    amount_usd: 200          # curator estimate: 35k-point Bonvoy night ≈ $200-300 at 0.6-0.9cpp; conservative end
    period: annual
    usage_keys: [marriott]
    realistic_capture_rate_note: >-
      "1 Free Night Award every year after your Card renewal month ...
      redemption level at or under 35,000 points" (amex product page, verified
      2026-07-17; resort fees may apply). Worth face only to companies staying
      at Marriott; estimate reasoning in the amount comment.
  - name: Second free night after $60k calendar spend (up to 35k points)
    kind: in_kind
    amount_usd: 200          # "earn an additional Free Night Award after you spend $60K in purchases ... in a calendar year" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [marriott]
    unlock_spend_usd: 60000
    realistic_capture_rate_note: >-
      Same 35k-point cap as the anniversary night but gated on $60K annual
      card spend — only companies routing serious volume here capture it.

signup_bonus:
  value:
    points: 125000           # 75,000 after $6,000 + extra 50,000 after additional $3,000, both within first 6 months — amex product page, verified 2026-07-17
  spend_requirement_usd: 9000
  window_months: 6
  notes: >-
    Two-tranche offer: 75k/$6k plus 50k after an additional $3k, all within
    the first 6 months — recorded as the combined 125k/$9k. Verified vs
    americanexpress.com product page 2026-07-17; once-per-lifetime rule
    applies.

pricing:
  model: annual_fee
  annual_fee_usd: 125        # "Annual Fee: $125" — amex product page, verified 2026-07-17
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: good
  entity_types: [sole_prop, llc, corp]
  notes: Revolving co-brand — counts toward the Amex 5-card limit. Tier inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0
  max_cards: 99
  controls: [spending_limits, realtime_alerts]

payment_type: revolving

benefit_flags: []

