# $375 adaptive-category points card: 4x on the business's TOP TWO eligible
# categories each cycle, $150k/yr combined cap. The adaptive_top_n seed.
id: business-gold
name: American Express Business Gold Card
issuer: amex
network: amex
currency:
  type: points
  program: amex_mr
base_rate: 1

portal: amex_travel

category_rewards:            # portal 3X lines; all other elevated earning is the adaptive top-2 block
  - category: travel_flights
    rate: 3                  # "3X points on flights & pre-paid hotels booked on AmexTravel.com" — amex product page, verified 2026-07-17
    portal_only: true
  - category: travel_hotels
    rate: 3
    portal_only: true
    notes: Prepaid hotels booked through amextravel.com only.
merchant_rewards: []

adaptive_top_n:
  n: 2
  rate: 4                    # "4X on the top two eligible categories where your business spends the most each billing cycle" (NerdWallet review, verified 2026-07-17)
  eligible_categories:       # Amex's six-category menu mapped to the business enum
    - advertising            # online/TV/radio advertising at US media providers
    - software_saas          # US electronic goods retailers, software & cloud system providers
    - fuel_fleet             # US gas stations
    - dining                 # US restaurants incl. takeout/delivery
    - transit                # rideshare, trains, taxis, parking, tolls
    - telecom                # monthly wireless phone service from US providers
  cap:
    period: annual
    max_spend_usd: 150000    # "first $150,000 in combined purchases from these categories each calendar year (then 1X)" (NerdWallet review, verified 2026-07-17)
    fallback_rate: 1
  note: >-
    Amex selects the top two categories automatically each billing cycle; the
    optimizer models it deterministically as the profile's two highest-spend
    eligible categories.

credits:
  - name: Flexible business credit
    amount_usd: 20            # "up to $240 back annually ... eligible U.S. purchases at FedEx (through 10/01/2026), Grubhub, and Office Supply Stores" ($20/mo per hub page) — amex product page, verified 2026-07-17
    period: monthly
    usage_keys: [fedex, grubhub, office_supply_stores]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      $20/month against FedEx (only through 10/01/2026), Grubhub, or US office
      supply store purchases — near-full capture for businesses with recurring
      shipping/food/supply spend, monthly forfeit otherwise.
  - name: ChatGPT Business credit
    amount_usd: 300           # "up to $300 back in statement credits per calendar year on U.S. purchases of ChatGPT Business subscriptions" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [chatgpt]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Only against U.S. ChatGPT Business (team workspace) subscriptions, which
      auto-renew; near-full capture for a business already paying for ChatGPT
      Business, $0 otherwise.
  - name: Squarespace credit
    amount_usd: 150           # "up to $150 back each calendar year on U.S. purchases with Squarespace" — amex product page, verified 2026-07-17
    period: annual
    usage_keys: [squarespace]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Only against Squarespace subscriptions (auto-renewing); full value to
      businesses hosting their site there, $0 otherwise.
  - name: Walmart+ membership credit
    amount_usd: 12.95         # "up to $12.95 plus applicable taxes (excluding Plus Ups) back each month" — amex product page, verified 2026-07-17
    period: monthly
    usage_keys: [walmart_plus]
    realistic_capture_rate_note: >-
      Covers one monthly Walmart+ membership paid on the card; monthly-plan
      subscribers capture in full, everyone else $0.

signup_bonus:
  value:
    points: 200000           # "AS HIGH AS 200,000 Membership Rewards Points after you spend $15,000 ... first 3 months" — amex product page, verified 2026-07-17
  spend_requirement_usd: 15000
  window_months: 3
  notes: >-
    "Apply and find out" variable offer — 200,000 is the advertised ceiling
    ("welcome offers vary and you may not be eligible"); exact amount disclosed
    at application and may be lower. Recorded at the ceiling per corpus
    convention. Amex once-per-lifetime bonus rule applies (issuer-rules: amex).
    Verified vs americanexpress.com 2026-07-17.

pricing:
  model: annual_fee
  annual_fee_usd: 375        # NerdWallet review, verified 2026-07-17
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: very_good
  entity_types: [sole_prop, llc, corp]
  notes: >-
    SSN application with personal guarantee. Counts toward the Amex five-card
    policy only as a charge-lineage product (exempt — see payment_type). Tier
    estimate NEEDS human verification.

employee_cards:
  fee_usd: 95                # $95 per employee Business Gold — plan 21 research figure, NEEDS human verification
  free_expense_card_variant: true
  max_cards: 99
  controls: [spending_limits, mcc_restrictions, realtime_alerts, card_freeze]
  note: >-
    No-annual-fee Employee Business Expense Cards are also available; the paid
    employee Gold carries the card's own benefits. V1 scores fee_usd per seat.

payment_type: charge         # charge lineage: pay in full (Pay Over Time optional); exempt from the Amex 5-credit-card limit

benefit_flags: []

sources:
  - url: https://www.americanexpress.com/us/credit-cards/business/business-credit-cards/american-express-business-gold-card-amex/
    supports: [identity, currency, base_rate, category_rewards, adaptive_top_n, credits, signup_bonus, pricing, payment_type]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Official product page read in-browser 2026-07-17: $375 fee, variable SUB
      as-high-as 200k/$15k/3mo, 4X top-2 with $150k calendar-year cap, 3X
      portal flights + prepaid hotels, and the credit stack ($240 flexible
      FedEx/Grubhub/office-supply, $300 ChatGPT, $150 Squarespace, $155
      Walmart+). Page does not enumerate the six 4X-eligible categories
      inline — the enumeration is retained from prior research.
  - url: https://www.nerdwallet.com/reviews/credit-cards/american-express-business-gold
    supports: [identity, currency, base_rate, adaptive_top_n, pricing, business_approval, payment_type]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Prior verification pass; six-category 4X enumeration and approval-tier
      estimate come from this review. Employee-card fee and approval tier
      still NEEDS human verification.
  - url: https://www.americanexpress.com/en-us/business/blueprint/help-center/business-card/employee-cards/
    supports: [employee_cards]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: >-
      99-card limit and employee-spend pooling to the primary account (research
      pass, 3-0 verified for pooling). Per-card $95 fee NEEDS human verification.

notes: >-
  Plan 22A seed card: exercises adaptive_top_n (unique mechanic — no consumer
  equivalent) and a paid employee-card fee. Amex wireless/electronics category
  mappings are curator judgment calls: 'electronic goods retailers, software &
  cloud' → software_saas; 'wireless phone service' → telecom.

