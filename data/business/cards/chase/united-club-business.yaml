# Premium United co-brand: full United Club membership + elevated everyday
# earn. United-locked currency.
id: united-club-business
name: United Club Business Card
issuer: chase
network: visa
portal: united_renowned_hotels   # Renowned Hotels & Resorts for United Cardmembers — the 5x hotel line + hotel credit route through it
currency:
  type: points
  program: united_mileageplus
base_rate: 1.5               # 1.5x on all other purchases — drafted from memory, NEEDS human verification

category_rewards:
  - category: travel_flights
    rate: 8                  # "NEW! 8x total miles on eligible United flights — 6x on the Primary Cardmember's fare plus 2x on the entire United purchase" — chase.com product page, verified 2026-07-17
    notes: >-
      8x total applies to the PRIMARY cardmember's United fare; other United
      purchases (incl. employee fares) earn 2x, Basic Economy less, non-United
      airfare earns base. Modeled at the headline 8x — discount if flight
      spend is mostly employee cards.
  - category: travel_hotels
    rate: 5                  # "5x miles on hotel stays when you prepay directly through Renowned Hotels and Resorts for United Cardmembers" — chase.com product page, verified 2026-07-17
    portal_only: true
    notes: Renowned Hotels & Resorts prepaid bookings only (United's hotel program).

merchant_rewards: []

credits:
  - name: United Club membership
    kind: in_kind
    amount_usd: 750          # "United Club card membership — a $750+ value" — chase.com product page, verified 2026-07-17
    period: annual
    usage_keys: [united]
    realistic_capture_rate_note: >-
      Full United Club membership for cardmember + guest — face value only
      for companies whose staff fly United regularly; $0 otherwise. All
      Access unlock at Premier Gold or $50k annual spend noted, unscored.
  - name: Renowned Hotels credit
    amount_usd: 200          # "up to $200 in credits annually ... prepaid hotel stays purchased directly through Renowned Hotels and Resorts" — chase.com product page, verified 2026-07-17
    period: annual
    usage_keys: [united]
    realistic_capture_rate_note: >-
      Requires routing prepaid hotel bookings through United's Renowned
      Hotels program — situational capture.
  - name: Rideshare credit
    amount_usd: 150          # "up to $150 in credits each calendar year ... on rideshare purchases" (enrollment) — chase.com product page, verified 2026-07-17
    period: annual
    category: transit
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Annual rideshare credit after enrollment — near-full capture for teams
      using rideshare regularly.
  - name: Avis/Budget United car rental credit
    amount_usd: 100          # "up to $100 in United travel credits annually ... Avis or Budget directly through cars.united.com" — chase.com product page, verified 2026-07-17
    period: annual
    usage_keys: [united]
    realistic_capture_rate_note: >-
      Requires booking Avis/Budget through cars.united.com — situational.
  - name: Instacart credit
    amount_usd: 240          # "up to $240 in Instacart credits each calendar year" — chase.com product page, verified 2026-07-17
    period: annual
    usage_keys: [instacart]
    realistic_capture_rate_note: >-
      Only against direct Instacart purchases; near-full capture for offices
      ordering via Instacart, $0 otherwise.

signup_bonus:
  value:
    points: 110000           # "100,000 bonus miles + 2,000 PQP after $5,000 in first 3 months; plus 10,000 bonus miles after you add an employee card in the first 3 months" — chase.com product page, verified 2026-07-17
  spend_requirement_usd: 5000
  window_months: 3
  notes: >-
    Structure verified 2026-07-17: 100k miles + 2,000 PQP after $5k/3mo, plus
    10k miles for adding an employee card in the first 3 months (recorded at
    the combined 110k; PQP unscored).

pricing:
  model: annual_fee
  annual_fee_usd: 695        # "$695" — chase.com product page, verified 2026-07-17
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: excellent
  entity_types: [sole_prop, llc, corp]
  notes: 5/24 applies to the application. Tier inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0
  controls: [spending_limits]

payment_type: revolving

benefit_flags: [lounge_access, free_checked_bag]

sources:
  - url: https://creditcards.chase.com/business-credit-cards/united/united-club-business
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, pricing, employee_cards, payment_type, benefit_flags]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Official product page read in-browser 2026-07-17: $695 fee, 100k+10k SUB
      structure, NEW 8x United flights / 5x Renowned Hotels prepaid / 2x other
      United / 1.5x base, Club membership ($750+ value, guest incl.), $200
      Renowned Hotels + $150 rideshare + $100 Avis/Budget + $240 Instacart
      credits, free 1st+2nd checked bags. $200 JSX + $50 FareLock credits and
      the 5,000-mile better-together bonus not modeled.
  - url: https://creditcards.chase.com/business-credit-cards
    supports: [business_approval]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: Approval tier inferred — NEEDS human verification.

notes: >-
  22B batch 2. The in_kind club-membership credit dominates this card's math —
  its curator-estimated value and capture haircut deserve first human review.

verification:
  last_verified_date: "2026-07-17"
  verified_by: "claude-fable-5 — fee/rates/SUB/club-membership/credits verified in-browser vs chase.com product page 2026-07-17; 8x employee-fare caveat is a modeling judgment, approval tier still inferred"
  confidence: medium
