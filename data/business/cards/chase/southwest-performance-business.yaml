# upgraded boardings + wifi perks (unscored flags).
id: southwest-performance-business
name: Southwest Rapid Rewards Performance Business Card
issuer: chase
network: visa
currency:
  type: points
  program: southwest_rapid_rewards
base_rate: 1

category_rewards:
  - category: travel_flights
    rate: 4                  # "4 points per $1 spent on Southwest Airline purchases" — chase.com product page, verified 2026-07-17
    notes: >-
      Issuer awards 4x on SOUTHWEST purchases specifically — other airfare
      earns base.
  - category: travel_hotels
    rate: 2                  # "2 points per $1 spent on hotel accommodations booked directly with the hotel" — chase.com product page, verified 2026-07-17
