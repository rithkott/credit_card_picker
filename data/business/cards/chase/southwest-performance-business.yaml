    rate: 2
  - category: transit
    rate: 2                  # "2 points per $1 spent on local transit and commuting, including rideshare services" — chase.com product page, verified 2026-07-17

merchant_rewards: []

credits:
  - name: Anniversary points
    amount_points: 9000      # "9,000 bonus points each year after your Cardmember anniversary" — chase.com product page, verified 2026-07-17
    period: annual
    automatic: true
    realistic_capture_rate_note: Posts automatically each cardmember anniversary.
  - name: Global Entry / TSA PreCheck / NEXUS fee credit
    amount_usd: 120          # "one statement credit of up to $120 every four years" — chase.com product page, verified 2026-07-17
    period: every_4_years
    usage_keys: [global_entry_tsa]
    realistic_capture_rate_note: >-
      One application-fee reimbursement every 4 years; captured once per
      renewal cycle by enrollees.

