# $795 premium business travel card on UR: 8x Chase Travel portal, 4x direct
# flights/hotels, $300 travel credit, free employee cards. Premium UR gateway.
id: sapphire-reserve-for-business
name: Chase Sapphire Reserve for Business
issuer: chase
network: visa
portal: chase_travel
currency:
  type: points
  program: chase_ur
base_rate: 1
unlocks_transfers: true

category_rewards:
  - category: travel_flights
    rate: 8                  # "8x points on all purchases through Chase Travel, including The Edit" — chase.com product page, verified 2026-07-17
    portal_only: true
    notes: Chase Travel portal bookings.
  - category: travel_hotels
    rate: 8
    portal_only: true
    notes: Chase Travel portal bookings.
  - category: travel_other
    rate: 8
    portal_only: true
    notes: Chase Travel portal bookings.
  - category: travel_flights
    rate: 4                  # "4x points on flights & hotels booked direct" — chase.com product page, verified 2026-07-17
    notes: Booked directly with airlines.
  - category: travel_hotels
    rate: 4
    notes: Booked directly with hotels.
  - category: advertising
    rate: 3                  # "3x points on social media & search engine advertising" — chase.com product page, verified 2026-07-17

merchant_rewards: []

credits:
  - name: Annual travel credit
    amount_usd: 300          # "up to $300 in statement credits each anniversary year" on travel — chase.com product page, verified 2026-07-17
    period: annual
    category: travel_other
    realistic_capture_rate_note: >-
      Applies automatically to travel purchases across categories — any business
      with travel spend captures it fully. Recorded against travel_other; it
      offsets any travel category. Qualifying purchases earn no points.
  - name: The Edit hotel credit
    amount_usd: 500          # "up to $500 in automatic statement credits annually for bookings made with The Edit, maximum of $250 per transaction" — chase.com product page, verified 2026-07-17
    period: annual
    category: travel_hotels
    portal_only: true
    realistic_capture_rate_note: >-
      Only on The Edit (Chase Travel luxury collection) bookings, two-night
      minimum, $250/transaction max — premium-property rates often exceed
      direct alternatives, so realistic capture is below face.
  - name: Select Chase Travel hotel credit
    amount_usd: 250          # "up to $250 in statement credits through 12/31/26 on prepaid Chase Travel hotel bookings" with IHG/Montage/Pendry/Omni/Virgin/Minor/Pan Pacific — chase.com product page, verified 2026-07-17
    period: annual
    category: travel_hotels
    portal_only: true
    expires: "2026-12-31"
    realistic_capture_rate_note: >-
      Prepaid Chase Travel bookings at seven select chains only, two-night
      minimum, expires 12/31/26 — situational capture.
  - name: Google Workspace credit
    amount_usd: 200          # "up to $200 in annual statement credits on purchases made directly on Google Workspace" — chase.com product page, verified 2026-07-17
    period: annual
    usage_keys: [google_workspace]
    realistic_capture_rate_note: >-
      Near-automatic for a business already paying for Google Workspace
      direct; $0 otherwise.
  - name: ZipRecruiter credit
    amount_usd: 200          # "up to $400 in annual statement credits ... up to $200 January-June and up to $200 July-December" — chase.com product page, verified 2026-07-17
    period: semiannual
    usage_keys: [ziprecruiter]
    realistic_capture_rate_note: >-
      $200 per half-year against direct ZipRecruiter purchases — full capture
      only for businesses hiring through ZipRecruiter in both halves.
  - name: Lyft in-app credit
    amount_usd: 10           # "up to $10 in monthly in-app credits ... through 9/30/27" — chase.com product page, verified 2026-07-17
    period: monthly
    category: transit
    expires: "2027-09-30"
    realistic_capture_rate_note: >-
      $10/month Lyft in-app credit through 9/30/27 — captured by teams that
      ride monthly; forfeits otherwise.
  - name: Global Entry / TSA PreCheck / NEXUS fee credit
    amount_usd: 120          # "one statement credit of up to $120 every four years" — chase.com product page, verified 2026-07-17
    period: every_4_years
    usage_keys: [global_entry_tsa]
    realistic_capture_rate_note: >-
      One application-fee reimbursement every 4 years; captured once per
      renewal cycle by enrollees.

signup_bonus:
  value:
    points: 200000           # "150,000 (struck) → 200,000 bonus points after $30,000 in first 6 months" — chase.com compare page, verified 2026-07-17
  spend_requirement_usd: 30000
  window_months: 6
  limited_time: true
  notes: Elevated offer verified against chase.com 2026-07-17 (standard 150k shown struck).

pricing:
  model: annual_fee
  annual_fee_usd: 795        # chase.com compare page quote "$795; Employee Cards at no additional cost" (verified 3-0 in plan 21 research pass)
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: excellent
  entity_types: [sole_prop, llc, corp]
  notes: >-
    Premium underwriting; SSN + personal guarantee; 5/24 applies to the
    application. Tier inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0                 # "Employee Cards at no additional cost" (verified 3-0)
  controls: [spending_limits]

payment_type: charge         # "A Pay in Full credit card" — chase.com product page, verified 2026-07-17

benefit_flags: [lounge_access]

