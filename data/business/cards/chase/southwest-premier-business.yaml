# $99 Southwest co-brand business card: 3x Southwest + anniversary points.
id: southwest-premier-business
name: Southwest Rapid Rewards Premier Business Card
issuer: chase
network: visa
currency:
  type: points
  program: southwest_rapid_rewards
base_rate: 1

category_rewards:
  - category: travel_flights
    rate: 3                  # "3 points per $1 spent on Southwest Airlines purchases" — chase.com product page, verified 2026-07-17
    notes: >-
      Issuer awards 3x on SOUTHWEST purchases specifically — other airfare
      earns base.
  - category: fuel_fleet
    rate: 2                  # "2 points for every $1 ... at gas stations and restaurants on the first $8,000 in combined purchases per anniversary year" — chase.com product page, verified 2026-07-17
    cap:
      period: annual
      max_spend_usd: 8000
      fallback_rate: 1
      shared_cap_id: swpremier_gas_dining_8k
  - category: dining
    rate: 2
    cap:
      period: annual
      max_spend_usd: 8000
      fallback_rate: 1
      shared_cap_id: swpremier_gas_dining_8k

merchant_rewards: []

credits:
  - name: Anniversary points
    amount_points: 6000      # "6,000 bonus points each year after your Cardmember anniversary" — chase.com product page, verified 2026-07-17
    period: annual
    automatic: true
    realistic_capture_rate_note: Posts automatically each cardmember anniversary.

signup_bonus:
  value:
    points: 60000            # "60,000 points after $3,000 in first 3 months" — chase.com compare page, verified 2026-07-17
  spend_requirement_usd: 3000
  window_months: 3
  notes: Verified against chase.com product page 2026-07-17.

pricing:
