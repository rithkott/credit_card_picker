# $95 business points card: 3x on travel + the ad/shipping/telecom business
# trio, one combined $150k annual pool. THE business-side UR transfer gateway.
id: ink-business-preferred
name: Chase Ink Business Preferred
issuer: chase
network: visa
currency:
  type: points
  program: chase_ur
base_rate: 1
unlocks_transfers: true      # premium UR card: unlocks transfer partners for every UR card in the portfolio

category_rewards:
  - category: travel_flights
    rate: 3                  # "3 points per $1 on the first $150,000 spent in combined purchases ... each account anniversary year: shipping, social media/search engine advertising, internet/cable/phone, travel" — chase.com product page, verified 2026-07-17
    cap: &pool150k
      period: annual
      max_spend_usd: 150000
      fallback_rate: 1
      shared_cap_id: preferred_150k
  - category: travel_hotels
    rate: 3
    cap: *pool150k
  - category: travel_other
    rate: 3
    cap: *pool150k
  - category: advertising
    rate: 3                  # social-media & search-engine advertising
    cap: *pool150k
  - category: shipping
    rate: 3
    cap: *pool150k
  - category: telecom
    rate: 3                  # internet, cable, phone services
    cap: *pool150k

merchant_rewards: []
credits: []

signup_bonus:
  value:
    points: 100000           # "100,000 bonus points after $8,000 in first 3 months" — chase.com compare page, verified 2026-07-17
  spend_requirement_usd: 8000
  window_months: 3
  notes: Verified against chase.com 2026-07-17.

pricing:
  model: annual_fee
  annual_fee_usd: 95         # chase.com compare page, verified 2026-07-16
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: very_good
  entity_types: [sole_prop, llc, corp]
  notes: >-
    SSN application with personal guarantee. Chase 5/24 applies to the
    application; the card does not add to the count once opened. Tier estimate
    NEEDS human verification.

employee_cards:
  fee_usd: 0
  controls: [spending_limits]

payment_type: revolving

benefit_flags: [cell_phone_protection]

sources:
  - url: https://creditcards.chase.com/business-credit-cards/ink/business-preferred
    supports: [identity, currency, base_rate, category_rewards, signup_bonus, pricing, employee_cards, payment_type, benefit_flags]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Official product page read in-browser 2026-07-17: 100k/$8k/3mo SUB, $95
      fee, 3X on $150k anniversary-year combined pool (shipping, social
      media/search engine advertising, internet/cable/phone, travel), APR
      17.74%-26.74%. Time-boxed 5X Lyft not modeled. Approval tier not on
      page — still inferred.
  - url: https://creditcards.chase.com/business-credit-cards
    supports: [business_approval]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: Approval tier inferred — NEEDS human verification.

notes: >-
  Plan 22A seed card. Single six-category $150k combined pool exercises a wide
  shared_cap_id group; unlocks_transfers makes this the business-side gateway
  that upgrades Ink Cash/Unlimited points to transfer-partner value.

verification:
  last_verified_date: "2026-07-17"
  verified_by: "claude-fable-5 — caps/fee/SUB verified in-browser vs chase.com product page 2026-07-17; approval tier still inferred"
  confidence: medium
