# $199 Hyatt co-brand business card: 4x Hyatt + 2x on the business's top
# spend categories (adaptive) — second adaptive_top_n card in the corpus.
id: world-of-hyatt-business
name: World of Hyatt Business Credit Card
issuer: chase
network: visa
currency:
  type: points
  program: world_of_hyatt
base_rate: 1

category_rewards:
  - category: travel_hotels
    rate: 4                  # "4 Bonus Points per $1 spent on qualifying purchases at Hyatt Hotels" (up to 9 total with the ~5 World of Hyatt member base points) — chase.com product page, verified 2026-07-17
    notes: >-
      Issuer awards 4x at HYATT hotels specifically — other hotel spend earns
      base. The extra ~5x from World of Hyatt membership itself is program
      earn, not card earn — excluded.

merchant_rewards: []

adaptive_top_n:
  n: 3
  rate: 2                    # "2 Bonus Points total per $1 spent in your top three spend categories each quarter" — chase.com product page, verified 2026-07-17
  eligible_categories:       # page menu: dining, shipping, airline tickets direct, local transit & commuting, social/search advertising, car rental agencies, gas stations, internet/cable/phone
    - dining
    - shipping
    - travel_flights
    - transit
    - advertising
    - fuel_fleet
    - telecom
  cap:
    period: annual
    max_spend_usd: 1000000   # sentinel — page documents NO combined cap; schema requires a cap object, so an effectively-uncapped ceiling is recorded
    fallback_rate: 1
  note: >-
    2x in the top three eligible spend categories each quarter (modeled
    deterministically as the profile's top-3). Page states NO combined cap —
    the $1M cap is a schema-required sentinel, not an issuer term.
    Car-rental-agency menu item has no matching business category
    (travel_other is broader — omitted); 2x on gym/fitness memberships also
    unmapped, omitted.

credits:
  - name: Hyatt statement credits
    amount_usd: 50           # up to $100/yr ($50 semiannually) at Hyatt properties — NOT visible on the product page main body (lives in the Business benefits overlay), NEEDS human verification
    period: semiannual
    usage_keys: [hyatt]
    realistic_capture_rate_note: >-
      $50 twice a year against Hyatt property spend — captured only by
      companies actually staying at Hyatt. Figure not re-confirmed on the
      2026-07-17 page read (overlay content); flagged for human pass.

signup_bonus:
  value:
    points: 70000            # "70,000 Bonus Points after $7,000 in first 3 months" — chase.com compare page, verified 2026-07-17
  spend_requirement_usd: 7000
  window_months: 3
  notes: Verified against chase.com 2026-07-17.

pricing:
  model: annual_fee
  annual_fee_usd: 199        # "$199" — chase.com product page, verified 2026-07-17
  foreign_transaction_pct: 0  # "No foreign transaction fees" — chase.com product page, verified 2026-07-17

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: very_good
  entity_types: [sole_prop, llc, corp]
  notes: 5/24 applies to the application. Tier inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0
  controls: [spending_limits]

payment_type: revolving

benefit_flags: []

sources:
  - url: https://creditcards.chase.com/business-credit-cards/world-of-hyatt/hyatt-business-card
    supports: [identity, currency, base_rate, category_rewards, adaptive_top_n, signup_bonus, pricing, employee_cards, payment_type]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Official product page read in-browser 2026-07-17: 70k/$7k/3mo SUB, $199
      fee, 4x Hyatt, top-3 quarterly 2x with the 8-item menu (no published
      combined cap — placeholder cap removed), no FTF. Hyatt statement-credit
      benefit lives behind the Business-benefits overlay — amount NOT
      re-confirmed, still NEEDS human verification.
  - url: https://creditcards.chase.com/business-credit-cards
    supports: [credits, business_approval]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: Hyatt credit figure and approval tier — NEEDS human verification.

notes: >-
  22B batch 2. Hyatt-locked currency (strong 1.2-2.0cpp when loyal). Second
  adaptive_top_n card — quarterly selection modeled annually like Business
  Gold's per-cycle selection (deterministic top-3 by profile spend).

verification:
  last_verified_date: "2026-07-17"
  verified_by: "claude-fable-5 — fee/rates/SUB/adaptive-menu verified in-browser vs chase.com product page 2026-07-17; Hyatt credit amount + approval tier still NEEDS human verification"
  confidence: medium
