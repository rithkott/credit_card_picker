# $0-fee BofA choice-category business card: 3% in a chosen category + 2%
# dining on the first $50k combined/yr — choice modeled as adaptive_top_n
# (n=1 picks the user's best eligible category, which equals the optimal choice).
id: business-advantage-customized-cash
name: Bank of America Business Advantage Customized Cash Rewards
issuer: bank-of-america
network: mastercard          # bankofamerica.com, verified 2026-07-17
currency:
  type: cash
  program: cash
base_rate: 1

category_rewards:
  - category: dining
    rate: 2                  # "2% on dining ... once you reach $50,000 in the 3% and 2% categories combined, you earn 1%" — bankofamerica.com, verified 2026-07-17
    cap:
      period: annual
      max_spend_usd: 50000
      fallback_rate: 1
      shared_cap_id: customized_50k

merchant_rewards: []

adaptive_top_n:
  n: 1
  rate: 3                    # 3% in the cardholder-selected category — the consumer schema's `choice` block was dropped; a deterministic optimizer picks the user's top eligible category, which IS the optimal selection, so adaptive_top_n(n=1) is an exact model
  eligible_categories:       # BofA's choice menu mapped to the business enum — mapping NEEDS human verification
    - fuel_fleet             # gas stations / EV
    - office_supplies
    - travel_other           # travel
    - telecom                # TV/telecom & wireless
    - software_saas          # computer services
    - insurance_professional_services  # business consulting services
  cap:
    period: annual
    max_spend_usd: 50000
    fallback_rate: 1
    shared_cap_id: customized_50k
  note: >-
    Cardholder selects the 3% category (changeable monthly); 3% choice + 2%
    dining share one $50,000 combined annual pool, then 1%. Selection modeled
    as the profile's top eligible category.

credits: []

signup_bonus:
  value:
    usd: 500                 # "$500 cash rewards after $5,000 in purchases within 90 days" — bankofamerica.com, verified 2026-07-17
  spend_requirement_usd: 5000
  window_months: 3
  notes: Verified against bankofamerica.com 2026-07-17 (90 days recorded as 3 months).

pricing:
  model: annual_fee
  annual_fee_usd: 0
  foreign_transaction_pct: 3

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: good
  entity_types: [sole_prop, llc, corp]
  notes: >-
    Tier inferred — NEEDS human verification. BofA Preferred Rewards for
    Business boosts earn 25-75% — the business schema has no
    relationship_boost block; recorded here, unscored (baseline modeled).

employee_cards:
  fee_usd: 0
  controls: [spending_limits]

payment_type: revolving

benefit_flags: []

sources:
  - url: https://www.bankofamerica.com/smallbusiness/credit-cards/
    supports: [identity, currency, base_rate, category_rewards, adaptive_top_n, signup_bonus, pricing, business_approval, employee_cards, payment_type]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: Figures drafted from memory — NEEDS human verification.

notes: >-
  22B batch 5. Choice-category card modeled via adaptive_top_n(n=1) — exact
  because a deterministic optimizer would always choose the top-spend eligible
  category. Cross-mechanic shared cap (adaptive + dining line in one pool).

verification:
  last_verified_date: "2026-07-17"
  verified_by: "claude-fable-5 — choice structure, $50k combined cap, SUB, network verified vs bankofamerica.com 2026-07-17; choice-menu mapping + tier still curator judgment"
