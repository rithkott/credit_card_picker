currency:
  type: cash
  program: cash
base_rate: 2                 # unlimited 2% cash back on all purchases

category_rewards:
  - category: travel_hotels
    rate: 5                  # 5% on hotels booked through Capital One Travel
    portal_only: true
    notes: Only when booked through Capital One Travel.
