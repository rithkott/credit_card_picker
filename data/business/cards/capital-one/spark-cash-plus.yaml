# Flat-2% pay-in-full business charge card with a volume fee refund: $150 fee
# refunded at $150k+ annual spend. Seeds fee_refund_spend_usd + charge type on
# a traditional issuer.
id: spark-cash-plus
name: Capital One Spark Cash Plus
issuer: capital-one
network: visa
