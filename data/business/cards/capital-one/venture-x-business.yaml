# $395 premium business travel card: 2x everything, 10x/5x portal, $300
# travel credit + 10k anniversary miles. Does NOT add to 5/24 (exception).
id: venture-x-business
name: Capital One Venture X Business
issuer: capital-one
network: visa
portal: capital_one_travel
currency:
  type: points
  program: capital_one_miles
base_rate: 2                 # "unlimited 2X miles on every purchase, everywhere, no limits or category restrictions" — capitalone.com product page, verified 2026-07-17

category_rewards:
  - category: travel_hotels
    rate: 10                 # 10x hotels + rental cars via Capital One Travel
    portal_only: true
    notes: Capital One Travel bookings.
  - category: travel_other
    rate: 10
    portal_only: true
    notes: Rental cars via Capital One Travel.
  - category: travel_flights
    rate: 5                  # "10X miles on hotels and rental cars, and 5X miles on flights and vacation rentals" through Capital One Business Travel — capitalone.com product page, verified 2026-07-17
    portal_only: true
    notes: Capital One Travel bookings (flights and vacation rentals).

merchant_rewards: []

credits:
  - name: Capital One Travel credit
    amount_usd: 300
    period: annual
    category: travel_other
    portal_only: true
    realistic_capture_rate_note: >-
      $300/yr usable only on Capital One Travel bookings — captured by any
      business with travel spend willing to book through the portal.
  - name: Anniversary miles
    amount_points: 10000     # "10,000 bonus miles every year, starting on your first anniversary" — capitalone.com product page, verified 2026-07-17
    period: annual
    automatic: true
    realistic_capture_rate_note: Posts automatically each anniversary (starting year 2).
  - name: Global Entry or TSA PreCheck credit
    amount_usd: 120          # "up to a $120 statement credit on Global Entry or TSA PreCheck" — capitalone.com product page, verified 2026-07-17
    period: every_4_years
    usage_keys: [global_entry_tsa]
    realistic_capture_rate_note: >-
      Application-fee reimbursement, captured once per enrollment cycle
      (modeled every 4 years per program renewal cadence).

signup_bonus:
  value:
    points: 150000           # "150,000 bonus miles when you spend $30,000 in the first 3 months" — capitalone.com product page, verified 2026-07-17
  spend_requirement_usd: 30000
  window_months: 3
  notes: Verified vs capitalone.com product page 2026-07-17.

pricing:
  model: annual_fee
  annual_fee_usd: 395        # "$395 annual fee" — capitalone.com product page, verified 2026-07-17
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: excellent
  entity_types: [sole_prop, llc, corp]
  notes: >-
    Does NOT report to personal credit — 5/24 exception (issuer-rules:
    capital-one adds_to_524_exceptions). Charge-style pay-in-full product per
    Capital One's premium business positioning. Tier inferred — NEEDS human
    verification.

employee_cards:
  fee_usd: 0                 # free employee + virtual cards, rewards pool to the company (plan 21 research quote)
  controls: [spending_limits, card_freeze]

payment_type: charge         # "designed to be paid in full ... option to carry over a portion of your balance with interest" — capitalone.com product page, verified 2026-07-17; no preset spend limit

benefit_flags: [lounge_access]

sources:
  - url: https://www.capitalone.com/small-business/credit-cards/venture-x-business/
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, pricing, employee_cards, payment_type, benefit_flags]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Official product page read in-browser 2026-07-17: 2x base, 10x portal
      hotels+rental cars / 5x portal flights+vacation rentals, 150k/$30k/3mo
      SUB, $300 portal travel credit, 10k anniversary miles, GE/TSA $120,
      lounge network, pay-in-full with carry-over option, free employee +
      virtual cards, $395 fee.
  - url: https://www.capitalone.com/small-business/credit-cards/
