# Costco co-brand business card (Citi): 4% gas/EV (capped), 3% dining+travel,
# 2% Costco, 1% base. Costco membership prerequisite (unscored, noted).
id: costco-anywhere-business
name: Costco Anywhere Visa Business Card by Citi
issuer: citi
network: visa
currency:
  type: cash                 # annual reward certificate redeemable at Costco ≈ cash — noted
  program: cash
base_rate: 1

category_rewards:
  - category: fuel_fleet
    rate: 4                  # "5% on gas at Costco, 4% on other eligible gas and EV charging; 5% and 4% earn is on a combined $7,000 spend per year, 1% thereafter" — citi.com product page, verified 2026-07-17; modeled at the 4% general-gas rate (5% Costco-gas portion noted)
    cap:
      period: annual
      max_spend_usd: 7000
      fallback_rate: 1
    notes: Costco-pump gas earns 5% within the same combined $7k pool.
  - category: dining
    rate: 3                  # "3% on restaurants and eligible travel, including Costco Travel" — citi.com product page, verified 2026-07-17
  - category: travel_flights
    rate: 3
  - category: travel_hotels
    rate: 3
  - category: travel_other
    rate: 3

merchant_rewards:
  - merchant: costco
    rate: 2                  # "2% on all other Costco and Costco.com purchases" — citi.com product page, verified 2026-07-17
    notes: Requires an active Costco membership (prerequisite unscored — the business schema has no required_membership block; see card notes).

credits: []

signup_bonus: null           # no public SUB on the product page — citi.com, verified 2026-07-17

pricing:
  model: annual_fee
  annual_fee_usd: 0          # "$0 annual fee with active Costco membership" — citi.com product page, verified 2026-07-17
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: excellent
  entity_types: [sole_prop, llc, corp]
  notes: >-
    Citi underwrites this tier at excellent credit — inferred, NEEDS human
    verification. Citi business velocity: 1 business card per 95 days
    (issuer-rules: citi).

employee_cards:
  fee_usd: 0
  controls: [spending_limits]

payment_type: revolving

benefit_flags: []

sources:
  - url: https://www.citi.com/credit-cards/citi-costco-anywhere-visa-business-credit-card
    supports: [identity, currency, base_rate, category_rewards, merchant_rewards, signup_bonus, pricing, employee_cards, payment_type]
    accessed: "2026-07-17"
