# Fintech corporate charge card: EIN-anchored, no personal guarantee,
# underwritten on business bank balance. $0 card cost (per-seat SaaS pricing,
# free tier). Seeds the no-PG approval axis + per_seat pricing model.
id: ramp-corporate-card
name: Ramp Corporate Card
issuer: ramp
network: visa
currency:
  type: cash
  program: cash
base_rate: 1.5               # flat cashback on all purchases — headline rate, NEEDS human verification (Ramp varies rates by agreement)

category_rewards: []
merchant_rewards: []
credits: []
signup_bonus: null

pricing:
  model: per_seat
  free_tier: true            # Ramp base tier: $0/user/mo (ramp.com/pricing, verified 2026-07-17)
  per_seat_monthly_usd: 15   # Ramp Plus: $15/user/mo + platform fee (ramp.com/pricing, verified 2026-07-17)
  platform_fee_note: >-
    Card issuance, controls, and cashback are on the free tier — the optimizer
    scores $0. Ramp Plus ($15/user/mo + platform fee, 20% off annual) buys
    advanced procurement/accounting software, not card economics.
  foreign_transaction_pct: 0

business_approval:
  personal_guarantee: false
  entity_types: [llc, corp]  # registered US entities; sole props not eligible
  requires_ein: true
  min_cash_balance_usd: 25000  # at least $25k in a linked US business bank account (plan 21 research, Nav/Ramp sources) — NEEDS human verification
  notes: >-
    No personal guarantee, no personal credit check: underwritten on the linked
    business bank balance and cash flow. US incorporation and EIN required.
    Thresholds NEED human verification against ramp.com support docs.

employee_cards:
  fee_usd: 0                 # unlimited free physical + virtual cards
  controls: [spending_limits, mcc_restrictions, realtime_alerts, preswipe_policy, card_freeze]
  note: Controls are enforced at the point of swipe (pre-transaction policy).

payment_type: charge         # must be paid in full each cycle

integrations: [quickbooks, netsuite, xero, sage_intacct]
virtual_cards: true

benefit_flags: []

sources:
  - url: https://ramp.com/pricing
    supports: [identity, currency, base_rate, pricing]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: "$0 free tier and $15/user/mo Plus tier verified against the live pricing page."
  - url: https://ramp.com/blog/business-credit-cards-no-personal-guarantee
    supports: [business_approval, employee_cards, payment_type, integrations]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: >-
      No-PG underwriting model and $25k bank-balance threshold from the plan 21
      research pass (Ramp's own content + Nav) — NEEDS human verification
      against Ramp support documentation.

notes: >-
  Plan 22A seed card: exercises the fintech tier end to end — per_seat pricing
  (scored $0 at the free tier), no-PG business_approval with a cash-balance
  anchor, pre-swipe controls, native ERP integrations. Cashback rate is the
  weakest figure here (Ramp has varied it by customer agreement) — NEEDS human
  verification.

verification:
  last_verified_date: "2026-07-17"
  verified_by: "claude-fable-5 (AI draft; pricing tiers verified vs ramp.com) — NEEDS human verification"
  confidence: low
