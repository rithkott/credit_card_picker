# US Bank adaptive business card: 2x in the business's top two spend
# categories each month — third adaptive_top_n card in the corpus.
id: business-leverage
name: U.S. Bank Business Leverage Visa Signature
issuer: us-bank
network: visa
portal: usbank_travel_center
currency:
  type: cash                 # Leverage earns points at fixed ~1cpp — modeled as cash-equivalent, NEEDS human verification
  program: cash
base_rate: 1

category_rewards:
  - category: travel_hotels
    rate: 5                  # "5X points on prepaid hotels and car rentals booked directly in the Travel Center" — usbank.com, verified 2026-07-17
    portal_only: true
    notes: U.S. Bank Travel Center prepaid bookings.
  - category: travel_other
    rate: 5
    portal_only: true
    notes: U.S. Bank Travel Center prepaid car rentals.
merchant_rewards: []

adaptive_top_n:
  n: 2
  rate: 2                    # "2X points in the top two categories where you spend the most each month automatically" — usbank.com product page, verified 2026-07-17
  eligible_categories:       # US Bank tracks 48 merchant groups; mapped to the business enum, menu mapping NEEDS human verification
    - fuel_fleet
    - dining
    - office_supplies
    - telecom
    - shipping
    - utilities
    - wholesale
    - contractors_materials
  cap:
    period: annual
    max_spend_usd: 1000000   # sentinel — page states "No limits on the total rewards your business can earn"; schema requires a cap object
    fallback_rate: 1
  note: >-
    Issuer automatically applies 2x to the top two of its 48 spend categories
    each month; page confirms NO rewards limit (the $1M cap is a
    schema-required sentinel). Enum mapping of the 48-group menu still a
    curator judgment.

credits: []

signup_bonus:
  value:
    usd: 600                 # "Earn up to $600 in rewards when you spend $6,000 ... on the Account Owner's card within the first 120 days" — usbank.com product page, verified 2026-07-17
  spend_requirement_usd: 6000
  window_months: 4
  notes: Employee spend excluded (owner's card only). Verified vs usbank.com product page 2026-07-17.

pricing:
  model: annual_fee
  annual_fee_usd: 95         # "$0 intro annual fee for the first year and $95 thereafter" — usbank.com product page, verified 2026-07-17
  first_year_waived: true
  foreign_transaction_pct: 0  # "no foreign transaction fees on international inventory, supply or travel expenses" — usbank.com product page, verified 2026-07-17

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: good
  entity_types: [sole_prop, llc, corp]
  notes: Tier inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0
  controls: [spending_limits]

payment_type: revolving

benefit_flags: []

sources:
  - url: https://www.usbank.com/business-banking/business-credit-cards/business-leverage-rewards-credit-card.html
    supports: [identity, currency, base_rate, category_rewards, adaptive_top_n, signup_bonus, pricing, employee_cards, payment_type]
    accessed: "2026-07-17"
    added_by: claude-fable-5
    note: >-
      Official product page read in-browser 2026-07-17: 2X top-2 monthly
      (48-category menu, no rewards limit), 5X Travel Center prepaid
      hotels+car rentals, 1X base, $600/$6k/120d SUB (owner's card only),
      $0-intro/$95 fee, free employee cards, no FTF. Approval tier and
      points-vs-cash currency modeling still inferred.
  - url: https://www.usbank.com/business-banking/business-credit-cards.html
    supports: [business_approval]
    accessed: "2026-07-16"
    added_by: claude-fable-5
    note: Approval tier inferred — NEEDS human verification.

notes: >-
  22B batch 3. Third adaptive_top_n card (monthly selection, modeled
  deterministically like the others). No-rewards-limit sentinel cap.

