# US Bank adaptive business card: 2x in the business's top two spend
# categories each month — third adaptive_top_n card in the corpus.
id: business-leverage
name: U.S. Bank Business Leverage Visa Signature
issuer: us-bank
network: visa
portal: usbank_travel_center
currency:
  type: cash                 # Leverage earns points at fixed ~1cpp — modeled as cash-equivalent, NEEDS human verification
  program: cash
base_rate: 1

category_rewards:
  - category: travel_hotels
    rate: 5                  # "5X points on prepaid hotels and car rentals booked directly in the Travel Center" — usbank.com, verified 2026-07-17
    portal_only: true
    notes: U.S. Bank Travel Center prepaid bookings.
  - category: travel_other
    rate: 5
    portal_only: true
    notes: U.S. Bank Travel Center prepaid car rentals.
merchant_rewards: []

adaptive_top_n:
  n: 2
  rate: 2                    # "2X points in the top two categories where you spend the most, automatically" — usbank.com, verified 2026-07-17
  eligible_categories:       # US Bank tracks ~48 merchant groups; mapped to the business enum, menu NEEDS human verification
    - fuel_fleet
    - dining
    - office_supplies
    - telecom
    - shipping
    - utilities
    - wholesale
    - contractors_materials
  cap:
    period: annual
    max_spend_usd: 100000    # placeholder ceiling — issuer cap not confirmed; NEEDS human verification (adjust when terms checked)
    fallback_rate: 1
  note: >-
    Issuer automatically applies 2x to the top two spend categories each
    month across its merchant-group list; menu mapping and cap are curator
    placeholders flagged for the human pass.

credits: []

signup_bonus:
  value:
    usd: 600                 # "Earn 60,000 bonus points" (1cpp) after "$6,000 on the Account Owner's card in the first 120 days" — usbank.com, verified 2026-07-17
  spend_requirement_usd: 6000
  window_months: 4
  notes: 60,000 points at 1cpp; employee spend excluded (owner's card only).

pricing:
  model: annual_fee
  annual_fee_usd: 95
  first_year_waived: true    # NEEDS human verification
  foreign_transaction_pct: 3

business_approval:
  personal_guarantee: true
  min_personal_fico_tier: good
  entity_types: [sole_prop, llc, corp]
  notes: Tier inferred — NEEDS human verification.

employee_cards:
  fee_usd: 0
  controls: [spending_limits]

payment_type: revolving

benefit_flags: []

sources:
