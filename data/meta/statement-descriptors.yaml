# Statement-descriptor keyword registry.
#
# Purpose: groundwork for a future statement-import feature — parse a user's
# credit card statement export and detect merchant-level spend that maps to a
# pointed reward, statement credit, or unlockable benefit in data/cards/.
#
# How this file was built: every merchant/brand below was extracted from the
# terms sheets in data/offer_files/ because at least one card ties a reward
# multiplier, credit, or benefit to spend at that merchant. The
# statement_patterns are the common ways that merchant appears in the
# description field of a US credit card statement.
#
# Matching guidance for the eventual parser:
#   - Match case-insensitively; statements are usually uppercase.
#   - Patterns are stable stems, not exact strings. Real descriptors append
#     store numbers, city/state, dates, phone numbers, or order suffixes
#     (e.g. "LYFT *2 RIDES 06-11", "TARGET 00021453 AUSTIN TX",
#     "DD *DOORDASH CHIPOTLE"). Treat each pattern as a prefix/substring.
#   - "*" appears literally in many processor descriptors (Stripe/Square-style
#     "PAYFAC* MERCHANT"); it is part of the pattern, not a wildcard here.
#   - Aggregator prefixes hide the underlying merchant: "PAYPAL *X",
#     "SQ *X", "TST* X" (Toast, restaurants), "APLPAY X" (some Apple Pay
#     acquirers), "PY *X", "CKE*X". When a prefix matches, the reward usually
#     keys off the PREFIX network (e.g. PayPal 3%) or the underlying merchant
#     after it — both entries exist below where relevant.
#
# Confidence: descriptor variants are heuristics from common knowledge, NOT
# verified against real statement exports. Treat as draft (confidence: low)
# until confirmed with real data; corrections should be made here, never
# inline in card files.
#
# benefit_context is a human note on why the keyword matters (which benefit
# types depend on detecting it) — informational, not machine-parsed.

