# Usage questionnaire registry — grouped, all options visible.
#
# Purpose: the optimizer values a merchant/service/brand-locked credit at $0
# unless the user has confirmed they actually use the underlying service
# (user.confirmed_usage in the spend profile). This file defines the minimal
# question set that collects those confirmations:
#
#   groups: display sections, each with a "do you or will you use these" prompt
#           captioning its always-visible items.
#   items:  the confirmable keys, all shown upfront as checkboxes.
#
# Item keys are globally unique across groups and are the vocabulary for:
#   - credits[].usage_keys in card files (anyOf: one confirmed key unlocks it)
#   - loyalty_keys in data/meta/point-valuations.yaml (gates optimistic cpp
#     for lock-in currencies)
#
# Issuer travel portals are deliberately NOT asked about: the optimizer assumes
# a user books through the portal of whichever card they hold, so portal_only
# earn rates and portal credits are valued without confirmation (the card-level
# `portal` field is validated against statement-descriptors.yaml instead).
#
# Groups may carry `assumed_reward_kind: flights|hotels`. Those groups are the
# BRAND-LOYALTY questions (airlines, hotels): whether the user flies or stays
# in hotels at all is already answered by user.reward_preferences, and a user
# is assumed to book whichever brand gives the best value. So when the matching
# reward kind (or total_value) is in reward_preferences, the group's items are
# treated as assumed-usable for credit gating — at the conservative
# CREDIT_CAPTURE haircut. An explicitly checked item still means brand loyalty:
# it unlocks the program's optimistic cpp (loyalty_keys) and the softer
# CONFIRMED_CREDIT_CAPTURE. Groups without the field keep strict gating:
# unconfirmed = $0.
#
# Invariants (enforced by scripts/validate_cards.py):
#   - every item key exists in data/meta/statement-descriptors.yaml
#   - every item key is referenced by >=1 card usage_keys, card portal, or
#     program loyalty_keys — unreferenced items are warned so the question
#     count stays minimal
#
# Groups are pure UI affordances: every item renders visibly under its group
# prompt; a single-item group renders as one checkbox labeled by the prompt.

groups:
  airlines:
    label: Airlines
    prompt: "Are you loyal to any of these airlines — a frequent-flyer program you stick with?"
    assumed_reward_kind: flights
    items:
      delta: {label: "Delta"}
      united: {label: "United"}
      american_airlines: {label: "American Airlines"}
      southwest: {label: "Southwest"}
      jetblue: {label: "JetBlue"}
      alaska_airlines: {label: "Alaska / Hawaiian"}
      air_canada: {label: "Air Canada"}
      british_airways: {label: "British Airways"}
      aer_lingus: {label: "Aer Lingus"}
      iberia: {label: "Iberia"}
      air_france_klm: {label: "Air France / KLM"}
      emirates: {label: "Emirates"}
      lufthansa: {label: "Lufthansa / Miles & More"}
      frontier: {label: "Frontier"}
      allegiant: {label: "Allegiant"}
      jsx: {label: "JSX (semi-private air)"}

  hotels:
    label: Hotel chains & cruises
    prompt: "Are you loyal to any of these hotel chains or cruise lines?"
    assumed_reward_kind: hotels
    items:
      hilton: {label: "Hilton (Waldorf, Conrad, Hampton, DoubleTree, ...)"}
      marriott: {label: "Marriott (Ritz-Carlton, Westin, Sheraton, Courtyard, ...)"}
      hyatt: {label: "Hyatt (Grand/Park Hyatt, Andaz, Thompson, ...)"}
      ihg: {label: "IHG (InterContinental, Holiday Inn, Kimpton, ...)"}
      wyndham: {label: "Wyndham (Days Inn, La Quinta, Ramada, ...)"}
      choice_hotels: {label: "Choice Hotels (Comfort, Quality Inn, Cambria, ...)"}
      rci: {label: "RCI timeshare exchange"}
      royal_caribbean: {label: "Royal Caribbean / Celebrity / Silversea cruises"}

  rideshare_delivery:
    label: Rideshare, delivery & car rental
    prompt: "Do you (or will you) use any of these rideshare, delivery, or car-rental services?"
    items:
      uber: {label: "Uber rides / Uber One"}
      lyft: {label: "Lyft"}
      uber_eats: {label: "Uber Eats"}
      doordash: {label: "DoorDash / DashPass"}
      grubhub: {label: "Grubhub / Seamless"}
      instacart: {label: "Instacart"}
      turo: {label: "Turo (car sharing)"}
      avis_budget: {label: "Avis / Budget"}
      blacklane: {label: "Blacklane (chauffeur)"}

  streaming:
    label: Streaming & digital subscriptions
    prompt: "Do you (or will you) pay for any of these streaming or digital subscriptions?"
    items:
      disney_plus: {label: "Disney+ / Disney Bundle"}
      hulu: {label: "Hulu"}
      espn: {label: "ESPN+"}
      paramount_plus: {label: "Paramount+"}
      peacock: {label: "Peacock"}
      nytimes: {label: "The New York Times"}
      wsj: {label: "The Wall Street Journal"}
      youtube: {label: "YouTube Premium / YouTube TV"}

  fitness_lifestyle:
    label: Fitness & lifestyle
    prompt: "Do you (or will you) pay for any of these fitness or lifestyle brands?"
    items:
      peloton: {label: "Peloton"}
      equinox: {label: "Equinox"}
      lululemon: {label: "lululemon"}
      oura: {label: "Oura Ring"}

  events:
    label: Live events
    prompt: "Do you (or will you) buy live-event tickets from either of these?"
    items:
      stubhub: {label: "StubHub / viagogo"}
      ticketmaster: {label: "Ticketmaster / Live Nation"}

  airport_security:
    label: Airport security programs
    prompt: "Do you have (or want) any of these airport security programs?"
    items:
      global_entry_tsa: {label: "Global Entry / TSA PreCheck"}
      clear: {label: "CLEAR"}

  brand_programs:
    label: Brand-specific memberships & spend
    prompt: "Do you (or will you) regularly spend with any of these brands?"
    items:
      resy: {label: "Resy (restaurant reservations)"}
      dunkin: {label: "Dunkin'"}
      home_chef: {label: "Home Chef (meal kits)"}
      walmart_plus: {label: "Walmart+ membership"}
      costco: {label: "Costco"}
      sams_club: {label: "Sam's Club"}
      att: {label: "AT&T"}
      verizon: {label: "Verizon"}
      gm: {label: "General Motors (vehicle, OnStar, GM Financial)"}
