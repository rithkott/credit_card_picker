# Two-level usage questionnaire registry.
#
# Purpose: the optimizer values a merchant/service/brand-locked credit at $0
# unless the user has confirmed they actually use the underlying service
# (user.confirmed_usage in the spend profile). This file defines the minimal
# question set that collects those confirmations:
#
#   groups: one yes/no gate question each ("Do you use streaming services?").
#   items:  the confirmable keys revealed only on "yes" ("Which ones?").
#
# Item keys are globally unique across groups and are the vocabulary for:
#   - credits[].usage_keys in card files (anyOf: one confirmed key unlocks it)
#   - the card-level `portal` field (gates portal_only earn rates)
#   - loyalty_keys in data/meta/point-valuations.yaml (gates optimistic cpp
#     for lock-in currencies)
#
# Invariants (enforced by scripts/validate_cards.py):
#   - every item key exists in data/meta/statement-descriptors.yaml
#   - every item key is referenced by >=1 card usage_keys, card portal, or
#     program loyalty_keys — unreferenced items are warned so the question
#     count stays minimal
#
# Groups are pure UI affordances: a "no" on the gate skips all items; a
# single-item group renders as one checkbox.

groups:
  travel_portals:
    label: Issuer travel portals
    prompt: "Do you book travel through a credit-card issuer's travel portal?"
    items:
      chase_travel: {label: "Chase Travel"}
