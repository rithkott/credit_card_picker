# ── Layer 4: MCC / OFX <SIC> ranges -> category ───────────────────────────────
# Coarse last-resort mapping; ranges are inclusive, must not overlap, and are
# deliberately a starter set (expansion deferred; see docs/plans/09).
mcc:
  - {from: 3000, to: 3299, category: travel_flights}   # airline-specific codes
  - {from: 3351, to: 3441, category: travel_other}     # car-rental-specific codes
  - {from: 3501, to: 3999, category: travel_hotels}    # hotel-specific codes
  - {from: 4111, to: 4111, category: transit}          # local commuter transport
  - {from: 4112, to: 4112, category: travel_other}     # passenger railways
  - {from: 4121, to: 4131, category: transit}          # taxi/rideshare, bus lines
  - {from: 4411, to: 4411, category: travel_other}     # cruise lines
  - {from: 4511, to: 4511, category: travel_flights}   # air carriers (non-listed)
  - {from: 4722, to: 4722, category: travel_other}     # travel agencies / OTAs
  - {from: 4784, to: 4784, category: transit}          # tolls and bridge fees
  - {from: 4789, to: 4789, category: transit}          # transportation svcs misc
  - {from: 4812, to: 4816, category: utilities}        # telecom equipment/calls/ISP
  - {from: 4899, to: 4899, category: streaming}        # cable & other pay TV
  - {from: 4900, to: 4900, category: utilities}        # electric/gas/water/sanitary
  - {from: 5310, to: 5311, category: other}            # discount + department stores
  - {from: 5411, to: 5499, category: groceries}        # grocery + specialty food stores
  - {from: 5541, to: 5542, category: gas}              # service stations, automated fuel
  - {from: 5552, to: 5552, category: gas}              # EV charging
  - {from: 5611, to: 5699, category: other}            # clothing stores
  - {from: 5732, to: 5735, category: other}            # electronics + record stores
  - {from: 5812, to: 5814, category: dining}           # restaurants, bars, fast food
  - {from: 5912, to: 5912, category: drugstores}       # drug stores, pharmacies
  - {from: 5921, to: 5921, category: groceries}        # package stores (liquor)
  - {from: 5964, to: 5969, category: online_shopping}  # mail/internet order houses
  - {from: 7011, to: 7011, category: travel_hotels}    # lodging (non-listed)
  - {from: 7512, to: 7519, category: travel_other}     # car rental (non-listed)
  - {from: 7523, to: 7523, category: transit}          # parking lots, garages
  - {from: 7832, to: 7841, category: entertainment}    # movie theaters, video rental
  - {from: 7911, to: 7999, category: entertainment}    # recreation services
  - {from: 8011, to: 8099, category: other}            # medical services
