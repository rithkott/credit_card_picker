# Statement-import categorization rules (plan 09).
#
# Deterministic, hand-curated rules that map a parsed statement transaction to
# one of the real (non-pseudo) spend categories in categories.yaml. Read ONLY
# by server/app.py (GET /api/config -> statement_import) for the in-browser
# statement importer; scripts/optimize.py never reads this file.
#
# The importer matches each transaction descriptor through four layers, first
# hit wins, longest pattern wins within a layer:
#   1. statement-descriptors.yaml patterns -> descriptor_categories (below)
#   2. keywords (below)
#   3. the issuer's own category column (CSV exports) -> issuer_categories
#   4. MCC / OFX <SIC> code -> mcc ranges
# Unmatched transactions surface as "uncategorized" in the review UI.
#
# Every key in statement-descriptors.yaml must appear in exactly one of
# descriptor_categories / aggregator_prefixes / unmapped (validator-enforced),
# so the bridge can never silently fall behind the descriptor registry.
#
# Confidence: like statement-descriptors.yaml, these rules are heuristics NOT
# yet verified against real statement exports — treat as draft (confidence:
# low). Corrections belong here, never hardcoded in site/ or server/ code.

# ── Layer 1 bridge: descriptor key -> spend category ─────────────────────────
# Keys MUST exist in statement-descriptors.yaml. A descriptor match also feeds
# merchant carve-outs (keys in merchants.yaml) and confirmed-usage suggestions
# (keys in usage-questions.yaml items) — this map only decides the category.
