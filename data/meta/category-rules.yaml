  # Trusted traveler / lounges
  clear: travel_other
  global_entry_tsa: travel_other
  priority_pass: travel_other

# Descriptor keys that are payment-processor prefixes hiding the real
# merchant: the importer strips the matched prefix and re-runs layers 1-2 on
# the remainder. fallback_category applies when the remainder matches nothing.
aggregator_prefixes:
  paypal: {}
  square_prefix: {}
  apple_pay_prefix: {}
  toast_prefix: {fallback_category: dining}   # Toast acquires restaurants

# Descriptor keys deliberately left out of the bridge — the importer surfaces
# them as their own labeled "needs your call" group in the review UI instead
# of guessing a category.
unmapped:
  - venmo       # P2P transfers, not merchant spend
  - bilt_rent   # housing payments have no spend category (plan 05 deferred)

