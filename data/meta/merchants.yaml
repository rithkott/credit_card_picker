# Canonical merchant enum for merchant-keyed rewards (merchant_rewards[].merchant).
# Starter list — add merchants only when a card in data/cards/ actually references them.
# `category` maps each merchant to its canonical spend category so the optimizer can
# route merchant-level spend out of the right category bucket.

merchants:
  amazon:
    label: Amazon.com
    category: online_shopping
  whole_foods:
    label: Whole Foods Market
    category: groceries
  costco:
    label: Costco
    category: groceries            # input carve-out semantics (parse_profile)
    # Warehouse clubs are excluded from issuers' supermarket bonus category:
    # category reward lines never pick this bucket up (base rate / explicit
    # merchant_rewards only — see build_lines).
    exclude_from_category_bonus: true
    # Costco warehouses take only Visa credit cards (since 2016): cards on any
    # other network can't earn on this spend at all (see build_lines).
    accepted_networks: [visa]
  uber:
    label: Uber (rides)
    category: transit
  lyft:
    label: Lyft
    category: transit
