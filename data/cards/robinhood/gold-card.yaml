# Fintech flat-rate card: 3% (3 pts/$1) on everything, gated behind PAID Robinhood Gold; points cash out 1cpp into a Robinhood brokerage account.
id: gold-card
name: Robinhood Gold Card
issuer: robinhood
network: visa                # "issued by Coastal Community Bank, pursuant to a license from Visa U.S.A. Inc." (offer file line 31)
currency:
  type: points
  program: robinhood_points   # 1 pt = $0.01 deposited into the linked Robinhood brokerage account (offer file line 25)
base_rate: 3                  # 3 pts/$1 (= 3% back) on all eligible purchases, contingent on active PAID Gold subscription (offer file line 15). No non-Gold rate exists — Gold is a prerequisite to hold the card; see required_membership.

category_rewards:
  # Up to 5 pts/$1 on Robinhood travel-portal bookings (offer file line 16). Portal covers all travel
  # types, so mapped to all three travel keys. THIRD-PARTY reported / NEEDS human verification — not
  # confirmed on Robinhood's own card page during research.
  - category: travel_flights
    rate: 5
    portal_only: true
    notes: >-
      5 pts/$1 only on travel booked through Robinhood's own travel portal. Per third-party reporting;
      not independently confirmed on the primary official Robinhood card page — NEEDS human verification.
  - category: travel_hotels
    rate: 5
    portal_only: true
    notes: >-
      5 pts/$1 only on travel booked through Robinhood's own travel portal. Per third-party reporting;
      not independently confirmed on the primary official Robinhood card page — NEEDS human verification.
  - category: travel_other
    rate: 5
    portal_only: true
    notes: >-
      5 pts/$1 only on travel booked through Robinhood's own travel portal. Per third-party reporting;
      not independently confirmed on the primary official Robinhood card page — NEEDS human verification.

merchant_rewards: []

credits: []

signup_bonus: null            # "No signup/welcome bonus found on official Robinhood pages" (offer file line 12)

fees:
  annual_fee_usd: 0           # $0 on the card itself (offer file line 19); the $50/yr Gold membership is a separate mandatory cost — see required_membership
  foreign_transaction_pct: 0  # "No foreign transaction fee (per official Robinhood card terms)" (offer file line 22)

approval:
  credit_tier: good           # INFERRED — not stated in the offer file. Invite/waitlist metal card requiring a funded brokerage account and paid Gold membership; estimated at good-tier underwriting. NEEDS human verification.
  notes: >-
    credit_tier is an inference, not stated in the offer file — estimated from the card's invite-only
    positioning and brokerage/paid-membership prerequisites. NEEDS human verification. Card is invite-only
    via robinhood.com/creditcard/waitlist as of mid-2026; not open enrollment. Only the primary cardholder
    is eligible (not authorized users).

required_membership:
  name: Robinhood Gold
  annual_cost_usd: 50         # cheapest qualifying tier: $50/year (vs $5/month = $60/yr) (offer file line 4)
  note: >-
    A PAID, active Robinhood Gold subscription ($5/month or $50/year) is a mandatory prerequisite to
    hold the card and to earn its 3 pts/$1 rate — the card itself has no 30-day free trial. This is an
    ongoing cost separate from the $0 card annual fee; a cardholder unwilling to pay for Gold cannot
    obtain the advertised earn rate economically. Not scored in v1.

