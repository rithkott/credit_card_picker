# Grocery-heavy cash card: 6% US supermarkets (capped $6k/yr) + 6% US streaming, 3% transit & gas; $95 AF.
id: blue-cash-preferred
name: Blue Cash Preferred Card from American Express
issuer: amex
network: amex
currency:
  type: cash
  program: cash
base_rate: 1                 # "1% cash back on all other eligible purchases"

category_rewards:
  - category: groceries
    rate: 6                  # "6% ... U.S. supermarkets ... first $6,000/year, then 1%"
    cap:
      period: annual
      max_spend_usd: 6000
      fallback_rate: 1
    notes: >-
      US supermarkets only. Superstores, convenience stores, warehouse clubs, and
      meal-kit delivery services are NOT treated as supermarkets.
  - category: streaming
    rate: 6                  # "6% cash back on eligible U.S. streaming subscriptions from select providers"
    notes: >-
      Select US streaming providers only (current list at
      americanexpress.com/rewards-info); no stated cap. Bundled or third-party-
      billed subscriptions (cable/telecom/internet/car manufacturer) may not qualify.
  - category: transit
    rate: 3                  # "3% cash back on transit"
    notes: >-
      Trains, taxis, rideshare, ferries, tolls, parking, buses, subways. Airfare,
      car rental, and cruises are NOT treated as transit.
  - category: gas
    rate: 3                  # "3% cash back on gas station purchases in the U.S."
    notes: >-
      US gas stations only; superstores/supermarkets/warehouse clubs selling gas
      are NOT treated as gas stations.

merchant_rewards: []

credits:
  - name: Disney Streaming Credit
    amount_usd: 10           # "up to $10/month ... ($120/year max)"
    period: monthly
    category: streaming
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Only captured if you pay for Disney+, Hulu, or ESPN directly and enroll; one
      $10 credit per month even on annual plans; monthly forfeit. Excludes
      third-party billing and cable bundles.
  - name: American Express Venue Collection Concessions Credit
    amount_usd: 25           # 10% back up to $250/yr; modeled at a realistic fraction of the cap
    period: annual
    category: entertainment
    requires_enrollment: true
    expires: "2026-12-31"
    realistic_capture_rate_note: >-
      10% back (up to $250/yr) on Venue Collection stadium/arena concessions,
      enrollment required. Most cardholders attend few/no such events; realistic
      capture is a small fraction of the $250 cap — modeled at ~$25.

signup_bonus:
  value:
    usd: 300                 # "As high as $300 cash back"
  spend_requirement_usd: 3000
  window_months: 6
  notes: >-
    Offer file states "as high as $300"; exact eligible amount disclosed after
    application and may be lower. Once-per-lifetime style eligibility (see
    approval.notes).

fees:
  annual_fee_usd: 95         # "$0 intro for first year, then $95"
  first_year_waived: true
  foreign_transaction_pct: 2.7  # "2.7% ... after conversion to US dollars"

approval:
  credit_tier: good
  notes: >-
    credit_tier is an inference from the card's mainstream mid-tier positioning; not
    stated in the offer file — NEEDS human verification. Amex welcome-offer
    eligibility is once-per-lifetime and also blocked if you have/had this Card or
    the Morgan Stanley Blue Cash Preferred (or previous versions).

benefit_flags:
  - purchase_protection
  - extended_warranty
  - car_rental_insurance

sources:
  - url: https://www.americanexpress.com/us/credit-cards/card/blue-cash-preferred/
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      Canonical Amex product page. URL not in offer file and not fetched this
      session; figures transcribed from the local offer file and unconfirmed.

notes: >-
  Drafted offline from data/offer_files/amex/blue-cash-preferred.txt; all figures
  unconfirmed pending human verification. Redemption is statement credit or at
  Amazon.com checkout, no minimum.

verification:
  last_verified_date: "2026-07-04"
  verified_by: "claude-opus-4-8 (AI draft) — NEEDS human verification"
  confidence: low
