# Top Hilton co-brand: 3x base, 7x dining/airfare/car-rental, Diamond status, annual free night; $550 AF.
id: hilton-aspire
name: Hilton Honors American Express Aspire Card
issuer: amex
network: amex
currency:
  type: points
  program: hilton_honors
base_rate: 3                 # "base 3x"

category_rewards:
  - category: dining
    rate: 7                  # "7x (3 base + 4 bonus) at US restaurants"
    notes: >-
      US restaurants only; excludes restaurants inside another establishment,
      nightclubs, convenience/grocery/supermarkets, and non-US locations of US chains.
  - category: travel_flights
    rate: 7                  # "7x ... on scheduled-airline airfare"
    notes: Scheduled-airline airfare (direct or via Amex Travel); excludes charter/private jet.
  - category: travel_other
    rate: 7                  # "7x ... at select major car rental companies"
    notes: Select major car rental companies only.

merchant_rewards: []

credits:
  - name: Airline Flight Credit
    amount_usd: 50           # "up to $50/calendar quarter"
    period: quarterly
    category: travel_flights
    realistic_capture_rate_note: >-
      $50/quarter ($200/yr) on airfare purchased directly from an airline or via Amex
      Travel; excludes charter/private jet and vacation packages. Captured by anyone
      who buys airfare each quarter.
  - name: Hilton Resort Credit
    amount_usd: 200          # "up to $200 semiannually (Jan-Jun, Jul-Dec)"
    period: semiannual
    usage_keys: [hilton]
    category: travel_hotels
    realistic_capture_rate_note: >-
      $200 twice a year ($400/yr) on purchases made directly with participating Hilton
      Resorts; excludes Small Luxury Hotels and Advance Purchase/Non-Refundable rates;
      incidentals must be room-charged and paid with this card. Captured only by guests
      who stay at participating Hilton resorts.
  - name: Property Credit (Waldorf Astoria / Conrad)
    amount_usd: 100          # "up to $100 hotel-folio credit per booking (2-night minimum)"
    period: annual
    usage_keys: [hilton]
    category: travel_hotels
    realistic_capture_rate_note: >-
      Up to $100 folio credit per qualifying booking (2-night min) at Waldorf Astoria/
      Conrad via a special rate code; forfeited at checkout if unused. Face value is
      per-booking, but modeled as ~$100/yr since most cardholders make at most one such
      booking; $0 for those who don't stay at these luxury brands.
  - name: CLEAR Plus Credit
    amount_usd: 219          # "up to $219/calendar year"
    period: annual
    usage_keys: [clear]
    category: travel_other
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Covers an annual CLEAR+ membership (~$219); requires separate CLEAR enrollment.
      Full value only to CLEAR users.
  - name: Annual Free Night Reward
    kind: in_kind
    amount_usd: 200          # estimated value of one standard Hilton night at ~0.4-0.6 cpp redemption
    period: annual
    usage_keys: [hilton]
    category: travel_hotels
    realistic_capture_rate_note: >-
      One free standard-room night each card year at most Hilton properties (expires 1
      year from issuance, one redemption per year). Value varies hugely by property; a
      standard Hilton night is estimated at ~$200 (roughly a 40-50k-point redemption at
      Hilton's ~0.4-0.6cpp), and the model applies a further in-kind capture haircut.
  - name: Free Night Reward ($30k spend)
    kind: in_kind
    amount_usd: 200          # same curator-estimated standard-night value as the Annual Free Night Reward above
    period: annual
    usage_keys: [hilton]
    category: travel_hotels
    unlock_spend_usd: 30000  # "an additional free night after $30,000 calendar-year spend"
    realistic_capture_rate_note: >-
      Additional standard-room free night earned only after $30,000 calendar-year
      spend; same redemption terms as the Annual Free Night Reward. Captured only by
      very heavy spenders who also stay at Hilton.
  - name: Free Night Reward ($60k spend)
    kind: in_kind
    amount_usd: 200          # same curator-estimated standard-night value as the Annual Free Night Reward above
    period: annual
    usage_keys: [hilton]
    category: travel_hotels
    unlock_spend_usd: 60000  # "a second after $60,000 (up to 2 extra nights/year)"
    realistic_capture_rate_note: >-
      Second additional standard-room free night earned only after $60,000
      calendar-year spend; same redemption terms as the Annual Free Night Reward.
      Captured only by extreme spenders who also stay at Hilton.
  - name: American Express Venue Collection Concessions Credit
    amount_usd: 25
    period: annual
    category: entertainment
    requires_enrollment: true
    expires: "2026-12-31"
    realistic_capture_rate_note: >-
      10% back (up to $250/yr) on Venue Collection concessions, enrollment required;
      realistic capture is a small fraction — modeled at ~$25.

signup_bonus:
  value:
    points: 175000           # "175,000 Hilton Honors Bonus Points after $6,000 spend in first 6 months"
  spend_requirement_usd: 6000
  window_months: 6
  expires: "2026-07-29"
  notes: >-
    Offer ends 07/29/2026 per the offer file. Bonus points don't count toward elite
    qualification. Standard evergreen bonus not separately stated.

fees:
  annual_fee_usd: 550        # "Annual Fee: $550"
  foreign_transaction_pct: 0 # "Foreign Transaction Fee: None"

approval:
  credit_tier: excellent
  notes: >-
    credit_tier is an inference from the card's top-tier premium underwriting; not
    stated in the offer file — NEEDS human verification. Amex welcome-offer
    eligibility is once-per-lifetime (blocked if you have/had this Card or prior
    versions). Complimentary Hilton Diamond status (lost if the card is cancelled).

benefit_flags:
  - no_foreign_transaction_fee
  - elite_status
  - cell_phone_protection
  - trip_cancellation_insurance
  - car_rental_insurance
  - extended_warranty

sources:
  - url: https://www.americanexpress.com/us/credit-cards/card/hilton-aspire/
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      Canonical Amex product page. URL not in offer file and not fetched this
      session; figures transcribed from the local offer file and unconfirmed.

