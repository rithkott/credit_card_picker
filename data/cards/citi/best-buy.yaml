# Store-only My Best Buy Credit Card: 5% back (2.5 pts/$) at Best Buy, deferred-interest financing.
id: best-buy
name: My Best Buy Credit Card
issuer: citi
network: mastercard           # PLACEHOLDER — private-label store card, network not stated; see notes
currency:
  type: points
  program: best_buy_rewards
base_rate: 2.5               # "2.5 points for every $1 spent" = 5% back (best_buy_rewards floor 2.0cpp)
base_rate_conditional:
  rate: 3                    # 6% back = 3 pts/$ at 2cpp, with paid My Best Buy Plus/Total membership
  requires: paid My Best Buy Plus ($29.99/yr) or Total ($199.99/yr) membership
  note: >-
    Membership adds 1% (1 pt/$) on eligible Best Buy purchases, stacking with the card's
    5% to 6% back. Recorded, not scored — the baseline is the no-membership 5% (2.5 pts/$).

category_rewards: []

merchant_rewards: []

credits: []

signup_bonus: null           # first-day extra 5% (10% total first day) has no hard dollar cap and is unvaluable — see notes

fees:
  annual_fee_usd: 0           # "No annual fee ($0) on the store-only My Best Buy Credit Card"
  foreign_transaction_pct: 0  # not stated; domestic closed-loop store card — inferred 0, NEEDS human verification

approval:
  credit_tier: fair
  notes: >-
    credit_tier estimated from typical store-card underwriting (retail cards approve
    thinner files than premium open-loop cards); not stated in the offer file. Applicants
    are generally first considered for the open-loop My Best Buy Visa, then this store
    card, then the Visa Gold. NEEDS human verification.

benefit_flags:
  - special_financing         # deferred-interest / reduced-rate promotional plans (retroactive-interest trap)

sources:
  - url: https://www.bestbuy.com/site/electronics/best-buy-credit-cards/pcmcat247400050000.c
    supports: [identity, currency, base_rate, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      Canonical Best Buy credit-card page; URL not in the offer file and NOT fetched
      this session — figures unconfirmed. Values transcribed from
      data/offer_files/citi/best-buy.txt (itself partly aggregator-sourced). NEEDS
      human verification.

notes: >-
  Drafted offline from data/offer_files/citi/best-buy.txt; all figures unconfirmed. This
  is the STORE-ONLY My Best Buy Credit Card (usable only at Best Buy / BestBuy.com), NOT
  the open-loop My Best Buy Visa (which has different gas/dining/grocery categories and is
  a separate file if added). REGISTRY / MODELING GAP: this is a closed-loop card, but
  merchants.yaml has no `best_buy` key, so the `closed_loop` block CANNOT be expressed —
  as modeled the optimizer will wrongly treat base_rate 2.5 as earnable everywhere.
  A reviewer must add a `best_buy` merchant key and a closed_loop block restricting spend
  to Best Buy. network is a PLACEHOLDER (private-label store cards are typically not
  network-branded; the offer file states no network). base_rate 2.5 pts/$ = 5% back via
  the best_buy_rewards program (250 pts = $5 certificate, 2cpp). First-day 10%-back new-
  account offer is OMITTED as a signup bonus: it has no hard dollar cap and its value
  depends entirely on first-day spend. Deferred-interest / reduced-rate financing plans
  are out of scope for the value model (special_financing flag).

verification:
  last_verified_date: "2026-07-04"
  verified_by: "claude-opus-4-8 (AI draft) — NEEDS human verification"
  confidence: low
