category_rewards:
  - category: choice
    rate: 5                   # "5% cash back (5 ThankYou points/$1) on purchases in your top eligible spend category each billing cycle, on up to $500 spent"
    choice:
      options: [dining, gas, groceries, travel_other, transit, streaming, drugstores, entertainment]
      note: >-
        Citi AUTOMATICALLY applies the 5X to whichever eligible category the cardholder spends the
        most in each billing cycle — there is no manual selection and no activation. Modeled with the
        'choice' pseudo-category (the optimizer picks the best-fit option per portfolio), which mirrors
        the automatic top-category behavior. Issuer's eligible list: restaurants→dining, gas
        stations→gas, grocery stores→groceries, select travel→travel_other, select transit→transit,
        select streaming→streaming, drugstores→drugstores, live entertainment→entertainment.
        REGISTRY GAP: "home improvement stores" and "fitness clubs" have no registry keys and are
        omitted from options.
    cap:
      period: monthly          # per billing cycle ≈ monthly
      max_spend_usd: 500       # "on up to $500 spent per billing cycle"
      fallback_rate: 1         # spend above $500/cycle in the top category earns the 1% base
    notes: >-
      The 5X applies to the first $500 of top-category spend each billing cycle; above that, 1%.
      Only ONE category earns 5X per cycle (the highest-spend eligible one), which the choice
      expansion models by selecting a single option per portfolio.

