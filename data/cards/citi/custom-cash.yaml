# Archetype: choose-your-own-category card. The 5% category is the cardholder's top
# eligible spend category each billing cycle — effectively user-selected, so it is
# modeled with the `choice` pseudo-category; the optimizer expands this card into one
# variant per option and lets the portfolio search pick the best configuration.
id: custom-cash
name: Citi Custom Cash
issuer: citi
network: mastercard
currency:
  type: points
  program: citi_typ
base_rate: 1
category_rewards:
  - category: choice
    rate: 5
    cap:
      period: monthly
      max_spend_usd: 500
      fallback_rate: 1
    choice:
      options: [dining, gas, groceries, travel_other, transit, streaming, drugstores, entertainment]
      note: >-
        Applies automatically to the top eligible spend category each billing cycle
        (no manual selection needed). Issuer list also includes home improvement
        stores and fitness clubs, which have no registry category yet — add keys
        only if a user profile needs them.
merchant_rewards: []
credits: []
signup_bonus:
  value:
    usd: 200
  spend_requirement_usd: 1500
  window_months: 6
fees:
  annual_fee_usd: 0
  foreign_transaction_pct: 3
approval:
  credit_tier: good
  estimated_min_score: 670
benefit_flags: []
sources:
  - url: https://www.citi.com/credit-cards/citi-custom-cash-credit-card
    supports: [identity, currency, base_rate, category_rewards, signup_bonus, fees, approval]
    accessed: "2026-07-03"
    added_by: claude-draft
    note: URL not actually fetched — numbers drafted from model knowledge; re-source during human verification
verification:
  last_verified_date: "2026-07-03"
  verified_by: claude-draft (NEEDS human verification against issuer terms)
  confidence: low
