# $95 ThankYou travel card: 3x on travel/dining/groceries/gas + 10x Citi Travel portal.
id: strata-premier
name: Citi Strata Premier
issuer: citi
network: mastercard           # network not stated in offer file; Citi Strata Premier is a Mastercard — inferred
currency:
  type: points
  program: citi_typ
base_rate: 1                 # "1 point/$1 on all other purchases"

category_rewards:
  - category: travel_hotels
    rate: 10                  # "10 total points/$1 on hotel ... bookings via the Citi Travel site"
    portal_only: true
    notes: >-
      Hotels booked through Citi Travel (cititravel.com). Portal-only. Hotels booked
      direct earn 3X (separate entry below).
  - category: travel_other
    rate: 10                  # "10 total points/$1 on ... car rental, and attraction bookings via Citi Travel"
    portal_only: true
    notes: Car rentals and attractions booked through Citi Travel. Portal-only.
  - category: travel_hotels
    rate: 3                   # "3 points/$1 on ... hotel purchases not booked through Citi Travel"
    notes: >-
      Hotels booked direct (not via Citi Travel) — the non-portal 3X rate. Two
      travel_hotels entries exist: 10X portal-only and this 3X direct.
  - category: travel_flights
    rate: 3                   # "3 points/$1 on air travel ... not booked through Citi Travel"
    notes: Air travel (airlines direct or travel agencies).
  - category: dining
    rate: 3                   # "3 points/$1 at restaurants"
    notes: >-
      Excludes bakeries, caterers, and restaurants inside another business (hotel, store,
      stadium, grocery store, warehouse club).
  - category: groceries
    rate: 3                   # "3 points/$1 at supermarkets"
    notes: >-
      Supermarket MCC only; excludes discount superstores, convenience stores, drugstores,
      warehouse clubs, specialty food markets, bakeries, candy/nut stores, meal-kit delivery.
  - category: gas
    rate: 3                   # "3 points/$1 at gas stations and EV charging"
    notes: >-
      Excludes warehouse clubs, discount/department stores, and convenience stores not
      coded as gas/EV.

