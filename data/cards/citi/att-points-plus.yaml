notes: >-
  Drafted offline from data/offer_files/citi/att-points-plus.txt; all figures
  unconfirmed. network (mastercard) is inferred — not stated — NEEDS human verification.
  REGISTRY GAP / OMITTED REWARD: the "2 points per $1 on products/services purchased
  directly from AT&T (incl. phone/internet bill payments)" rate is OMITTED — there is no
  AT&T merchant key in merchants.yaml, and mapping it to the broad `utilities` category
  would wrongly credit ALL utility/phone spend (the rate is AT&T-only). Needs an
  `att` merchant key to model correctly. The AT&T AutoPay + paperless discount is
  provided by AT&T (not a card benefit) and is not modeled.

