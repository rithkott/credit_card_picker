# Frontier Airlines co-brand: Frontier Miles; 3x dining, brand flyfrontier.com earn omitted; $100 anniversary voucher, $99 AF.
id: frontier
name: Frontier Airlines World Mastercard
issuer: barclays
network: mastercard             # "World Mastercard" in the product name
currency:
  type: points
  program: frontier_miles
base_rate: 1                    # "1x mile on all other purchases"

category_rewards:
  # OMITTED: "Up to 15x at flyfrontier.com" = 10x Frontier Miles membership (loyalty program, not
  # card-attributable) + 5x card usage. The 5x card portion is brand-specific with no `frontier`
  # merchant key; not force-fit onto travel_flights. See notes / registry gap.
  - category: dining
    rate: 3                      # "3x miles on eligible restaurant purchases"

merchant_rewards: []

credits:
  - name: Anniversary flight voucher
    amount_usd: 100             # "$100 flight voucher every account anniversary after spending $2,500+"
    period: annual
    usage_keys: [frontier]
    kind: in_kind               # Frontier-only flight voucher, redemption-restricted
    unlock_spend_usd: 2500      # total card spend in the cardmembership year
    realistic_capture_rate_note: >-
      $100 Frontier flight voucher each anniversary, but only after $2,500+ total card spend in
      the cardmembership year. Redeemable only toward Frontier airfare, so worth less than $100
      to non-Frontier flyers; the optimizer's in-kind haircut applies.
    notes: >-
      Face value $100; modeled in_kind because it is redeemable only on Frontier flights.

signup_bonus:
  value:
    points: 60000              # "60,000 Travel Miles after $1,000 + paying the annual fee, within first 90 days"
  spend_requirement_usd: 1000
  window_months: 3             # offer states "first 90 days" (~3 months)
  notes: >-
    Also requires paying the annual fee in full within the first 90 days.

fees:
  annual_fee_usd: 99           # "Annual fee: $99"
  foreign_transaction_pct: 0   # "Foreign transaction fee: 0%" / "No foreign transaction fees"

approval:
