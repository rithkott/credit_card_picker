  - category: dining
    rate: 2                      # "2 points/$1 at restaurants and eligible grocery stores"
  - category: groceries
    rate: 2                      # same 2x tier (eligible grocery stores)
    notes: >-
      "Eligible grocery stores" — superstores/warehouse clubs may be excluded (not stated).
      NEEDS human verification.

merchant_rewards: []

credits:
  - name: TrueBlue Travel statement credit
    amount_usd: 300             # "Up to $300/calendar year in statement credits on TrueBlue Travel purchases"
    period: annual
    category: travel_flights
    realistic_capture_rate_note: >-
      Up to $300/calendar year automatically credited against eligible TrueBlue Travel
      purchases. Easily captured by anyone who spends $300+/year on JetBlue/TrueBlue travel;
      worthless to non-JetBlue flyers.
  - name: Anniversary bonus points
    amount_points: 5000         # "5,000 bonus points each year after account anniversary"
    period: annual
    realistic_capture_rate_note: >-
      Automatic 5,000 TrueBlue points each year after the account anniversary; captured by every
      cardholder who keeps the card open.
  - name: Global Entry / TSA PreCheck fee credit
    amount_usd: 120             # "up to $120 every 4 years"
    period: every_4_years
    realistic_capture_rate_note: >-
      One statement credit up to $120 per 4-year cycle for a Global Entry/TSA PreCheck fee.
      Captured only by travelers who apply/renew.
  - name: Companion Pass credit — first tranche
    amount_usd: 500             # "$500 credit after $15,000 in eligible net purchases in a calendar year"
    period: annual
    unlock_spend_usd: 15000     # total card spend in the calendar year (whole-card threshold)
    realistic_capture_rate_note: >-
      One-time $500 statement credit once $15,000 in total net purchases posts in a calendar
      year; reached only by fairly heavy spenders. Marketed as offsetting a JetBlue Companion
      Pass.
  - name: Companion Pass credit — second tranche
    amount_usd: 1500            # "additional one-time $1,500 credit after $75,000 net purchases (incl. the initial $15,000)"
    period: annual
    unlock_spend_usd: 75000     # cumulative total card spend in the calendar year
    realistic_capture_rate_note: >-
      Additional one-time $1,500 statement credit once cumulative total net purchases reach
      $75,000 in the same calendar year; reachable only by very high spenders.

signup_bonus:
  value:
    points: 100000             # "100,000 bonus points after $5,000 + paying the annual fee, within first 90 days"
  spend_requirement_usd: 5000
  window_months: 3             # offer states "first 90 days" (~3 months)
  notes: >-
    Also requires paying the annual fee in full within the first 90 days.

fees:
  annual_fee_usd: 499          # "Annual fee: $499 ($150 for each authorized user)"
  foreign_transaction_pct: 0   # "Foreign transaction fee: 0%" / "No foreign transaction fees"

approval:
