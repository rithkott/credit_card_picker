# JetBlue co-brand (premium tier): TrueBlue points; 2x dining + groceries; $300 travel credit, lounge access, companion-pass spend credits, $499 AF.
id: jetblue-premier
name: JetBlue Premier Card
issuer: barclays
network: mastercard             # "JetBlue Premier World Elite Mastercard"
currency:
  type: points
  program: jetblue_trueblue
base_rate: 1                    # "1 point/$1 on all other purchases"

category_rewards:
  # OMITTED: "6 points/$1 on eligible JetBlue purchases" — brand-specific with no `jetblue`
