  Drafted offline from data/offer_files/barclays/wyndham-earner.txt; all figures
  third-party/unconfirmed, confidence low, NEEDS human verification. OMITTED reward (registry
  gap): "8 points/$1 at Hotels by Wyndham" — brand-specific with no `wyndham` merchant key; a
  reviewer may add a `wyndham` merchant and model it. The 4x "Vacation Club" portion has no
  registry category and is not separately modeled (Vacation Club down payments are excluded from
  base earn). Groceries 4x excludes Target/Walmart. The four "$400 in annual benefits" credits
  ($100 hotel + $120 meal delivery + $100 streaming + $65 wholesale) are modeled individually.
  Not dollar-valued: automatic DIAMOND elite status is a benefit_flag. Soft perks noted only:
  redeem 25% fewer points on free nights (redemption-side); cardmember booking discount. Sibling
  card: data/cards/barclays/wyndham-plus.yaml (Plus, $95). credit_tier is an estimate.

