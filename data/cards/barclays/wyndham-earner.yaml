# Wyndham Rewards co-brand (Premier tier): Wyndham points; 4x dining/groceries/travel, brand hotel earn omitted; $400 credit bundle, DIAMOND status, $395 AF.
id: wyndham-earner
name: Wyndham Rewards Earner Premier Card
issuer: barclays
network: visa                   # "Visa Signature"
currency:
  type: points
  program: wyndham_rewards
base_rate: 1                    # "1 point/$1 on all other purchases (excludes Vacation Club down payments)"

category_rewards:
  # OMITTED: "8 points/$1 at Hotels by Wyndham" — brand-specific with no `wyndham` merchant key;
  # not force-fit onto travel_hotels. See notes / registry gap.
  - category: dining
    rate: 4                      # "4 points/$1 on eligible Vacation Club, travel, dining, and grocery store purchases"
  - category: groceries
    rate: 4                      # same 4x tier
    notes: Excludes Target and Walmart (stated in the offer file).
  - category: travel_flights
    rate: 4                      # same broad "travel" 4x tier
  - category: travel_hotels
    rate: 4                      # same broad "travel" 4x tier (non-Wyndham hotels)
  - category: travel_other
    rate: 4                      # same broad "travel" 4x tier

merchant_rewards: []

credits:
  - name: Anniversary bonus points
    amount_points: 30000        # "30,000 bonus points each anniversary year after annual fee payment"
    period: annual
    automatic: true    # pays out with no merchant-specific action
    realistic_capture_rate_note: >-
      30,000 Wyndham points each anniversary after the annual fee posts (up to ~4 free nights);
      captured by every renewing cardholder. Valued via the wyndham_rewards program.
  - name: Annual hotel credit
    amount_usd: 100             # "$100 annual credit for eligible hotel purchases ($100+ aggregate spend/calendar year)"
    period: annual
    usage_keys: [wyndham]
    category: travel_hotels
    realistic_capture_rate_note: >-
      Scoped trigger: requires $100+ aggregate spend at eligible Wyndham brands (Wyndham,
      Wyndham Grand, Dolce, Trademark, Registry Collection) in a calendar year — NOT total card
      spend, so unlock_spend_usd is unset. Easily captured by anyone who stays at these brands.
  - name: Meal delivery credit
    amount_usd: 10              # "$120 annual meal delivery credit ... up to $10/month" -> per-month face
    period: monthly
    usage_keys: [doordash, grubhub]
    category: dining
    realistic_capture_rate_note: >-
      Up to $10/month on third-party meal-delivery services (monthly forfeit, no rollover;
      $120/year aggregate). Captured only by regular delivery users; forfeited months are lost.
  - name: Streaming credit
    amount_usd: 100             # "$100 annual streaming credit (video/music/audio), per calendar year"
    period: annual
    category: streaming
    realistic_capture_rate_note: >-
      $100/calendar year on eligible video/music/audio streaming services; easily captured by
      anyone with recurring streaming subscriptions.
  - name: Wholesale club statement credit
    amount_usd: 65              # "$65 annual wholesale statement credit (including membership fees, $65+ aggregate spend/calendar year)"
    period: annual
    usage_keys: [costco, sams_club]
    realistic_capture_rate_note: >-
      Scoped trigger: $65+ aggregate wholesale-club spend (including membership fees) in a
      calendar year — NOT total card spend, so unlock_spend_usd is unset. Captured by wholesale
      club members; worthless to others.
  - name: Global Entry / TSA PreCheck fee credit
    amount_usd: 120             # "up to $120, resets every 4 years"
    period: every_4_years
    usage_keys: [global_entry_tsa]
    realistic_capture_rate_note: >-
      One statement credit up to $120 per 4-year cycle for a Global Entry/TSA PreCheck fee.
      Captured only by travelers who apply/renew.
  - name: Free night after 5 nights stayed
    amount_usd: 210             # curator estimate: up to 30,000 Wyndham pts x 0.7cpp floor
    period: annual
    usage_keys: [wyndham]
    kind: in_kind
    realistic_capture_rate_note: >-
      Non-spend trigger: 1 free night (up to 30,000 points) after 5+ paid nights stayed in a
      calendar year — unlock_spend_usd unset (not a card-spend threshold). Captured only by
      cardholders who complete 5+ Wyndham stays; in-kind haircut applies.
    notes: >-
      $210 = 30,000 points x 0.7cpp (wyndham_rewards floor) — a curator estimate.

signup_bonus:
  value:
    points: 90000              # "90,000 bonus points after $6,000 in first 120 days"
  spend_requirement_usd: 6000
  window_months: 4             # offer states "first 120 days" (~4 months)
  notes: >-
    Standard first tranche only. A second tranche of 30,000 bonus points requires $750 at Hotels
    by Wyndham within the first 180 days — scoped to a specific merchant and a different window,
    so it is NOT modeled as a tier. Headline "up to 120,000 points (up to 16 free nights)".

fees:
  annual_fee_usd: 395          # "Annual fee: $395"
  foreign_transaction_pct: 0   # "Foreign transaction fee: 0%" / "No foreign transaction fees"

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's premium co-brand positioning; not stated in the offer
    file. NEEDS human verification.

benefit_flags:
  - complimentary_elite_status  # automatic Wyndham Rewards DIAMOND member level
  - visa_signature
  - no_foreign_transaction_fee
  - zero_fraud_liability

sources:
  - url: https://www.barclaycardus.com/c/cards/wyndham-rewards-earner-premier-card
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
