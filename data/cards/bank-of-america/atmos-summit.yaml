notes: >-
  Drafted offline from data/offer_files/bank-of-america/atmos-summit.txt, which carries a
  NEEDS_VERIFICATION marker, so all figures are third-party/unconfirmed. New premium tier launched
  Aug 2025 with the Atmos Rewards rebrand (Alaska + Hawaiian merger). REGISTRY GAPS: (1) "3 points
  on eligible Alaska/Hawaiian purchases" omitted — no airline merchant key. (2) the "foreign
  transactions" 3x component omitted — foreign transactions are a spend-channel, not a category key.
  Not modeled: the 100,000-point companion award after $60,000+ anniversary spend; the $50 Instant
  Travel Delay Credit (per-incident, not periodic); waived same-day change fees. Free checked bag /
  preferred boarding extend to the cardholder plus up to 6 guests.

