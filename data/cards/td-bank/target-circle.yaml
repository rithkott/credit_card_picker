# Store-only Target Circle Card: 5% instant discount at Target, modeled as the earn rate.
id: target-circle
name: Target Circle Card
issuer: td-bank
network: mastercard           # PLACEHOLDER — closed-loop private-label store card, no open-loop network; see notes
currency:
  type: cash                  # 5% instant discount + dollar-value Target Circle Rewards — cash-equivalent at Target
  program: cash
base_rate: 5                 # "5% off at Target" instant checkout discount (only usable at Target/Target.com)

category_rewards: []

merchant_rewards: []

credits: []

signup_bonus:
  value:
    usd: 50                   # "$50 in Target Circle Rewards after spending $50+ ... within 60 days"
  spend_requirement_usd: 50
  window_months: 2            # "within 60 days of account approval" ≈ 2 months
  notes: >-
    One acquisition/welcome credit per guest, lifetime (shared with the Target Circle
    Reloadable Account); not available on mail-in applications. Qualifying-spend
    exclusions: alcohol, gift/prepaid cards, CVS pharmacy/clinic, Target Optical. Target
    periodically runs elevated limited-time versions (e.g. a $100 offer seen June 2026) —
    treat those as promotional, not the standing $50 offer.

fees:
  annual_fee_usd: 0           # "$0 (no monthly or annual fee)."
  foreign_transaction_pct: 0  # not disclosed; closed-loop US store card can't transact abroad — inferred 0, NEEDS human verification

approval:
  credit_tier: fair
  notes: >-
    credit_tier estimated from typical store-card underwriting; not stated in the offer
    file. NEEDS human verification.

closed_loop:
  merchants: [target]
  note: >-
    Card "may only be used to make purchases ... at Target stores located in the United
    States and from the Target.com website." Not the open-loop Target Circle Card
    Mastercard. The `target` merchant key maps to the groceries category in merchants.yaml,
    but this card works for ALL Target spend, not only groceries — see notes.

benefit_flags: []

sources:
  - url: https://www.target.com/circlecard
    supports: [identity, currency, base_rate, signup_bonus, fees, approval, closed_loop]
    accessed: "2026-07-04"
