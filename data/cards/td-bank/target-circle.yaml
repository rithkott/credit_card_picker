      NEEDS human verification.

notes: >-
  Drafted offline from data/offer_files/td-bank/target-circle.txt; all figures
  unconfirmed. This is the STORE-ONLY Target Circle Card (usable only at Target US stores
  and Target.com), NOT the open-loop Target Circle Card Mastercard (2% dining/gas, 1%
  elsewhere off-Target — a separate product). The 5% is an instant checkout discount, not
  a point currency, so it is modeled as base_rate 5 on a cash card. DISCOUNT EXCLUSIONS
  (5% does NOT apply): pharmacy/clinic, Target Optical exams/plans, gift & prepaid cards,
  Shipt/Circle 360 membership fees, alcohol in Indiana, wireless protection plans, gift
  wrapping, taxes, shipping/fees, prior purchases, account payments; discount applies only
  to the card-paid portion of split-tender transactions and after other discounts. MODELING
  CAVEAT: the `target` merchant key is categorized as groceries in merchants.yaml, but this
  card earns 5% on all in-store/online Target spend regardless of category — a reviewer
  should confirm the optimizer routes all Target spend (not just groceries) to this card.
  Perks not modeled: 30-day extended returns, free 2-day Target.com shipping, Circle 360
  at $49/yr vs $99, birthday 5% (a general Target Circle benefit, not card-exclusive).
  Rewards are discount/rebate only — no cash-out/statement/travel path. Target Circle
  Rewards expire after one year of no reward activity. No standing 0% / deferred-interest
  promo was found; financing is out of scope for the value model regardless.

