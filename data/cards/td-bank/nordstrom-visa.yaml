notes: >-
  Drafted offline from data/offer_files/td-bank/nordstrom-visa.txt; all figures
  unconfirmed. This is the OPEN-LOOP Nordstrom Visa (Signature or Platinum, tier set by
  creditworthiness; both share terms), usable anywhere Visa is accepted — NOT the
  store-only Nordstrom Credit Card (see nordstrom.yaml). category_rewards above are the
  Non-Nordstrom (off-Nordstrom) earn rates. AT NORDSTROM the card earns the Nordy Club
  tiered rate (instant Influencer 1.5x for new cardholders; Ambassador 2x / Icon 3x by
  annual Net Purchase Balance). REGISTRY / MODELING GAP: merchants.yaml has no `nordstrom`
  key, so the elevated 1.5x at-Nordstrom rate CANNOT be expressed as a merchant_reward and
  is omitted — off-Nordstrom base_rate 1 is modeled instead, understating in-store earn by
  0.5x. A reviewer should add a `nordstrom` merchant key. SOURCE DISCREPANCY: the
  cardmember-benefits marketing page frames at-Nordstrom earning as 2x/3x vs the T&Cs
  1/1.5/2/3 table; unresolved, flagged. Rewards redeem ONLY as Nordstrom Notes (store
  credit); no cash/statement/travel path; points expire after 12 months of Nordy Club
  inactivity. Signup: recurring "$40/$60 off next purchase" promos vary by page/date and
  are shared with the store-card flow — no permanent value, so signup_bonus is null. A
  secondary-reported 12-month 0% intro APR was NOT confirmed on an official page and is
  omitted; APR/financing is out of scope for the value model regardless.

