notes: >-
  Drafted offline from data/offer_files/td-bank/nordstrom.txt; all figures unconfirmed.
  This is the STORE-ONLY Nordstrom Credit Card (usable only at Nordstrom full-line,
  Nordstrom Rack, Nordstrom.com, NordstromRack.com, catalogs, and CashStar gift cards —
  NOT in Canada), NOT the open-loop Nordstrom Visa (see nordstrom-visa.yaml).
  REGISTRY / MODELING GAP: this is a closed-loop card but merchants.yaml has no `nordstrom`
  key, so the `closed_loop` block CANNOT be expressed — as modeled, base_rate 1.5 would be
  wrongly earnable everywhere. A reviewer must add a `nordstrom` merchant key + closed_loop
  block. network is a PLACEHOLDER (private-label store card; not on an open-loop network).
  NORDY CLUB LADDER (spend-progressive, per official Nordy Club T&Cs): Member 1x /
  Influencer 1.5x (instant for cardholders — modeled here) / Ambassador 2x ($5,000 NPB) /
  Icon 3x ($15,000 NPB); per curation conventions only the lowest tier a new cardholder
  gets is the rate, ladder noted here. SOURCE DISCREPANCY: Nordstrom's cardmember-benefits
  marketing page frames earning as 2x (Influencer) / 3x (Ambassador/Icon) — a different
  table than the T&Cs 1/1.5/2/3 used here; the more authoritative T&Cs figure is modeled.
  No points earned at Nordstrom Rack/Last Chance beyond the 5% cardmember discount (itself
  a source conflict, flagged in the offer file). Rewards redeem ONLY as Nordstrom Notes
  (store credit); no cash/statement/travel path. Points expire after 12 months of Nordy
  Club inactivity. Signup: recurring "$40/$60 off next purchase" promos vary by page/date
  and are shared with the store-card flow — no permanent value, so signup_bonus is null.
  A secondary-reported 12-month 0% intro APR was NOT confirmed on an official page and is
  omitted; APR/financing is out of scope for the value model regardless.

