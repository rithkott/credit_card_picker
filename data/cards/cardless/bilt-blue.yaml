# Bilt Card 2.0 entry tier — $0 AF Mastercard whose headline value is Bilt Points on
# housing payments (rent/mortgage/HOA/utilities) with no transaction fee. AI draft.
id: bilt-blue
name: Bilt Blue Card
issuer: cardless
network: mastercard
currency:
  type: points
  program: bilt_points
base_rate: 1                 # 1 point per $1 on all other eligible purchases (Housing-only option)

