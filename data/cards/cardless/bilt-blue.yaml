benefit_flags: []

notes: >-
  AI draft from local offer file only; not re-fetched from the issuer this session — confidence low.
  REWARD OPTIONS: cardholder picks ONE per billing cycle (changeable within a 7-day window, then
  locked). (1) Housing-only (default, modeled here): Bilt Points auto-earned on Bilt Housing Payments
  at a variable 0x-1.25x based on "Everyday Spend Ratio" (Everyday Spend / Housing Payment): 25-49%=0.5x,
  50-74%=0.75x, 75-99%=1x, 100%+=1.25x, with a 250-point/cycle floor; 1x on all other eligible purchases;
  no Bilt Cash on everyday spend. (2) Flexible Bilt Cash option (UNMODELED): 4% back in Bilt Cash on all
  Everyday Spend, no housing multiplier; redeem every $3 Bilt Cash to unlock 100 housing points (capped at
  1 pt/$1 of the payment). The 4% option could materially change value for low-housing users — flagged for
  a human. HOUSING EARN OMITTED because no housing/rent category key exists (registry gap). No transaction
  fee to earn rewards on housing under either option. NEEDS human verification: prior-generation Bilt cards
  required 5 transactions/statement to earn — this offer file does not state such a requirement, so it is
  not modeled; confirm whether it applies to Bilt 2.0. Excluded from earning: balance transfers, cash
  advances, prepaid/gift cards, P2P (Venmo/PayPal/Cash App/Zelle), crypto, fees/interest, lottery/gaming.
  Issuer of record: Column N.A. (Member FDIC); servicer: Cardless Inc.; "issuer" field set to "cardless"
  per dataset convention.

