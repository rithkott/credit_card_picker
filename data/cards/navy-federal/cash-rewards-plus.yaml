# Navy Federal cashRewards Plus: flat 2% cash on everything, no annual fee.
# Sibling variant of cash-rewards (1.5% flat) — tier is set by approved credit limit ($5,000+).
id: cash-rewards-plus
name: cashRewards Plus
issuer: navy-federal
network: visa                 # "cashRewards Plus tier includes Visa Signature cardholder benefits"
currency:
  type: cash
  program: cash
base_rate: 2                 # "Approved credit limit $5,000 or greater: cashRewards Plus, unlimited 2% cash back on all purchases"

category_rewards: []

merchant_rewards: []

credits: []

signup_bonus:
  value:
    usd: 250                 # "$250 bonus cash"
  spend_requirement_usd: 2500  # "after spending $2,500 in purchases"
  window_months: 3           # "within 90 days of account opening" (≈3 months)
  notes: >-
    Spend window is stated as 90 days, recorded as 3 months. Eligible purchases
    exclude fees, interest, balance transfers, gambling, cash advances, and
    cash-equivalent transactions. The offer file states one bonus for the cashRewards
    product; it is recorded identically on both tiers — NEEDS human verification that
    the bonus applies to the Plus tier specifically.

fees:
  annual_fee_usd: 0          # "Annual Fee: $0"
  foreign_transaction_pct: 0 # "Foreign Transaction Fee: $0"

approval:
  credit_tier: good
  notes: >-
    Navy Federal Credit Union membership is required to hold this card, but membership
    is FREE for qualifying military/DoD/Coast Guard members, veterans/retirees, DoD
    civilian/contractor personnel, and their family/household members — an eligibility
    restriction, not a paid prerequisite. This Plus tier is issued only when the
    approved credit limit is $5,000 or greater, which typically implies a stronger
    credit profile than the standard tier; credit_tier ('good') is an inference — the
    offer file states no credit requirement. NEEDS human verification.

benefit_flags:
  - zero_fraud_liability     # "Zero Liability policy"
  - visa_signature           # "cashRewards Plus tier includes Visa Signature cardholder benefits"

sources:
  - url: https://www.navyfederal.org/credit-cards/cash-rewards.html
    supports: [identity, currency, base_rate, signup_bonus, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      Canonical NFCU product page; NOT fetched this session (drafted offline from
      the local offer file). Figures are third-party/unconfirmed — the offer file
      itself flags that NFCU's dedicated rewards/redemption page was not directly
      fetchable during the research that produced it.

notes: >-
  Drafted offline from data/offer_files/navy-federal/cash-rewards.txt; all figures
  are third-party/unconfirmed, so confidence is low. This is the cashRewards PLUS
  tier (2% flat), issued when the approved credit limit is $5,000 or greater; the
  1.5% variant is the sibling file cash-rewards.yaml (limits under $5,000). A separate
  cashRewards Secured card (1% back) is a different product not modeled here. The
  Plus tier carries Visa Signature benefits, so network is recorded as visa. Cash
  back does not expire while the account is open and has no accrual cap.

verification:
