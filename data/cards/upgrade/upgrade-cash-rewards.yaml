notes: >-
  Drafted offline from data/offer_files/upgrade/cash-rewards.txt; confidence low, all figures
  unconfirmed against a live issuer page.
  STRUCTURE: The Upgrade Card is a hybrid credit-card / installment-loan product — each billing
  cycle's purchases are converted into a fixed-rate, fixed-term closed-end loan (example from the
  offer file: "$1,000 purchase, 36-month term, 19.99% APR = $37.55/month") rather than an
  open-ended revolving balance. Interest accrues from the time of purchase. The approved line does
  not replenish automatically as balances are repaid.
  CASH BACK MECHANIC: The 1.5% is earned "when you pay it back" — rewards accrue on repaid
  balances "with certain limitations applying" (the offer file could not find the exact limitations
  or the redemption threshold/timing; rewards "automatically redeem for statement credits" per a
  secondary source). A cardholder who pays their balance in full still earns 1.5% on all purchases,
  so it is modeled as a normal flat base_rate per docs/curation-guide.md's repayment-contingent
  earn convention.
  $200 CHECKING BONUS (unscored): A $200 bonus is available when the cardholder also opens a
  Rewards Checking Preferred account and makes 3 debit-card transactions. It is gated on a separate
  banking product rather than card spend, so it is not structured as signup_bonus.
  OTHER FEES: Late payment up to $29; balance transfer up to 5%; foreign transaction up to 3%
  (recorded); ATM withdrawal fees may apply and increase the finance charge/APR.
  PRODUCT DISAMBIGUATION: Some third-party sources describe a "2% everyday / 1% everything else"
  structure — that is Upgrade's Visa DEBIT card, a different product, and was deliberately excluded
  to avoid conflating products.

