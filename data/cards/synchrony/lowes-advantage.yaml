# Closed-loop Lowe's store card: 5%-off-every-day instant discount (modeled as an earn rate), Lowe's-only.
id: lowes-advantage
name: Lowe's Advantage Card (MyLowe's Rewards Credit Card)
issuer: synchrony
network: mastercard            # PLACEHOLDER: closed-loop private-label card on NO network. Schema forces a network enum; mastercard is a flagged stand-in. See notes.
currency:
  type: cash                  # 5% is an instant checkout discount (cash-equivalent), not a points currency.
  program: cash
base_rate: 5                  # "5% off every eligible purchase charged to the card," applied instantly at checkout after other discounts. Modeled as a 5% earn rate per the "instant discounts are earn rates" convention.

category_rewards: []

merchant_rewards: []

credits: []

signup_bonus:
  value:
    usd: 100                  # "20% off your first purchase, capped at a maximum discount of $100." Value assumes the $100 cap is reached.
  spend_requirement_usd: 500  # $100 cap / 20% = $500 of qualifying spend needed to max the discount.
  window_months: 3            # NOMINAL — offer file gives no fixed window; it's a one-time coupon per new account (issued at approval / mailed with card). See notes.
  notes: >-
    One-time 20%-off-first-purchase coupon (max $100 discount), one per new account. value assumes
    the $100 cap is hit (needs ~$500 of qualifying spend on one purchase). Cannot be combined with the
    5%-off everyday offer or any other credit-related discount, and carries the same category/service
    exclusions. No calendar expiry stated in the offer file, so window_months is a nominal placeholder.

fees:
  annual_fee_usd: 0           # "$0 / no annual fee" — consistent across official sources.
  foreign_transaction_pct: 0  # Not disclosed; card is Lowe's-only/domestic so FTF is moot — inferred, NEEDS human verification.

approval:
  credit_tier: fair
  notes: >-
    credit_tier NOT stated in the offer file — estimated from Synchrony store-card underwriting,
    which typically approves fair files. NEEDS human verification.

benefit_flags:
  - special_financing

sources:
  - url: https://www.lowes.com/pdf/GetDetails_LeaseToOwn_Or_5Off.pdf
    supports: [identity, currency, base_rate, signup_bonus, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL listed in the offer file's "Sources used" (official Lowe's "5% Off Every Day" PDF); NOT
      fetched this session. Fee/APR/approval figures in the offer file came from search-indexed
      snippets of the Synchrony account agreement, so figures are third-party/unconfirmed.

notes: >-
  Drafted offline from data/offer_files/synchrony/lowes-advantage.txt; figures third-party/unconfirmed.
  REGISTRY GAP: this is a closed-loop card usable ONLY at Lowe's stores / Lowes.com, but merchants.yaml has
  no "lowes" key, so the closed_loop block CANNOT be expressed — the Lowe's-only restriction is recorded
  here in notes instead. A reviewer should add a "lowes" merchant key and then add a closed_loop block.
  CHOICE MECHANIC: on any qualifying purchase the cardholder must pick EITHER the 5% discount OR a special-
  financing offer for that transaction — never both. Deferred-interest special financing (No Interest if
  Paid in Full within 6/12/18 months on purchases of $299+/$999+) is out of scope for the value model;
  retroactive-interest trap applies (unpaid promo balance accrues interest from the purchase date at the
  ~32% Purchase APR). Fixed-payment installment plans (36/60/84 months at 7.99-9.99% APR on $2,000+) also
  exist. Excludes Lowe's Business Credit, Lowe's Visa, and Lowe's Canada accounts (separate products).

verification:
  last_verified_date: "2026-07-04"
  verified_by: "claude-opus-4-8 (AI draft) — NEEDS human verification"
  confidence: low
