# Open-loop Walmart co-brand: 3%/5% at Walmart (Walmart+-gated), 1.5% everywhere. OnePay/Synchrony/Walmart program.
id: onepay-walmart-mastercard
name: OnePay CashRewards World Mastercard
issuer: synchrony
network: mastercard
currency:
  type: cash                  # Earnings accrue as "OnePay Points" at 1 pt = $1, redeemable as statement credit or OnePay Cash deposit — cash-equivalent, no transfer program, so modeled as cash.
  program: cash
base_rate: 1.5                # "1.5% cash back on all other purchases everywhere Mastercard is accepted."

category_rewards: []

merchant_rewards:
  - merchant: walmart
    rate: 3                   # BASELINE: 3% at Walmart WITHOUT a linked Walmart+ membership (the unconditional rate).
    conditional_rate:
      rate: 5                 # 5% at Walmart WITH a linked (paid) Walmart+ membership.
      requires: linked Walmart+ membership
      note: 5% at Walmart requires a linked paid Walmart+ membership (~$98/yr); without it the rate is 3%.

credits: []

signup_bonus: null            # OnePay marketing showed "$50 cash back on account opening" tied to a 6/18-7/7 application window; the offer file flags this as possibly stale/cached and NOT confirmed as the currently-active offer. Omitted rather than transcribe a possibly-expired promo. See notes.

fees:
  annual_fee_usd: 0           # "$0 / no annual fee" (OnePay marketing + help center).
  foreign_transaction_pct: 0  # "We will not charge a foreign transaction fee" — official Synchrony agreement (3/2026).

approval:
  credit_tier: good
  notes: >-
    credit_tier NOT stated in the offer file — estimated. This Mastercard version is the higher-tier
    product of the two-card program (the closed-loop OnePay Walmart Spend Card is positioned for those
    who don't qualify for this one), so ~good is a reasonable estimate; NEEDS human verification.
    Requires a OnePay account (free fintech account) in good standing to apply and hold — if the linked
    OnePay account closes, this card closes too. Approval assigns "Account Type 1" or "2" pricing by
    creditworthiness.

benefit_flags: []

sources:
  - url: https://www.synchronybankterms.com/syfterms/pdf/OnePay_CashRewards_World_Mastercard_Account_Agreement_and_Pricing_Addendum.pdf
    supports: [identity, currency, base_rate, merchant_rewards, fees, approval]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL listed in the offer file's "Sources used" (official Synchrony account agreement, dated 3/2026);
      NOT fetched this session. Earn rates come from the onepay.com marketing page per the offer file.
      Figures are third-party/unconfirmed.

notes: >-
  Drafted offline from data/offer_files/synchrony/onepay-walmart-mastercard.txt; figures unconfirmed.
  This is one of two products in the OnePay/Walmart program (sibling: data/cards/synchrony/onepay-walmart.yaml,
  the closed-loop no-rewards Walmart Spend Card). The 5% Walmart rate is Walmart+-membership-gated and stored
  as a conditional_rate (not scored in v1); the optimizer models the 3% baseline. World Mastercard benefits
  tier (travel/purchase protections) was not located in sources. Signup: a $50-on-opening promo tied to a
  6/18-7/7 window is unconfirmed/possibly stale, so signup_bonus is null.

