# Kohl's Rewards Visa (Capital One co-brand): earns Kohl's Rewards, issued as Kohl's Cash.
id: kohls
name: Kohl's Rewards Visa
issuer: capital-one
network: visa                 # "Issued by Capital One, N.A., pursuant to a license from Visa Inc."
currency:
  type: points
  program: kohls_rewards      # Kohl's Rewards issued as Kohl's Cash ($5 increments), Kohl's-only
base_rate: 1                 # "1% on purchases everywhere else Visa is accepted"

category_rewards:
  - category: gas
    rate: 3                   # "3% on gasoline purchases"
    notes: >-
      Kohl's Rewards earned on gas is issued as Kohl's Cash (Kohl's-only store credit) via
      the kohls_rewards program. NEEDS human verification.
  - category: groceries
    rate: 2                   # "2% at grocery stores"
    notes: >-
      Kohl's Rewards earned on groceries is issued as Kohl's Cash (Kohl's-only store
      credit). NEEDS human verification.

merchant_rewards: []

credits: []

signup_bonus: null            # "Save 40% today" — a one-time percent-off coupon with no stated dollar cap; see notes

fees:
  annual_fee_usd: 0            # "$0 / No annual fee (stated directly on capitalone.com/credit-cards/kohls/)"
  foreign_transaction_pct: 0   # INFERRED — the offer file's FTF language ("not usable internationally") describes the closed-loop store card, not the open-loop Visa; FTF for the Visa was NOT confirmed. NEEDS human verification.

approval:
  credit_tier: good            # "Credit level required: Good-Excellent (per Capital One's page)"
  notes: >-
    Offer file states "Good-Excellent"; modeled at the lower bound (good). Applicants apply
    for the Kohl's Rewards Visa; if declined they are automatically considered for the
    closed-loop, store-only Kohl's Credit Card instead (a sibling variant not modeled here).

benefit_flags:
  - special_financing            # periodic promotional 6/12/18/24-month financing plans (see notes)

sources:
  - url: https://www.capitalone.com/credit-cards/kohls/
    supports: [identity, currency, base_rate, category_rewards, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL carried over from the offer file header; not re-fetched this session. Earn
      structure and APR/fee figures came through a WebSearch summary of the Cardmember
      Agreement / CFPB filing (the agreement PDFs could not be parsed directly) —
      third-party/unconfirmed.

notes: >-
  Drafted offline from data/offer_files/capital-one/kohls.txt (NEEDS_VERIFICATION marker).
  Models the OPEN-LOOP Kohl's Rewards Visa; a closed-loop, store-only "Kohl's Credit Card"
  sibling exists under the same application (5% at Kohl's any way you pay) and is not
  modeled here. OMITTED REWARD: the headline "7.5% at Kohl's stores or Kohls.com" is an
  issuer-brand-specific merchant rate with no matching key in data/meta/merchants.yaml
  (no `kohls` merchant) — omitted rather than force-fit onto a broad category (registry gap
  listed for a curator). Kohl's Rewards convert to Kohl's Cash in $5 increments on the first
  of the following month, then expire ~30 days later (the kohls_rewards program valuation
  should already haircut for this). Signup is a "Save 40% today" one-time coupon with no
  stated dollar cap, so signup_bonus is null (no honest fixed value). Kohl's periodically
  runs "$10 Kohl's Cash per $50 spent" storewide promotions available to any shopper (not
  card-exclusive) — not modeled. Promotional 6/12/18/24-month financing (described as
  genuinely interest-waived, not deferred-interest) is out of scope for the value model.

verification:
  last_verified_date: "2026-07-04"
  verified_by: "claude-opus-4-8 (AI draft) — NEEDS human verification"
  confidence: low
