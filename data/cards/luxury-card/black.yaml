# Mid-tier stainless-steel/carbon Luxury Card (World Elite Mastercard); one file per tier — siblings: titanium, gold.
id: black
name: Mastercard Black Card
issuer: luxury-card
network: mastercard            # "World Elite Mastercard product"
currency:
  type: points
  program: luxury_card_points
base_rate: 1                   # "1 point/$1 on all other purchases"

category_rewards:
  - category: travel_flights
    rate: 2                    # "2 points/$1 on airfare ... booked through LuxuryCardTravel.com"
    portal_only: true
    notes: >-
      2X points apply only to airfare booked through the issuer's own
      LuxuryCardTravel.com portal; airfare booked elsewhere earns the 1-point base
      rate. Portal fares can exceed direct-booking prices.
  - category: travel_hotels
    rate: 2                    # "2 points/$1 on ... hotel reservations booked through LuxuryCardTravel.com"
    portal_only: true
    notes: >-
      2X points apply only to hotel reservations booked through LuxuryCardTravel.com;
      hotels booked elsewhere earn the 1-point base rate. Portal bookings also carry
      the "$750/stay average" luxury-hotel amenity benefit (see card notes).

merchant_rewards: []

credits:
  - name: Airline / flight statement credit
    amount_usd: 200           # "Up to $200/year in statement credits toward flight-related purchases"
    period: annual
    category: travel_flights
    realistic_capture_rate_note: >-
      Up to $200/year toward flight-related purchases (tickets, baggage fees,
      upgrades). Easy to fully capture for anyone who flies at least once a year;
      worthless to non-travelers. Enrollment/activation mechanics not confirmed in
      the offer file — NEEDS human verification.
  - name: Dining statement credit
    amount_usd: 100           # "Up to $100/year in statement credits at qualified restaurants worldwide"
    period: annual
    category: dining
    realistic_capture_rate_note: >-
      Up to $100/year at qualified restaurants worldwide. High capture for regular
      diners; the "qualified restaurants" list was not confirmed in the offer file, so
      some users may capture less. NEEDS human verification of eligible merchants.
  - name: Global Entry / TSA PreCheck application fee credit
    amount_usd: 120           # "Up to $120 reimbursement for a Global Entry or TSA PreCheck application fee"
    period: every_5_years     # Global Entry membership runs on a 5-year cycle
    realistic_capture_rate_note: >-
      Reimburses one Global Entry ($120) or TSA PreCheck application fee per ~5-year
      membership cycle. Fully captured by frequent flyers; one-time-ish value. Modeled
      on a 5-year period to match the Global Entry renewal cycle.

signup_bonus: null            # "No stated sign-up bonus." (no bonus reported for any tier)

fees:
  annual_fee_usd: 699         # "$699 annual fee." AU fee reported inconsistently ($195 vs $249) — see notes.
  foreign_transaction_pct: 0  # "0% foreign transaction fee (reported by aggregators; not independently confirmed)"

approval:
  credit_tier: excellent
  notes: >-
    credit_tier estimated as 'excellent' from the card's premium metal / World Elite
    Mastercard positioning and $699 annual fee; the offer file does not state a credit
    requirement or score cutoff. Inferred — NEEDS human verification.

benefit_flags:
  - lounge_access               # "Complimentary Priority Pass Select: airport lounge access for cardholder and guests"
  - concierge_service           # "24/7 Luxury Card Concierge service"
  - cell_phone_protection       # "Cell phone protection: up to $1,000/year"
  - metal_card                  # "22-gram stainless-steel-and-carbon metal construction"
  - trip_cancellation_insurance # "Trip cancellation/interruption insurance ... up to $5,000/insured person"
  - baggage_delay_insurance     # "Baggage delay insurance: up to $100/day (max 3 qualifying days)"
  - auto_rental_cdw             # "Auto rental collision damage waiver"
  - travel_accident_insurance   # "travel accident insurance (referenced by aggregators)"

sources:
  - url: https://www.luxurycard.com/
    supports: [identity, currency, base_rate, category_rewards, credits, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL is the source the offer file attributes its content to; NOT fetched this
      session (the offer file reports luxurycard.com returned HTTP 403 during
      research). All figures are third-party/aggregator-sourced (NerdWallet, AwardWallet,
      Forbes Advisor, etc.) and unconfirmed against an official terms page — see offer
      file "Gaps / Not Found".

notes: >-
  Drafted offline from data/offer_files/luxury-card/mastercards.txt. The offer file's
  "Gaps / Not Found" section states every figure comes from search-engine snippets and
  aggregators, not a directly-fetched official page, so all figures are
  third-party/unconfirmed — NEEDS human verification.
  One of three sibling tiers (Titanium / Gold / Black); see data/cards/luxury-card/titanium.yaml
  and luxury-gold.yaml. Earn structure is identical across tiers (2X portal airfare/hotel, 1X base);
  the Black Card sits between Titanium and Gold on fee and carries a mid-size credit package
  (flight $200, dining $100, Global Entry $120) plus travel-insurance coverages.
  REDEMPTION (per-tier difference): points redeem at ~2% toward airfare via
  LuxuryCardTravel.com (optimistic path, all tiers). Cash-back redemption value for the Black
  Card is reported INCONSISTENTLY as 1% vs 1.5% and could not be confirmed — treated as ~1%
  (the shared luxury_card_points program floor_cpp of 1.0), unlike the Gold Card which
  aggregators describe redeeming cash at ~2cpp. This is redemption-side and does NOT change
  base_rate (still the 1-point earn rate); no new per-tier program key was invented. NEEDS
  human verification of the current Black cash-back rate.
  UNCONFIRMED FEES: the Authorized User fee is reported inconsistently as $195/year vs
  $249/year (an outdated 2022 landing page even shows a "$495 annual fee / $195 AU" offer),
  so the AU fee is omitted from `fees` (schema has no AU-fee field regardless) and flagged
  here as unconfirmed. The 0% foreign transaction fee is aggregator-reported only, not
  confirmed on an official Black Card terms page — verify.
  Portal hotel bookings include a complimentary luxury-property benefit averaging ~$750/stay
  (room upgrades, breakfast for two, Wi-Fi) at 3,000+ properties — not modeled as a periodic
  credit because it is a per-stay, portal-gated in-kind amenity with no fixed period or
  guaranteed cash value. Trip-cancellation ($5,000/person), baggage-delay ($100/day, max 3
  days after 4+ hour delays), auto-rental CDW, and travel-accident coverages are recorded as
  benefit_flags only (not scored). Issued by Barclays Bank Delaware.

verification:
  last_verified_date: "2026-07-04"
  verified_by: "claude-opus-4-8 (AI draft) — NEEDS human verification"
  confidence: low
