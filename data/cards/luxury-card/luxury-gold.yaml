# Top-tier 24K-gold-plated Luxury Card (World Elite Mastercard); one file per tier — siblings: titanium, black.
# id is 'luxury-gold' (not bare 'gold') because the validator requires globally-unique ids and 'gold' is taken by amex/gold.yaml.
id: luxury-gold
name: Mastercard Gold Card
issuer: luxury-card
network: mastercard            # "World Elite Mastercard product"
currency:
  type: points
  program: luxury_card_points
base_rate: 1                   # "1 point/$1 on all other purchases"

category_rewards:
  - category: travel_flights
    rate: 2                    # "2 points/$1 on airfare ... booked through LuxuryCardTravel.com"
    portal_only: true
    notes: >-
      2X points apply only to airfare booked through the issuer's own
      LuxuryCardTravel.com portal; airfare booked elsewhere earns the 1-point base
      rate. Portal fares can exceed direct-booking prices.
  - category: travel_hotels
    rate: 2                    # "2 points/$1 on ... hotel reservations booked through LuxuryCardTravel.com"
    portal_only: true
    notes: >-
      2X points apply only to hotel reservations booked through LuxuryCardTravel.com;
      hotels booked elsewhere earn the 1-point base rate. Portal bookings also carry
      the "$750/stay average" luxury-hotel amenity benefit (see card notes).

merchant_rewards: []

credits:
  - name: Airline / flight statement credit
    amount_usd: 300           # "Up to $300/year in statement credits toward flight-related purchases"
    period: annual
    category: travel_flights
    realistic_capture_rate_note: >-
      Up to $300/year toward flight-related purchases (tickets, baggage fees,
      upgrades). Easy to fully capture for anyone who flies at least once a year;
      worthless to non-travelers. Enrollment/activation mechanics not confirmed in
      the offer file — NEEDS human verification.
  - name: Dining statement credit
    amount_usd: 200           # "Up to $200/year in statement credits at qualified restaurants"
    period: annual
    category: dining
    realistic_capture_rate_note: >-
      Up to $200/year at qualified restaurants. High capture for regular diners; the
      "qualified restaurants" list was not confirmed in the offer file, so some users
      may capture less. NEEDS human verification of eligible merchants.
  - name: Ship&Play credit
    amount_usd: 200           # "Up to $200/year in 'Ship&Play' credits (for sending belongings ahead)"
    period: annual
    realistic_capture_rate_note: >-
      Up to $200/year toward shipping belongings ahead ("Ship&Play"). A narrow,
      niche benefit — most cardholders capture little to none of it unless they ship
      luggage/equipment while traveling. No canonical spend category fits "shipping",
      so no `category` is attached (see registry-gap note in card notes).
  - name: Global Entry / TSA PreCheck application fee credit
    amount_usd: 120           # "Up to $120 reimbursement for a Global Entry or TSA PreCheck application fee"
    period: every_5_years     # Global Entry membership runs on a 5-year cycle
    realistic_capture_rate_note: >-
      Reimburses one Global Entry ($120) or TSA PreCheck application fee per ~5-year
      membership cycle. Fully captured by frequent flyers; one-time-ish value. Modeled
      on a 5-year period to match the Global Entry renewal cycle.

signup_bonus: null            # "No stated sign-up bonus." Gold's premium over Titanium is its credit package, not a bonus.

fees:
  annual_fee_usd: 1199        # "$1,199 annual fee ($349 for each Authorized User)"
  foreign_transaction_pct: 0  # "0% foreign transaction fee stated for Titanium and Gold Cards"

approval:
  credit_tier: excellent
  notes: >-
    credit_tier estimated as 'excellent' from the card's premium 24K-gold metal /
    World Elite Mastercard positioning and $1,199 annual fee; the offer file does not
    state a credit requirement or score cutoff. Inferred — NEEDS human verification.

benefit_flags:
  - concierge_service           # "24/7 Luxury Card Concierge service"
  - metal_card                  # "Card is plated in 24K Gold, ~22 grams, metal construction"
  - special_financing           # "0% introductory APR for 15 months on balance transfers ..."

sources:
  - url: https://www.luxurycard.com/
    supports: [identity, currency, base_rate, category_rewards, credits, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL is the source the offer file attributes its content to; NOT fetched this
      session (the offer file reports luxurycard.com returned HTTP 403 during
      research). All figures are third-party/aggregator-sourced (NerdWallet, Forbes
      Advisor, etc.) and unconfirmed against an official terms page — see offer file
      "Gaps / Not Found".

notes: >-
  Drafted offline from data/offer_files/luxury-card/mastercards.txt. The offer file's
  "Gaps / Not Found" section states every figure comes from search-engine snippets and
  aggregators, not a directly-fetched official page, so all figures are
  third-party/unconfirmed — NEEDS human verification.
  One of three sibling tiers (Titanium / Gold / Black); see data/cards/luxury-card/titanium.yaml
  and black.yaml. This file is named luxury-gold.yaml (id 'luxury-gold') rather than gold.yaml because
  the validator enforces globally-unique ids and 'gold' is already used by amex/gold.yaml. Earn structure is identical across tiers (2X portal airfare/hotel, 1X base);
  Gold's premium over Titanium is its statement-credit package (flight $300, dining $200,
  Ship&Play $200, Global Entry $120), not a higher earn rate.
  REDEMPTION (per-tier difference): points redeem at ~2% toward airfare via
  LuxuryCardTravel.com (optimistic path, all tiers). Per the point-valuations registry
  comment and aggregator reporting, the Gold Card is described as redeeming points for
  cash/statement credit at ~2cpp — higher than Titanium (~1%) and Black (1%-1.5%). This
  is redemption-side and does NOT change base_rate (still the 1-point earn rate); the
  shared luxury_card_points program keeps floor_cpp 1.0 globally (no new per-tier program
  key was invented). The Gold 2cpp cash-out figure is unconfirmed — NEEDS human verification.
  REGISTRY GAP: the "Ship&Play" shipping-ahead credit has no matching key in
  categories.yaml, so its credit carries no `category`; not added to data/meta per task
  constraints.
  Lounge access: NO Priority Pass / airport-lounge benefit was found advertised for the
  Gold Card (unusual for the highest-fee tier), so no lounge_access flag is set — the offer
  file flags this as needing specific verification of an absence.
  Cell phone protection was listed for Titanium and Black but NOT in the Gold section, so
  it is omitted here — verify.
  FINANCING (not scored): 0% intro APR for 15 months on balance transfers made within 45
  days of opening; regular APR 19.49%-27.49% variable and a 5% balance-transfer fee were
  reported by aggregators only, not confirmed on an official Schumer box — flagged via the
  special_financing benefit flag. Portal hotel bookings include a complimentary luxury-property
  benefit averaging ~$750/stay (room upgrades, breakfast for two, Wi-Fi) at 3,000+ properties —
  not modeled as a periodic credit because it is a per-stay, portal-gated in-kind amenity with
  no fixed period or guaranteed cash value. Issued by Barclays Bank Delaware.

verification:
  last_verified_date: "2026-07-04"
  verified_by: "claude-opus-4-8 (AI draft) — NEEDS human verification"
  confidence: low
