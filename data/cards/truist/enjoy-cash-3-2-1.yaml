notes: >-
  Drafted offline from data/offer_files/truist/enjoy-cash.txt. This is the "3-2-1 Rewards"
  apply-time election; the sibling variant is truist/enjoy-cash-1-5-flat (1.5% flat). The
  reward scheme is chosen at application and cannot be changed afterward, so the two are
  modeled as separate cards. No signup bonus was found on the reviewed issuer pages/
  disclosures (offer file could not confirm one exists as a certainty, only that none is
  advertised). Cash Rewards expire at the end of the month five years from issuance. All
