# Truist Enjoy Cash, "3-2-1 Rewards" apply-time election variant (gas/grocery/utilities
# bonus categories, shared $1,000/month cap). Sibling of enjoy-cash-1-5-flat — one product,
# two mutually exclusive reward schemes chosen at application and unchangeable afterward.
id: enjoy-cash-3-2-1
name: Truist Enjoy Cash (3-2-1 Rewards)
issuer: truist
network: visa                # "Visa Zero Liability protection" — offer file Perks section
currency:
  type: cash
  program: cash
base_rate: 1                 # "1% Cash Rewards on all other Eligible Purchases (no limit)"

category_rewards:
  - category: gas
    rate: 3                  # "3% Cash Rewards on eligible gas purchases at service stations, automated fuel dispensers, and electric vehicle charging stations"
    cap:
      period: monthly
      max_spend_usd: 1000     # single combined pool shared with groceries + utilities — full pool stated
      fallback_rate: 1
      shared_cap_id: bonus_categories
    notes: >-
      Includes service stations, automated fuel dispensers, and EV charging stations.
      The $1,000/month cap is a single pool shared with the grocery and utilities bonus
      categories (combined); spend above $1,000/month in those categories reverts to 1%.
      Category qualification is by merchant MCC only.
  - category: groceries
    rate: 2                  # "2% Cash Rewards on eligible grocery store/supermarket purchases"
    cap:
      period: monthly
      max_spend_usd: 1000     # same combined pool, stated in full
      fallback_rate: 1
      shared_cap_id: bonus_categories
    notes: >-
      Grocery store / supermarket MCC only. Offer file warns that groceries bought at a
      warehouse club or pharmacy may carry a "warehouse"/"pharmacy" MCC and will NOT earn
      2%. Shares the $1,000/month combined cap with gas and utilities.
  - category: utilities
    rate: 2                  # "2% Cash Rewards on eligible utilities purchases such as phone, cable, television streaming services, gas, water, and sanitary services"
    cap:
      period: monthly
      max_spend_usd: 1000     # same combined pool, stated in full
      fallback_rate: 1
      shared_cap_id: bonus_categories
    notes: >-
      Truist's utilities definition here bundles phone, cable, television streaming
      services, gas, water, and sanitary services (broader than a pure utilities key —
      streaming is folded in by MCC). Shares the $1,000/month combined cap with gas and
      groceries.

merchant_rewards: []

credits: []

signup_bonus: null            # No welcome/signup bonus found on the official product page or disclosures (offer file "Signup Bonus" + Gaps sections)

fees:
  annual_fee_usd: 0           # "No annual fee ('None')"
  foreign_transaction_pct: 0  # "Foreign Transaction Fee - None"

approval:
  credit_tier: good
  notes: >-
    credit_tier is an inference — the offer file states no credit score or income
    requirement (see its Gaps section). Estimated 'good' from this card's public
    positioning as a mainstream no-annual-fee cash rewards card (not secured/student).
    NEEDS human verification.

relationship_boost:
  program: Truist Loyalty Cash Bonus
  tiers:
    # Baseline for any eligible Truist Personal Deposit Account holder (no wealth relationship)
    - { requirement: "electronic-deposit redemption into any eligible Truist Personal Deposit Account (personal checking/savings/money market)", boost_pct: 10 }
    # Truist Marquee Checking
    - { tier_name: "Marquee Checking", requirement: "Truist Marquee Checking account, redemption e-deposited into an eligible Truist Personal Deposit Account", boost_pct: 50 }
    # Truist One Checking, leveled by highest Portfolio value across prior 3 months
    - { tier_name: "One Checking Level 1", requirement: "Truist One Checking", min_balance_usd: 0, boost_pct: 10 }
    - { tier_name: "One Checking Level 2", requirement: "Truist One Checking", min_balance_usd: 10000, boost_pct: 20 }
    - { tier_name: "One Checking Level 3", requirement: "Truist One Checking", min_balance_usd: 25000, boost_pct: 30 }
    - { tier_name: "One Checking Level 4", requirement: "Truist One Checking", min_balance_usd: 50000, boost_pct: 40 }
    - { tier_name: "One Checking Level Premier", requirement: "Truist One Checking", min_balance_usd: 100000, boost_pct: 50 }
    # Dimension / Signature Advantage / Asset Management, by highest Portfolio value across prior 3 months
    - { tier_name: "Dimension/Signature Advantage/Asset Mgmt <$25k", requirement: "Truist Dimension, Signature Advantage, or Asset Management Account", min_balance_usd: 0, boost_pct: 10 }
    - { tier_name: "Dimension/Signature Advantage/Asset Mgmt $25k-$100k", requirement: "Truist Dimension, Signature Advantage, or Asset Management Account", min_balance_usd: 25000, boost_pct: 25 }
    - { tier_name: "Dimension/Signature Advantage/Asset Mgmt $100k+", requirement: "Truist Dimension, Signature Advantage, or Asset Management Account", min_balance_usd: 100000, boost_pct: 50 }
  note: >-
    Redemption-time boost, not an earn boost: the Loyalty Cash Bonus is added to a cash
    reward redemption only when it is electronically deposited into an eligible Truist
    Personal Deposit Account (statement credit, mailed check, and non-Truist deposits get
    no bonus, so the true no-relationship baseline is 0%). Tiers are keyed by account type
    and, for One Checking / Dimension / Signature Advantage / Asset Management, by highest
    "Portfolio" balance over the prior 3 months (min_balance_usd is the floor of each
    stated band). The highest applicable percentage is used; the rate updates by the 5th
    business day monthly and is not retroactive. Not scored in v1 — the optimizer models
    the no-relationship baseline.

benefit_flags:
  - zero_fraud_liability      # "Visa Zero Liability protection against unauthorized card use"

