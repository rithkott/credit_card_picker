      not the legal Customer Agreement).
  - url: https://www.jpmorganchase.com/ir/news/2026/chase-to-become-new-issuer-of-apple-card
    supports: [identity]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      JPMorgan Chase newsroom announcement (Jan 7, 2026) that Chase will replace Goldman
      Sachs as Apple Card issuer over ~24 months; URL carried over from the offer file body,
      NOT re-fetched this session. Third-party/unconfirmed.

notes: >-
  Drafted offline from data/offer_files/goldman-sachs/apple-card.txt; all figures are
  third-party/unconfirmed (transcribed from a marketing/support-level offer sheet, not the
  legal Customer Agreement) — confidence low. ISSUER TRANSITION: on 2026-01-07 Apple and
  JPMorgan Chase announced Chase will replace Goldman Sachs as the Apple Card issuer over an
  announced ~24-month window (targeting ~early 2028). Filed under goldman-sachs per current
  instructions, but this card should be re-tagged / moved to a chase offer file and re-verified
  once Chase becomes the operative issuer of record. Daily Cash tiers: 1% physical titanium
  card, 2% via Apple Pay anywhere, 3% for purchases made directly from Apple (Apple Store,
  apple.com, App Store, Apple services) and at select Apple Pay partner merchants. The 3%
  Apple-direct rate and most partners are not modeled as rewards because there is no 'apple'
  merchant key and most partners lack registry keys (see gaps). No limit on Daily Cash earned;
  Daily Cash does not expire and is deposited daily to Apple Cash or an Apple Card Savings
  account. Issuer marketing claims "no late fees"; not independently confirmed against the
  Customer Agreement. NEEDS human verification.

