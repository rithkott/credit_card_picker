# Choose-your-own-category cash card: two 5% categories (combined quarterly cap) + a 2% everyday pick.
id: cash-plus
name: U.S. Bank Cash+ Visa Signature
issuer: us-bank
network: visa
currency:
  type: cash
  program: cash
base_rate: 1                      # "1% cash back on all other eligible purchases"

category_rewards:
  - category: choice
    rate: 5
    requires_enrollment: true     # "Choose and activate your Cash+ Categories" each quarter
    cap:
      period: quarterly
      max_spend_usd: 2000         # "first $2,000 in combined eligible Net Purchases each quarter", then 1%
      fallback_rate: 1
    choice:
      options: [utilities, dining, transit, entertainment, streaming]
      note: >-
        Cardholder selects TWO 5% categories each quarter from a 12-option list; both
        share ONE combined $2,000/quarter cap, so total 5% spend is $2,000 regardless
        of the split — modeling a single selectable 5% category with a $2,000 cap
        captures the same maximum 5% value. Registry mappings: utilities = cell phone
        providers / home utility bills / TV-internet; dining = fast food; transit =
        ground transportation; entertainment = movie theaters; streaming = TV/internet/
        streaming services. See card notes for the six selectable categories that have
        no registry key and are omitted. Requires quarterly activation.
  # "Additional 4% (5% total) on prepaid air/hotel/car via the U.S. Bank Rewards Travel Center."
  - category: travel_flights
    rate: 5
    portal_only: true
    notes: 5% total on prepaid airfare booked through the U.S. Bank Rewards Travel Center.
  - category: travel_hotels
    rate: 5
    portal_only: true
    notes: 5% total on prepaid hotels booked through the U.S. Bank Rewards Travel Center.
  - category: travel_other
    rate: 5
    portal_only: true
    notes: 5% total on prepaid car rentals booked through the U.S. Bank Rewards Travel Center.

merchant_rewards: []

credits: []

signup_bonus:
  value:
    usd: 250                      # "$250 cash back after $1,000+ in Net Purchases within 90 days" (current official offer)
  spend_requirement_usd: 1000
  window_months: 3
  notes: >-
    Current official offer per the product page is $250 / $1,000 / 90 days. Some
    third-party reviews still cite an older $200 amount and/or a 120-day window —
    verify at approval. NEEDS human verification.

fees:
  annual_fee_usd: 0               # "Annual Fee: $0"
  foreign_transaction_pct: 3      # INFERRED from third-party sources; not on the official page

approval:
  credit_tier: very_good
  notes: >-
    credit_tier estimated from Visa Signature positioning; the offer file states no
    credit requirement. NEEDS human verification.

benefit_flags:
  - visa_signature

sources:
  - url: https://www.usbank.com/credit-cards/cash-plus-visa-signature-credit-card.html
    supports: [identity, currency, base_rate, category_rewards, signup_bonus, fees, approval, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL carried over from the offer file header / docs/needs-verification-links.md;
      not re-fetched this session. Figures are third-party/unconfirmed per the offer
      file's NEEDS_VERIFICATION marker; FTF cross-referenced from third-party reviews.

notes: >-
  Drafted offline from data/offer_files/us-bank/cash-plus.txt (NEEDS_VERIFICATION) —
  all figures third-party/unconfirmed.
  MODELING LIMITATION: the card has TWO independent choose-your-own mechanics (two 5%
  categories AND one 2% everyday category), but the optimizer supports only one `choice`
  reward per card. The higher-value 5% mechanic is modeled as the choice entry; the 2%
  everyday pick (one of gas / groceries / restaurants, uncapped) is OMITTED from scoring
  to avoid granting 2% on all three at once — this under-scores by ~1% over base on one
  everyday category. A reviewer should decide how to represent it.
  REGISTRY GAPS: six selectable 5% categories have no registry key and are omitted from
  the choice options — department stores, electronics stores, furniture stores,
  gyms/fitness centers, sporting goods stores, and select clothing stores.
  foreign_transaction_pct (3%) is inferred from third-party sources, not the official page.

