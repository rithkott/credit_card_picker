# $95 premium Choice Hotels co-brand — higher everyday 5X, anniversary points, Global Entry credit.
id: choice-privileges-select
name: Wells Fargo Choice Privileges Select World Elite Mastercard
issuer: wells-fargo
network: mastercard          # "Choice Privileges Select World Elite Mastercard"
currency:
  type: points
  program: choice_privileges
base_rate: 1                 # "1X points on other purchases"

category_rewards:
  - category: gas
    rate: 5                  # "5X points on gas stations, grocery stores, home improvement stores, and phone plan services"
  - category: groceries
    rate: 5                  # same 5X tier ("grocery stores")
  - category: utilities
    rate: 5                  # "phone plan services" → utilities (Utilities & phone)
    notes: >-
      Covers "phone plan services" only, per the offer file — not utilities broadly.
      Mapped to the utilities key for lack of a phone-specific key; narrower than this
      category. NEEDS human verification.

merchant_rewards: []

credits:
  - name: Anniversary bonus points
    amount_points: 30000     # "30,000 bonus points every account anniversary year"
    period: annual
    realistic_capture_rate_note: >-
      Automatically deposited each account anniversary — captured by essentially all
      cardholders who keep the account open past the anniversary. Worth roughly 3 Choice
      reward nights per the product page's framing. NEEDS human verification.
  - name: Trusted Traveler (Global Entry / TSA PreCheck) fee credit
    amount_usd: 120          # "Up to $120 statement credit for Trusted Traveler Program fees ... every 4 years"
    period: every_4_years
    category: travel_other
    realistic_capture_rate_note: >-
      Reimburses Global Entry ($100) or TSA PreCheck (~$78) application fees once every
      4 years. Captured only by travelers who actually apply/renew; worthless to
      everyone else. NEEDS human verification.

signup_bonus:
  value:
    points: 60000            # "60,000 bonus points"
  spend_requirement_usd: 3000 # "when you spend $3,000 in purchases in the first 3 months"
  window_months: 3

fees:
  annual_fee_usd: 95         # "Annual Fee: $95"
  foreign_transaction_pct: 0 # "Foreign Transaction Fee: $0"

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from this card's positioning as a $95 premium hotel co-brand
    (World Elite Mastercard); the offer file does not state a credit requirement. Not
    eligible if you opened a Choice Privileges card within the last 15 months or
    currently hold an open Choice Privileges account (per product page). NEEDS human
    verification.

