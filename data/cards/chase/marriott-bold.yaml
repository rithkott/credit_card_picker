# Marriott Bonvoy Bold: no-annual-fee entry Marriott co-brand; 3x at Marriott, everyday 2x categories.
id: marriott-bold
name: Marriott Bonvoy Bold
issuer: chase
network: visa                   # "May be issued as Visa Signature or Visa Platinum depending on underwriting"
currency:
  type: points
  program: marriott_bonvoy
base_rate: 1                    # "1 point/$1: everything else"

category_rewards:
  - category: travel_hotels
    rate: 3                      # "3 points/$1 at hotels participating in Marriott Bonvoy" (card earn only; Marriott base earn posts separately)
    notes: >-
      3x applies to Marriott-brand hotel stays. This is the card's earn only — Marriott
      program base points (10 base pts/$1 at most brands + Silver 10% bonus) post
      separately to the Marriott account and are not included here.
  - category: groceries
    rate: 2                      # "2 points/$1: grocery stores"
  - category: utilities
    rate: 2                      # "2 points/$1: internet/cable/phone services"
    notes: Covers internet/cable/phone services.
  - category: streaming
    rate: 2                      # "2 points/$1: select streaming"
    notes: Select streaming services only (issuer-defined list).
  - category: transit
    rate: 2                      # "2 points/$1: taxicabs/limousines"
    notes: Issuer lists taxicabs/limousines under this 2x tier.
  - category: dining
    rate: 2                      # "2 points/$1: select food delivery (DoorDash, Caviar, Uber Eats, Postmates, Grubhub, Seamless, Delivery.com)"
    notes: >-
      The issuer's 2x here is scoped to select food-delivery services (DoorDash, Caviar,
      Uber Eats, Postmates, Grubhub, Seamless, Delivery.com), not all dining/restaurants.
      Modeled under dining as the closest key; narrower than the general category.

