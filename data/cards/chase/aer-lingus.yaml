# Aer Lingus co-brand: Avios earning on partner-airline flights + direct hotels; companion ticket at high spend.
id: aer-lingus
name: Aer Lingus Visa Signature
issuer: chase
network: visa
currency:
  type: points
  program: avios                # Avios move 1:1 across Aer Lingus / BA / Iberia — one shared registry key
base_rate: 1                    # "1 Avios/$1 on everything else"

category_rewards:
  - category: travel_flights
    rate: 3                      # "3 Avios/$1 on flights purchased directly with Aer Lingus, British Airways, Iberia, LEVEL"
    notes: >-
      Only flights booked directly with Aer Lingus, British Airways, Iberia, or
      LEVEL. Narrower than the general travel_flights category — other airlines'
      tickets earn only the 1x base rate. Modeled at the co-brand rate; cannot
      split airline within the category.
  - category: travel_hotels
    rate: 2                      # "2 Avios/$1 on hotel accommodations purchased directly with the hotel"
    notes: Only hotel accommodations purchased directly with the hotel (not via OTAs/portals).

merchant_rewards: []

credits:
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10              # "$10 off quarterly on one DoorDash non-restaurant order while enrolled"
    period: quarterly
    usage_keys: [doordash]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating complimentary DashPass (12 months free 2/1/2025-12/31/2027,
      then auto-renews) and placing one qualifying DoorDash non-restaurant order each
      quarter (no rollover). Captured only by active DoorDash users; worthless otherwise.

signup_bonus:
  value:
    points: 75000              # "75,000 bonus Avios after spending $5,000 in first 3 months"
  spend_requirement_usd: 5000
  window_months: 3
  notes: >-
    Not available to current cardmembers or previous cardmembers who received a new
    cardmember bonus for this card within the last 24 months. Allow 6-8 weeks to post.

fees:
  annual_fee_usd: 95            # NOT stated in the offer file — best estimate from the card's public positioning; NEEDS human verification
  foreign_transaction_pct: 0    # inferred: airline co-brands typically carry no FTF, but the offer file states no FTF language; NEEDS human verification

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's public positioning as a mainstream airline
    co-brand; not stated in the offer file. Chase 5/24 rule very likely applies
    (Chase declines applicants with 5+ new accounts in 24 months) — not stated in the
    offer file. NEEDS human verification.

benefit_flags:
  - companion_certificate
  - priority_boarding
  - visa_signature

sources:
  - url: https://creditcards.chase.com/travel-credit-cards/aer-lingus
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL not in the offer file and not fetched this session; this is the issuer's
      general product page. All figures transcribed from
      data/offer_files/chase/aer-lingus.txt and are unconfirmed against issuer terms.
      NEEDS human verification.

notes: >-
  Drafted offline from data/offer_files/chase/aer-lingus.txt. annual_fee_usd ($95) and
  foreign_transaction_pct (0) are NOT stated in the offer file — estimates/inferences,
  NEEDS human verification. Companion Ticket (one economy companion voucher after
  $30,000 calendar-year spend, US-Ireland Aer Lingus flights only) is recorded as a
  benefit_flag, not dollar-valued: it is a spend-gated in-kind certificate whose value
  depends entirely on booking a transatlantic Aer Lingus route, so any dollar figure
  would be invented. Priority boarding is a benefit_flag. Avios auto-transfer to Aer
  Lingus AerClub each billing cycle.

