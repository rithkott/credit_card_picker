notes: >-
  Drafted offline from data/offer_files/chase/aeroplan.txt. network (mastercard),
  annual_fee_usd ($95) and foreign_transaction_pct (0) are NOT stated in the offer
  file — estimates/inferences, NEEDS human verification. OMITTED as structured value
  (noted, not modeled): the "500 bonus points per $2,000 spent per calendar month, up
  to $6,000/month (max 1,500 points/month)" is a spend-proportional bonus (~0.25
  pts/$1 on the first $6,000/month), not a fixed credit and not a clean multiplier, so
  it is described here rather than distorting base_rate — a reviewer may fold it in.
  Aeroplan 25K status (account-open year + following year; requalify with $15,000
  spend) and 35K status (with $75,000 spend), plus Status Qualifying Credits (5,000
  automatic/year, up to 20,000 more at spend thresholds, 25,000 combined cap), are
  recorded as complimentary_elite_status + this note, never dollar-valued. Free first
  checked bag is a benefit_flag. Redemption-side perks (preferred Aeroplan award
  pricing, Pay Yourself Back, 10% Ultimate Rewards transfer bonus) are noted only.

