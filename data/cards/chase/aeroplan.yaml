# Air Canada Aeroplan co-brand: 3x on Air Canada + groceries + dining; elite-status fast track and monthly spend bonus.
id: aeroplan
name: Aeroplan
issuer: chase
network: mastercard             # NOT stated in the offer file — Chase Aeroplan is a World Elite Mastercard by public positioning; NEEDS human verification
currency:
  type: points
  program: aeroplan
base_rate: 1                    # "1 point/$1: everything else"

category_rewards:
  - category: travel_flights
    rate: 3                      # "3 points/$1 on purchases made directly with Air Canada"
    notes: >-
      Only purchases made directly with Air Canada (excludes gift cards, car rentals,
      hotel bookings and other third-party partner products via aircanada.com, onboard
      WiFi, and tickets booked via travel agencies/discount sites/vacation clubs/tour
      operators/non-airline packages). Narrower than the general travel_flights
      category — other airlines' tickets earn only the 1x base rate. Modeled at the
      co-brand rate; cannot split airline within the category.
  - category: groceries
    rate: 3                      # "3 points/$1: grocery stores"
  - category: dining
    rate: 3                      # "3 points/$1: dining (incl. takeout/delivery)"

merchant_rewards: []

credits:
  - name: Global Entry / TSA PreCheck / NEXUS fee credit
    amount_usd: 120             # "one statement credit up to $120 every 4 years"
    period: every_4_years
    realistic_capture_rate_note: >-
      One statement credit up to $120 per 4-year cycle covering a Global Entry/TSA
      PreCheck/NEXUS application fee. Captured only by travelers who apply/renew;
      worthless to those who never enroll.
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10             # "$10 off quarterly on one DoorDash non-restaurant order while enrolled"
    period: quarterly
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating complimentary DashPass (12 months free 2/1/2025-12/31/2027,
      then auto-renews) and one qualifying DoorDash non-restaurant order each quarter
      (no rollover). Captured only by active DoorDash users; worthless otherwise.

signup_bonus:
  value:
    points: 60000              # "60,000 bonus points after spending $3,000 in first 3 months"
  spend_requirement_usd: 3000
  window_months: 3
  notes: >-
    Not available to current cardmembers of this card or previous cardmembers who
    received a bonus for this card within the last 24 months. Allow 6-8 weeks to post.

fees:
  annual_fee_usd: 95            # NOT stated in the offer file — best estimate from the card's public positioning; NEEDS human verification
  foreign_transaction_pct: 0    # inferred: airline co-brands typically carry no FTF, but the offer file states no FTF language; NEEDS human verification

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's public positioning as a mainstream airline
    co-brand; not stated in the offer file. Chase 5/24 rule very likely applies — not
    stated in the offer file. NEEDS human verification.

benefit_flags:
  - free_checked_bag
  - complimentary_elite_status
  - concierge

sources:
