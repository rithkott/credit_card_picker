# United Gateway: no-annual-fee United co-brand; 2x United + gas + transit, no fixed credits.
id: united-gateway
name: United Gateway
issuer: chase
network: visa                   # "May be issued as Visa Signature or Visa Platinum depending on underwriting"
currency:
  type: points
  program: united_mileageplus
base_rate: 1                    # "1 mile/$1 base rate"

category_rewards:
  - category: travel_flights
    rate: 2                      # "2 miles/$1 ... airline tickets and other purchases made directly with United"
    notes: >-
      2x applies to purchases made directly with United (tickets, seat upgrades, Economy
      Plus, inflight food/beverage/WiFi, baggage/other fees) and United Card Events from
      Chase; excludes United Cruises, MileagePlus X, DIRECTV, Merchandise Awards, and
      tickets via discount travel sites/third-party packages. Narrower than the general
      travel_flights category — other airlines' tickets earn only the 1x base rate.
  - category: gas
    rate: 2                      # "2 miles/$1 ... gas stations"
  - category: transit
    rate: 2                      # "2 miles/$1 ... local transit/commuting"

