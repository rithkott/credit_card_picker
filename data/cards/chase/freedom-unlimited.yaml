# No-annual-fee flat-1.5%-plus card: 1.5% base, 3% dining/drugstore, 5% Chase Travel portal, on UR points.
id: freedom-unlimited
name: Chase Freedom Unlimited
issuer: chase
network: visa                # NOT stated in offer file; Freedom Unlimited is a Visa — inference, NEEDS human verification
currency:
  type: points               # earns Ultimate Rewards points (1 pt = $0.01); transferable when paired with a premium Chase card
  program: chase_ur
base_rate: 1.5               # "Base: 1.5% cash back (1.5 points/$1) on all purchases"

category_rewards:
  - category: dining
    rate: 3                  # "3% total (1.5% additional) on ... dining (restaurants incl. takeout and eligible delivery)"
  - category: drugstores
    rate: 3                  # "3% total (1.5% additional) on drugstores"
  - category: travel_flights
    rate: 5                  # "5% total (3.5% additional) on purchases made through Chase Travel (portal-only)"
    portal_only: true
    notes: Only when booked through the Chase Travel portal (portal prices may exceed direct booking).
  - category: travel_hotels
    rate: 5
    portal_only: true
    notes: Only when booked through the Chase Travel portal (portal prices may exceed direct booking).
  - category: travel_other
    rate: 5
    portal_only: true
    notes: Chase Travel portal purchases (cars, cruises, activities, etc.); portal prices may exceed direct booking.

merchant_rewards:
  - merchant: lyft
    rate: 2                  # "2% total (0.5% additional) on qualifying Lyft app purchases through 09/30/2027"
    notes: >-
      Limited-time through 9/30/2027 (excludes gift cards, car rentals, vehicle service
      centers, misc fees). Reverts to base earn after the promo; merchant_rewards has no
      expires field, so the end date is noted here.

credits:
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10            # "Up to $10 off quarterly on DoorDash non-restaurant orders while enrolled in DashPass"
    period: quarterly
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating the complimentary 6-month DashPass (activation window
      2/1/2025-12/31/2027, then auto-renews at the then-current monthly rate) and placing
      one qualifying DoorDash non-restaurant order each quarter (no rollover; excludes
      gift cards, alcohol in some states). Captured only by active DoorDash users who
      enroll; worthless otherwise.

signup_bonus:
  value:
    points: 20000             # "$200 cash back (20,000 points) after spending $500 in first 3 months"
  spend_requirement_usd: 500
  window_months: 3
  notes: >-
    Marketed as "$200 cash back" (20,000 UR points at 1cpp). Not available to current
    cardmembers or those who received a bonus for this card in the last 24 months. Allow
    6-8 weeks to post; account must be open and not in default at fulfillment.

fees:
  annual_fee_usd: 0           # NOT stated in offer file; Freedom Unlimited is a no-annual-fee card — inference, NEEDS human verification
  foreign_transaction_pct: 3  # NOT stated in offer file; Freedom Unlimited charges a 3% FTF — inference, NEEDS human verification

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's public positioning as a mainstream cash-back
    card; not stated in the offer file. Chase 5/24 very likely applies. NEEDS human
    verification.

benefit_flags: []

sources:
  - url: https://creditcards.chase.com/cash-back-credit-cards/freedom/unlimited
    supports: [identity, currency, base_rate, category_rewards, merchant_rewards, credits, signup_bonus, fees, approval]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL not in offer file and not fetched this session; figures transcribed from
      data/offer_files/chase/freedom-unlimited.txt and unconfirmed against issuer terms.
      NEEDS human verification.

notes: >-
  Drafted offline from data/offer_files/chase/freedom-unlimited.txt. No source URL was
  on file; the cited page is the issuer's general product page (not fetched).
  annual_fee_usd (0), foreign_transaction_pct (3), network (visa), and credit_tier are
  NOT stated in the offer file and are best-estimate inferences — NEEDS human
  verification. Chase Travel portal rate modeled across all three travel categories with
  portal_only:true. Rewards are based on merchant category codes; a merchant may not
  qualify even if it seems to fit. Amazon Shop-with-Points values points at only $0.008
  each, noted but not modeled.

verification:
  last_verified_date: "2026-07-04"
  verified_by: "claude-opus-4-8 (AI draft) — NEEDS human verification"
  confidence: low
