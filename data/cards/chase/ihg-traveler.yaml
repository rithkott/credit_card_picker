# IHG One Rewards Traveler: no-annual-fee IHG co-brand; 5x at IHG hotels, automatic Silver status.
id: ihg-traveler
name: IHG One Rewards Traveler
issuer: chase
network: mastercard             # NOT stated in the offer file — IHG co-brands are World Elite Mastercards by public positioning; NEEDS human verification
currency:
  type: points
  program: ihg_one_rewards
base_rate: 2                    # "2 points/$1: everything else"

category_rewards:
  - category: travel_hotels
    rate: 5                      # "5 points/$1 at hotels participating in IHG One Rewards" (card earn only; IHG base earn posts separately)
    notes: >-
      5x applies to IHG-brand hotel stays. This is the card's earn only — IHG program
      base points (10 base pts/$1 at most brands + Silver 20% bonus) post separately to
      the IHG account and are not included here.
  - category: dining
    rate: 3                      # "3 points/$1: dining (incl. takeout/delivery)"
  - category: gas
    rate: 3                      # "3 points/$1: gas stations"
  - category: utilities
    rate: 3                      # "3 points/$1: utilities; internet/cable/phone"
    notes: Covers utilities and internet/cable/phone services.
  - category: streaming
    rate: 3                      # "3 points/$1: select streaming"
    notes: Select streaming services only (issuer-defined list).

merchant_rewards: []

credits:
  - name: Anniversary bonus points ($10k spend)
    amount_points: 10000        # "10,000 bonus points each calendar year with $10,000+ spend"
    period: annual
    automatic: true    # pays out with no merchant-specific action
    unlock_spend_usd: 10000
    realistic_capture_rate_note: >-
      Pays only after $10,000 of card spend in a calendar year; captured by moderate-to-
      heavy spenders who put everyday spend on this card.
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10             # "$10 off quarterly on one DoorDash non-restaurant order while enrolled"
    period: quarterly
    usage_keys: [doordash]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating complimentary DashPass and one qualifying DoorDash
      non-restaurant order each quarter (no rollover). Active DoorDash users only.
  - name: Instacart monthly credit
    amount_usd: 10             # "$10/month Instacart credit while active"
    period: monthly
    usage_keys: [instacart]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires an active Instacart+ membership (3 months complimentary, then auto-renews
      at $99/year) and a qualifying purchase each month (no rollover). Only regular
      Instacart users net ahead after the free window.

signup_bonus:
  value:
    points: 80000            # "80,000 bonus points after spending $2,000 in first 3 months"
  spend_requirement_usd: 2000
  window_months: 3
  notes: >-
    Standard offer transcribed from the offer file. A separate 10,000-point bonus for
    adding an authorized user in the first 3 months is not modeled as signup value.
    Not available to current cardmembers of any personal IHG One Rewards card or previous
    cardmembers who received a bonus within the last 24 months.

fees:
  annual_fee_usd: 0            # NOT explicitly stated in the offer file — the Traveler is publicly a no-annual-fee card; NEEDS human verification
  foreign_transaction_pct: 0   # inferred: no FTF language in the offer file; NEEDS human verification

approval:
