# No-annual-fee rotating-category cash back card; Chase's entry-level "Freedom" line.
id: freedom-flex
name: Freedom Flex
issuer: chase
network: mastercard
currency:
  type: cash
  program: cash
base_rate: 1

category_rewards:
  - category: dining
    rate: 3
    notes: "Restaurants including takeout/delivery."
  - category: drugstores
    rate: 3
  - category: travel_flights
    rate: 5
    portal_only: true
    notes: "5% total on travel purchased through the Chase Travel portal only."
  - category: travel_hotels
    rate: 5
    portal_only: true
    notes: "5% total on travel purchased through the Chase Travel portal only."
  - category: travel_other
    rate: 5
    portal_only: true
    notes: "5% total on travel purchased through the Chase Travel portal only."
  - category: rotating
    rate: 5
    cap:
      period: quarterly
      max_spend_usd: 1500
      fallback_rate: 1
    rotation:
      frequency: quarterly
      requires_activation: true
      note: "Automatic (issuer-set) rotating categories, not user-selected; activation required each quarter by the posted deadline. This quarter's specific categories deliberately not recorded here — see chase.com/freedomflex for the current list."
    notes: "Falls back to 1% once the $1,500 quarterly combined spend cap is hit."

merchant_rewards:
  - merchant: lyft
    rate: 2
    notes: "2% total cash back on qualifying Lyft rideshare/bike/scooter/subscription purchases through 9/30/2027; excludes gift cards, car rentals, vehicle service centers."

credits:
  - name: DoorDash non-restaurant order credit
    amount_usd: 10
    period: quarterly
    realistic_capture_rate_note: "Only useful to cardholders who both enroll in the complimentary DashPass and place non-restaurant DoorDash orders (grocery/convenience); does not roll over if unused, so infrequent DoorDash users capture little to none of this."
    notes: "Requires DashPass activation between 2/1/2025-12/31/2027; DashPass itself is complimentary for 6 months then auto-renews at the then-current rate unless cancelled."

signup_bonus:
  value:
    usd: 200
  spend_requirement_usd: 500
  window_months: 3
  notes: "Not available to current cardmembers, or previous cardmembers who received a new cardmember bonus for this card within the last 24 months. Allow 6-8 weeks for bonus to post."

fees:
  annual_fee_usd: 0
  foreign_transaction_pct: 3
  # foreign_transaction_pct is not stated in the offer file or the fetched product page;
  # 3% is Chase's standard rate for this card per public knowledge — NEEDS human verification
  # against the issuer's actual Pricing & Terms / Schumer box PDF.

approval:
  credit_tier: good
  notes: "credit_tier estimated from issuer's public positioning of this card (mass-market no-annual-fee card); not explicitly stated in the offer file or fetched page — NEEDS human verification."

benefit_flags:
  - dashpass_membership

sources:
