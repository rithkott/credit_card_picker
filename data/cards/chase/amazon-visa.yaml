notes: >-
  Drafted offline from data/offer_files/chase/amazon-visa.txt. No source URL was on file;
  the cited page is the issuer's general product page (not fetched). This is the no-Prime
  sibling of the Prime Visa (cross-reference: data/cards/chase/prime-visa.yaml) — the 5%
  Amazon/Whole Foods/portal rate is Prime-gated, so it is modeled as the unconditional 3%
