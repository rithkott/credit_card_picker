# Southwest Rapid Rewards Premier: mid-tier Southwest co-brand; 3x Southwest, 6k anniversary points, free checked bag.
id: southwest-premier
name: Southwest Rapid Rewards Premier
issuer: chase
network: visa                   # NOT stated in the offer file — Southwest Premier is publicly a Visa Signature; NEEDS human verification
currency:
  type: points
  program: southwest_rapid_rewards
base_rate: 1                    # "1 point/$1: everything else"

category_rewards:
  - category: travel_flights
    rate: 3                      # "3 points/$1 on purchases made directly with Southwest Airlines"
    notes: >-
      Only purchases made directly with Southwest Airlines (flight, inflight, gift
      cards, Getaways by Southwest packages; excludes Southwest Cruises/Charters/Cargo).
      Narrower than the general travel_flights category — other airlines' tickets earn
      only the 1x base rate.
  - category: groceries
    rate: 2                      # "2 points/$1 total: grocery + dining, combined, first $8,000/anniversary year; then 1x"
    cap:
      period: annual
      max_spend_usd: 8000        # full combined pool, stated in full on each member entry
      fallback_rate: 1
      shared_cap_id: grocery_dining
    notes: >-
      Combined $8,000/account-anniversary-year pool shared with dining; combined spend
      above the shared cap earns 1 point/$1.
  - category: dining
    rate: 2                      # same combined 2x line
    cap:
      period: annual
      max_spend_usd: 8000
      fallback_rate: 1
      shared_cap_id: grocery_dining
    notes: >-
      Combined $8,000/account-anniversary-year pool shared with groceries; combined
      spend above the shared cap earns 1 point/$1.

merchant_rewards:
  - merchant: lyft
    rate: 3                      # "3X points on qualifying Lyft ... through 12/31/2027"
    notes: >-
      Limited-time: 3X on qualifying Lyft rideshare/bike/scooter/subscription purchases
      through 12/31/2027 (excludes gift cards, car rentals, vehicle service centers).
      Reverts to base earn after the promo; no expires field exists on merchant rewards
      so the end date is noted here.

credits:
  - name: Anniversary bonus points
    amount_points: 6000         # "6,000 bonus points each account anniversary year"
    period: annual
    realistic_capture_rate_note: >-
      Automatic each account anniversary year while the account is open — full capture
      for anyone who keeps the card.
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10             # "$10 off quarterly on one DoorDash non-restaurant order while enrolled"
    period: quarterly
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating complimentary DashPass and one qualifying DoorDash
      non-restaurant order each quarter (no rollover). Active DoorDash users only.
  - name: Instacart monthly credit
    amount_usd: 10             # "$10/month Instacart credit while active"
    period: monthly
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires an active Instacart+ membership (3 months complimentary, then auto-renews
      at $99/year) and a qualifying purchase each month (no rollover). Only regular
      Instacart users net ahead after the free window.

signup_bonus:
  value:
    points: 55000            # "55,000 bonus points after spending $1,500 in first 3 months"
  spend_requirement_usd: 1500
  window_months: 3
  notes: >-
    Not available to current cardmembers of any personal Southwest Rapid Rewards card or
    previous cardmembers who received a bonus within the last 24 months (business/employee
    cards excluded from the restriction).

fees:
  annual_fee_usd: 99           # NOT stated in the offer file — best estimate from the card's public positioning; NEEDS human verification
  foreign_transaction_pct: 0   # inferred: airline co-brands typically carry no FTF, but the offer file states no FTF language; NEEDS human verification

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's public positioning as a mainstream airline
    co-brand; not stated in the offer file. Chase 5/24 rule very likely applies — not
    stated in the offer file. NEEDS human verification.

benefit_flags:
  - free_checked_bag
  - no_change_fees
  - no_blackout_dates
  - companion_pass_qualifying_boost
  - visa_signature

sources:
