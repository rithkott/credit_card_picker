# Top-tier Disney co-brand: 10% Disney+ bundle, 3% Disney/gas, 2% grocery/dining, Disney resort & park credits.
id: disney-inspire
name: Disney Inspire Visa
issuer: chase
network: visa                # "Disney Inspire Visa" — stated in the card name
currency:
  type: points               # Disney Rewards Dollars (registry values the unit at 1cpp, so rate N = N% back; 1 Reward Dollar = 100 units)
  program: disney_rewards
base_rate: 1                 # "1%: everything else"

category_rewards:
  - category: streaming
    rate: 10                 # "10% total on Disney+/Hulu/ESPN+ subscriptions and add-ons purchased directly"
    notes: >-
      Applies ONLY to Disney+/Hulu/ESPN+ subscriptions/add-ons purchased directly at
      DisneyPlus.com, Hulu.com, or plus.espn.com (not via third-party platform unless
      redirected, not as part of a bundle). NARROWER than the general streaming category —
      other streaming services earn only the 1% base.
  - category: gas
    rate: 3                  # "3% total: US Disney Locations; gas stations" (gas station portion)
  - category: groceries
    rate: 2                  # "2% total: grocery stores"
  - category: dining
    rate: 2                  # "2% total: ... dining (incl. takeout/delivery, excluding Disney-location dining which earns 3%)"

merchant_rewards: []

credits:
  - name: Disney Resort spend bonus (Disney Rewards Dollars)
    amount_points: 20000      # "200 Disney Rewards Dollars" = 200 x 100 units/Reward-Dollar = 20,000 points (valued at 1cpp = $200)
    period: annual
    realistic_capture_rate_note: >-
      200 Disney Rewards Dollars ($200 value) per Anniversary Year after $2,000 in
      qualifying US Disney Resort spend (direct hotel/folio/vacation-package spend at
      Disney Resorts Collection, Disneyland hotels, AULANI, Hilton Head, Vero Beach; also
      Disney Cruise Line stateroom rates). Scoped to Disney Resort spend (NOT total card
      spend), so it is not modeled as unlock_spend_usd — captured only by cardholders who
      spend $2,000+/year on qualifying Disney stays.
  - name: Disney Theme Park ticket credit
    amount_usd: 100           # "$100 statement credit after $200 in qualifying US Disney Theme Park ticket spend"
    period: annual
    realistic_capture_rate_note: >-
      $100 statement credit per Anniversary Year after $200 in qualifying US Disney theme
      park ticket spend (Annual/Magic Key/Water Park tickets bought direct; excludes
      tickets bundled into packages). Scoped to park-ticket spend (NOT total card spend);
      captured only by cardholders buying park tickets directly.
  - name: Disney+/Hulu/ESPN+ monthly subscription credit
    amount_usd: 10            # "$10/month statement credit after $10+ in qualifying Disney+/Hulu/ESPN+ subscription spend"
    period: monthly
    requires_enrollment: true
    realistic_capture_rate_note: >-
      $10/month statement credit after $10+/month in qualifying Disney+/Hulu/ESPN+
      subscription spend; requires annual reactivation (annual subscriptions get only a
      one-time $10 credit in the purchase month). Full capture for monthly Disney+ bundle
      subscribers who reactivate each year; scoped to that streaming spend.
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10            # "$10 off quarterly on one DoorDash non-restaurant order while enrolled"
    period: quarterly
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating the complimentary 12-month DashPass (activation window
      2/1/2025-12/31/2027, then auto-renews) and placing one qualifying DoorDash
      non-restaurant order each quarter (no rollover). Captured only by active DoorDash
      users who enroll.

signup_bonus:
  value:
    usd: 300                  # "$300 Disney Gift Card eGift, awarded automatically at approval"
  spend_requirement_usd: 0
  window_months: 3
  tiers:
    - value:
        usd: 200              # "$200 statement credit after spending $1,000 in first 3 months"
      spend_requirement_usd: 1000
  notes: >-
    Base tranche is the $300 Disney Gift Card awarded at approval (no spend required,
    valued at face). The tier is a $200 statement credit after $1,000 spend in the first 3
    months. Account must stay open 6+ months or the gift card offer may be cancelled. Not
    available to current cardmembers or those who got a bonus for this card in the last 24
    months. Allow up to 8 weeks.

fees:
  annual_fee_usd: 99          # NOT stated in offer file; Disney Inspire (premium tier) annual fee — inference, NEEDS human verification
  foreign_transaction_pct: 3  # NOT stated in offer file — inference, NEEDS human verification

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's mainstream co-brand positioning; not stated in
    the offer file. Chase 5/24 likely applies. NEEDS human verification.

benefit_flags:
  - special_financing

sources:
