# Marriott Bonvoy Bountiful: mid-tier Marriott co-brand; 6x Marriott, combined 4x grocery+dining, Gold status, free night at $15k.
id: marriott-bountiful
name: Marriott Bonvoy Bountiful
issuer: chase
network: visa                   # NOT stated in the offer file — Marriott Bountiful is publicly a Visa Signature; NEEDS human verification
currency:
  type: points
  program: marriott_bonvoy
base_rate: 2                    # "2 points/$1: everything else"

category_rewards:
  - category: travel_hotels
    rate: 6                      # "6 points/$1 at hotels participating in Marriott Bonvoy" (card earn only; Marriott base earn posts separately)
    notes: >-
      6x applies to Marriott-brand hotel stays. This is the card's earn only — Marriott
      program base points (10 base pts/$1 + Gold 25% bonus) post separately to the
      Marriott account and are not included here.
  - category: groceries
    rate: 4                      # "4 points/$1 total: grocery + dining, combined, first $6,000/anniversary year; then 2x"
    cap:
      period: annual
      max_spend_usd: 6000        # full combined pool, stated in full on each member entry
      fallback_rate: 2
      shared_cap_id: grocery_dining
    notes: >-
      Combined $6,000/account-anniversary-year pool shared with dining; combined spend
      above the cap earns 2 points/$1 (no maximum).
  - category: dining
    rate: 4                      # same combined 4x line
    cap:
      period: annual
      max_spend_usd: 6000
      fallback_rate: 2
      shared_cap_id: grocery_dining
    notes: >-
      Combined $6,000/account-anniversary-year pool shared with groceries; combined
      spend above the cap earns 2 points/$1.

merchant_rewards: []

credits:
  - name: Free Night Award ($15k spend)
    amount_usd: 200             # in_kind: estimated value of a night up to the 50,000-point redemption ceiling
    kind: in_kind
    period: annual
    usage_keys: [marriott]
    category: travel_hotels
    unlock_spend_usd: 15000     # "each calendar year after $15,000 in purchases"
    realistic_capture_rate_note: >-
      Earned each calendar year only after $15,000 of card spend; valid 12 months,
      resort fees still apply. Estimated at ~$200: caps at a 50,000-point redemption
      ceiling and Marriott points realistically redeem near 0.6-0.9 cents (~$300-450 at
      the ceiling), haircut toward $200 for the spend gate, ceiling reachability, resort
      fees, and availability. Captured only by heavy spenders who take a Marriott stay.
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10             # "$10 off quarterly on one DoorDash non-restaurant order while enrolled"
    period: quarterly
    usage_keys: [doordash]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating complimentary DashPass and one qualifying DoorDash
      non-restaurant order each quarter (no rollover). Active DoorDash users only.

