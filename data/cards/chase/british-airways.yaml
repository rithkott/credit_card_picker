# British Airways co-brand: Avios earning on partner-airline flights + direct hotels; Travel Together companion at high spend.
id: british-airways
name: British Airways Visa Signature
issuer: chase
network: visa
currency:
  type: points
  program: avios                # Avios move 1:1 across BA / Iberia / Aer Lingus — one shared registry key
base_rate: 1                    # "1 Avios/$1 on everything else"

category_rewards:
  - category: travel_flights
    rate: 3                      # "3 Avios/$1 on flights purchased directly with British Airways, Aer Lingus, Iberia, LEVEL"
    notes: >-
      Only flights booked directly with British Airways, Aer Lingus, Iberia, or LEVEL.
      Narrower than the general travel_flights category — other airlines' tickets earn
      only the 1x base rate. Modeled at the co-brand rate; cannot split airline within
      the category.
  - category: travel_hotels
    rate: 2                      # "2 Avios/$1 on hotel accommodations purchased directly with the hotel"
    notes: Only hotel accommodations purchased directly with the hotel (not via OTAs/portals).

merchant_rewards: []

credits:
  - name: DashPass DoorDash quarterly credit
    amount_usd: 10              # "$10 off quarterly on one DoorDash non-restaurant order while enrolled"
    period: quarterly
    usage_keys: [doordash]
    requires_enrollment: true
    realistic_capture_rate_note: >-
      Requires activating complimentary DashPass (12 months free 2/1/2025-12/31/2027,
      then auto-renews) and placing one qualifying DoorDash non-restaurant order each
      quarter (no rollover). Captured only by active DoorDash users; worthless otherwise.
  - name: Travel Together Ticket ($30k spend)
    kind: in_kind
    amount_usd: 250             # curator estimate of net value, NOT an issuer-stated figure — see notes
    period: annual
    usage_keys: [british_airways]
    unlock_spend_usd: 30000     # "spend $30,000 in a calendar year"
    realistic_capture_rate_note: >-
      Voucher for a free companion seat (or 50% Avios discount solo) on BA/Iberia/Aer
      Lingus Reward Flights after $30,000 calendar-year spend; companion still pays
      taxes/fees, and BA's long-haul carrier surcharges are notoriously high. One per
      calendar year, valid 2 years. Captured only by very heavy spenders who redeem
      Avios for BA-metal reward flights with a second traveler.
    notes: >-
      in_kind value is a curator estimate: the voucher saves the companion's Avios
      cost (tens of thousands of Avios) but cash taxes/surcharges of $200-$700+ still
      apply — $250 is a conservative net figure, NEEDS human verification. Mirrors
      the atmos/aer-lingus companion-certificate modeling convention.

signup_bonus:
  value:
    points: 75000              # "75,000 bonus Avios after spending $5,000 in first 3 months"
  spend_requirement_usd: 5000
  window_months: 3
  notes: >-
    Not available to current cardmembers or previous cardmembers who received a bonus
    for this card within the last 24 months. Allow 6-8 weeks to post.

fees:
  annual_fee_usd: 95            # NOT stated in the offer file — best estimate from the card's public positioning; NEEDS human verification
  foreign_transaction_pct: 0    # inferred: airline co-brands typically carry no FTF, but the offer file states no FTF language; NEEDS human verification

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's public positioning as a mainstream airline
    co-brand; not stated in the offer file. Chase 5/24 rule very likely applies
    (Chase declines applicants with 5+ new accounts in 24 months) — not stated in the
    offer file. NEEDS human verification.

benefit_flags:
  - companion_certificate
  - visa_signature

sources:
  - url: https://creditcards.chase.com/travel-credit-cards/british-airways
    supports: [identity, currency, base_rate, category_rewards, credits, signup_bonus, benefit_flags]
    accessed: "2026-07-04"
    added_by: claude-opus-4-8
    note: >-
      URL not in the offer file and not fetched this session; this is the issuer's
      general product page. All figures transcribed from
      data/offer_files/chase/british-airways.txt and are unconfirmed against issuer
      terms. NEEDS human verification.

notes: >-
  Drafted offline from data/offer_files/chase/british-airways.txt. annual_fee_usd ($95)
  and foreign_transaction_pct (0) are NOT stated in the offer file — estimates/inferences,
  NEEDS human verification. Travel Together Ticket is now modeled as a spend-gated
  in_kind credit (curator-estimated $250 net — see the credit's notes) in addition to
  the companion_certificate benefit_flag. OMITTED as structured value (noted, not
  dollar-valued): the Reward Flight Statement Credit (up to $200/booking, max $600/year) is
  redemption-side — it only pays when redeeming Avios for a BA reward flight, so it is not
  modeled as an earn/credit; the 10% BA flight discount code and "Paying with Avios"
  taxes/fees reduction are noted here only. Avios auto-transfer to British Airways Club
  each billing cycle (requires a US address on the BA Club account).

