# Mainstream no-annual-fee rotating-5% cash-back card with Discover's first-year Cashback Match.
id: it-cash-back
name: Discover it Cash Back
issuer: discover
network: discover
currency:
  type: cash
  program: cash
base_rate: 1                 # "1% cash back on all other purchases"

category_rewards:
  - category: rotating
    rate: 5                  # "5% cash back in rotating quarterly categories"
    rotation:
      frequency: quarterly
      requires_activation: true
      note: >-
        Eligible 5% categories rotate each calendar quarter and must be activated
        each quarter before the elevated rate applies; unactivated spend earns the
        1% base rate. Specific categories change quarterly (past examples include
        groceries, gas, restaurants, wholesale clubs) — not modeled as permanent.
    cap:
      period: quarterly
      max_spend_usd: 1500
      fallback_rate: 1
    notes: >-
      The offer file does not state the dollar amount of the quarterly maximum;
      the $1,500/quarter cap is the standard published figure for this product,
      drafted from general knowledge and NOT re-checked against issuer sources
      in this change. NEEDS human verification of the quarterly spend cap.

merchant_rewards: []

credits: []

signup_bonus:
  first_year_match: true      # "Unlimited Cashback Match ... matches all cash back earned at the end of the first year"

fees:
  annual_fee_usd: 0           # "Annual fee: None"
  foreign_transaction_pct: 0  # "Foreign transaction fee: None"

approval:
  credit_tier: good
  notes: >-
    credit_tier estimated from the card's public positioning as a mainstream
    no-annual-fee rewards card (not a secured/student product); the offer file does
    not state a credit requirement. NEEDS human verification.

benefit_flags:
